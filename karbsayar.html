// FAZ 3: SAATLİK ISF / RATIO ÖĞRENME
// ============================================================================

// Saat bin'leri: Sabah/Öğlen/Akşam/Gece (KarbSayar default)
const HOUR_BINS = [
  { key: 'breakfast', label: 'Sabah', emoji: '🌅', range: [4, 11] },
  { key: 'lunch',     label: 'Öğlen', emoji: '🌞', range: [11, 17] },
  { key: 'dinner',    label: 'Akşam', emoji: '🌆', range: [17, 22] },
  { key: 'night',     label: 'Gece',  emoji: '🌙', range: [22, 28] } // 22-04
];

function getBinForHour(hour) {
  if (hour >= 4 && hour < 11) return 'breakfast';
  if (hour >= 11 && hour < 17) return 'lunch';
  if (hour >= 17 && hour < 22) return 'dinner';
  return 'night'; // 22-23, 0-3
}

// === SAATLİK I:C ORANI ÖĞRENME ===
// Yemek + bolus + 2-3 saat sonra KŞ ölçümlerinden
// Hedef: 90 dk-3 sa sonra KŞ "iyi aralıkta" (70-180) ise oran doğru
// Eğer post-meal yüksekse oran zayıf, düşükse fazla
function analyzeHourlyRatio(days = 30) {
  const recent = getRecentDays(days);
  const binData = {};
  HOUR_BINS.forEach(b => binData[b.key] = []);
  
  for (const [date, entries] of Object.entries(recent)) {
    for (const e of entries) {
      // Sadece ratio hesaplı bolus girişlerini al (carbs > 0, insulin > 0, postMealBG var)
      if (e.type !== 'meal' && e.type !== undefined && e.type !== 'food') continue;
      if (!(e.carbs > 5)) continue;
      if (!(e.insulin > 0)) continue;
      if (!e.postMealBG || typeof e.postMealBG.value !== 'number') continue;
      if (typeof e.bg !== 'number') continue;
      
      const hour = e.hour ?? parseInt(String(e.time || '0:0').split(':')[0]);
      const bin = getBinForHour(hour);
      
      const carbDose = e.carbs / e.insulin; // efektif I:C oran
      const delta = e.postMealBG.value - e.bg;
      
      binData[bin].push({
        date, time: e.time, hour,
        carbs: e.carbs, insulin: e.insulin,
        bg: e.bg, postBG: e.postMealBG.value,
        delta,
        ratio: carbDose,
        usedRatio: state.ratios[bin] || state.insulinRatio
      });
    }
  }
  
  const result = {};
  for (const [bin, records] of Object.entries(binData)) {
    if (records.length < 3) {
      result[bin] = { status: 'insufficient', count: records.length };
      continue;
    }
    const deltas = records.map(r => r.delta);
    const avgDelta = deltas.reduce((a,b)=>a+b,0) / deltas.length;
    const stdDelta = Math.sqrt(deltas.map(d => (d - avgDelta) ** 2).reduce((a,b)=>a+b,0) / deltas.length);
    
    const goodMeals = records.filter(r => Math.abs(r.delta) <= 50).length;
    const highMeals = records.filter(r => r.delta > 50).length;
    const lowMeals = records.filter(r => r.delta < -30).length;
    const avgRatio = records.reduce((a,r) => a + r.ratio, 0) / records.length;
    const usedRatio = records[0].usedRatio;
    
    // Tavsiye
    let suggestion = '';
    let newRatio = null;
    // Ortalama delta > 60 ve highMeals çoğunluk → ratio düşür (daha fazla insulin gerek)
    if (avgDelta > 60 && highMeals > records.length * 0.5) {
      newRatio = Math.max(4, Math.round((usedRatio - 1) * 10) / 10);
      suggestion = `Ratio düşür: ${usedRatio} → ${newRatio} g/Ü`;
    } else if (avgDelta < -20 && lowMeals > records.length * 0.4) {
      newRatio = Math.round((usedRatio + 1) * 10) / 10;
      suggestion = `Ratio yükselt: ${usedRatio} → ${newRatio} g/Ü`;
    } else if (Math.abs(avgDelta) < 30) {
      suggestion = '✓ Mevcut oran iyi';
    } else {
      suggestion = 'Pattern karışık, daha fazla veri gerekli';
    }
    
    result[bin] = {
      status: 'ok',
      count: records.length,
      usedRatio,
      avgDelta: Math.round(avgDelta),
      stdDelta: Math.round(stdDelta),
      goodMeals, highMeals, lowMeals,
      avgEffectiveRatio: Math.round(avgRatio * 10) / 10,
      newRatio,
      suggestion,
      records: records.slice(-5).reverse() // Son 5 örnek
    };
  }
  
  return result;
}

// FAZ 4: EGZERSİZ HASSASİYET HARİTASI
// ============================================================================
// Hedef: Egzersiz tipi × IOB × süre × yoğunluk → KŞ düşüşü tahmini
// Sen "1km yürüyüş + 1Ü IOB ne kadar düşürür?" diyebileceksin

const EX_TYPE_LABELS = {
  walk: '🚶 Yürüyüş',
  run: '🏃 Koşu',
  bike: '🚴 Bisiklet',
  fitness: '💪 Fitness',
  swim: '🏊 Yüzme',
  other: '⚡ Diğer'
};

const IOB_BANDS = [
  { key: 'no',  label: 'IOB Yok',  range: [0, 0.3],  color: '#5b9279' },
  { key: 'low', label: '0.3-1Ü',   range: [0.3, 1],  color: '#a8a06e' },
  { key: 'med', label: '1-2Ü',     range: [1, 2],    color: '#d97706' },
  { key: 'high',label: '2Ü+',      range: [2, 99],   color: '#a03030' }
];

function getIOBBand(iob) {
  if (iob == null || iob < 0.3) return 'no';
  if (iob < 1) return 'low';
  if (iob < 2) return 'med';
  return 'high';
}

function analyzeExerciseSensitivity(days = 90) {
  const recent = getRecentDays(days);
  const records = [];
  
  for (const [date, entries] of Object.entries(recent)) {
    for (const e of entries) {
      if (e.type !== 'exercise') continue;
      if (typeof e.bgDelta !== 'number') continue;
      records.push({
        date, time: e.time,
        type: e.exType,
        duration: e.duration,
        intensity: e.intensity,
        distance: e.distance,
        steps: e.steps,
        iob: e.iobAtStart || 0,
        bgBefore: e.bg,
        bgAfter: e.bgAfter,
        delta: e.bgDelta,
        // dakika başına düşüş
        deltaPerMin: e.duration > 0 ? e.bgDelta / e.duration : 0
      });
    }
  }
  
  if (records.length === 0) {
    return { status: 'empty', records: [] };
  }
  
  // Tip + IOB band gruplaması
  const groups = {};
  for (const r of records) {
    const band = getIOBBand(r.iob);
    const key = `${r.type}__${band}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(r);
  }
  
  // İstatistik özeti
  const summary = {};
  for (const [key, recs] of Object.entries(groups)) {
    const [type, band] = key.split('__');
    const deltas = recs.map(r => r.delta);
    const avgDelta = Math.round(deltas.reduce((a,b)=>a+b,0) / deltas.length);
    const avgPerMin = recs.reduce((a,r)=>a+r.deltaPerMin,0) / recs.length;
    const avgDuration = Math.round(recs.reduce((a,r)=>a+r.duration,0) / recs.length);
    if (!summary[type]) summary[type] = {};
    summary[type][band] = {
      count: recs.length,
      avgDelta,
      avgPerMin: Math.round(avgPerMin * 10) / 10,
      avgDuration
    };
  }
  
  // En sık tipler (en az 1 örneği olanlar)
  const typeCounts = {};
  for (const r of records) {
    typeCounts[r.type] = (typeCounts[r.type] || 0) + 1;
  }
  const sortedTypes = Object.keys(typeCounts).sort((a,b) => typeCounts[b] - typeCounts[a]);
  
  return {
    status: 'ok',
    totalCount: records.length,
    types: sortedTypes,
    summary,
    records: records.slice(-10).reverse()
  };
}

// === ADIM SAYISI ÖĞRENME ===
// Yürüyüş ve koşu kayıtlarından "1000 adım = X mg/dL düşüş" tahmini
function analyzeStepsImpact(days = 90) {
  const recent = getRecentDays(days);
  const stepRecords = [];
  
  for (const [date, entries] of Object.entries(recent)) {
    for (const e of entries) {
      if (e.type !== 'exercise') continue;
      if (typeof e.steps !== 'number' || e.steps <= 0) continue;
      if (typeof e.bgDelta !== 'number') continue;
      // Sadece yürüyüş ve koşu için adım anlamlı
      if (e.exType !== 'walk' && e.exType !== 'run') continue;
      stepRecords.push({
        date, time: e.time,
        exType: e.exType,
        steps: e.steps,
        duration: e.duration,
        delta: e.bgDelta,
        bgBefore: e.bg,
        bgAfter: e.bgAfter,
        iob: e.iobAtStart || 0,
        // Adım başına düşüş (mg/dL per 1000 adım)
        deltaPer1k: (e.bgDelta / e.steps) * 1000
      });
    }
  }
  
  if (stepRecords.length === 0) {
    return { status: 'empty', records: [] };
  }
  
  // İstatistik
  const totalSteps = stepRecords.reduce((s, r) => s + r.steps, 0);
  const totalDelta = stepRecords.reduce((s, r) => s + r.delta, 0);
  const avgPer1k = stepRecords.length > 0 ? (totalDelta / totalSteps) * 1000 : 0;
  const avgSteps = Math.round(totalSteps / stepRecords.length);
  const avgDelta = Math.round(totalDelta / stepRecords.length);
  
  // En son egzersiz (kullanıcıya somut örnek)
  const sorted = [...stepRecords].sort((a, b) => (b.date + b.time).localeCompare(a.date + a.time));
  
  return {
    status: 'ok',
    count: stepRecords.length,
    avgPer1k: Math.round(avgPer1k * 10) / 10,
    avgSteps,
    avgDelta,
    totalSteps,
    recent: sorted.slice(0, 5)
  };
}

// === SAATLİK ISF (Düzeltme Faktörü) ÖĞRENME ===
// Düzeltme bolusları: yemekten bağımsız, KŞ yüksekse insulin ver
// Sonra ölçülen KŞ ile delta'ya bak: 1Ü insulin kaç mg/dL düşürdü?
function analyzeHourlyISF(days = 30) {
  const recent = getRecentDays(days);
  const binData = {};
  HOUR_BINS.forEach(b => binData[b.key] = []);
  
  for (const [date, entries] of Object.entries(recent)) {
    for (const e of entries) {
      // Düzeltme entry'leri (correction) veya yüksek KŞ + bolus + 2 saat sonra ölçüm
      if (!(e.bg > 0)) continue;
      if (!(e.insulin > 0)) continue;
      if (!e.postMealBG || typeof e.postMealBG.value !== 'number') continue;
      
      // Sadece correction veya düşük carbs (ratio gürültüsü olmasın)
      const isCorrection = e.type === 'correction';
      const lowCarbs = (e.carbs || 0) < 5;
      if (!isCorrection && !lowCarbs) continue;
      
      // Sadece yüksek KŞ'den düşürmeyi say
      if (e.bg < 140) continue;
      
      const drop = e.bg - e.postMealBG.value;
      if (drop < 10) continue; // Anlamlı düşüş yok
      
      const isfEffective = drop / e.insulin;
      if (isfEffective < 10 || isfEffective > 200) continue; // Aykırı değer filtresi
      
      const hour = e.hour ?? parseInt(String(e.time || '0:0').split(':')[0]);
      const bin = getBinForHour(hour);
      
      binData[bin].push({
        date, time: e.time, hour,
        bg: e.bg, postBG: e.postMealBG.value,
        insulin: e.insulin, drop,
        isfEffective: Math.round(isfEffective)
      });
    }
  }
  
  const result = {};
  for (const [bin, records] of Object.entries(binData)) {
    if (records.length < 2) {
      result[bin] = { status: 'insufficient', count: records.length };
      continue;
    }
    const isfs = records.map(r => r.isfEffective);
    const avgISF = Math.round(isfs.reduce((a,b)=>a+b,0) / isfs.length);
    const usedISF = state.isf;
    
    let suggestion = '';
    if (Math.abs(avgISF - usedISF) > 15) {
      suggestion = `Senin gerçek ISF'in bu saatte ~${avgISF}, app ${usedISF} kullanıyor`;
    } else {
      suggestion = '✓ Mevcut ISF iyi';
    }
    
    result[bin] = {
      status: 'ok',
      count: records.length,
      avgISF,
      usedISF,
      suggestion,
      records: records.slice(-3).reverse()
    };
  }
  
  return result;
}

// Yemekten GI sınıfını çıkar — anahtar kelime + makro oranı kombinasyonu
// Kelimeler kelime sınırında eşleşir (et → "et" kelimesi, ama "etiket" değil)
function _giKwMatch(name, kw) {
  // Çok kısa keyword'ler (≤3 karakter) için word boundary gerekli
  if (kw.length <= 3) {
    const re = new RegExp('(^|[^a-zçğıöşü])' + kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '($|[^a-zçğıöşü])', 'i');
    return re.test(name);
  }
  return name.includes(kw);
}

function getFoodGI(foodName, item) {
  const name = (foodName || '').toLowerCase();
  
  // 1. ANAHTAR KELİME EŞLEŞMESİ (en güçlü sinyal)
  for (const kw of GI_KEYWORDS.low) {
    if (_giKwMatch(name, kw)) return { gi: 'low', source: 'keyword', kw };
  }
  for (const kw of GI_KEYWORDS.high) {
    if (_giKwMatch(name, kw)) {
      // Yağ/protein bol varsa düşür (örn pizza yüksek değil, orta)
      if (item) {
        const c = item.carbs || 0, p = item.protein || 0, f = item.fat || 0;
        const total = c + p + f;
        if (total > 0) {
          const cKcal = c * 4, pKcal = p * 4, fKcal = f * 9;
          const totalKcal = cKcal + pKcal + fKcal;
          if (totalKcal > 0) {
            const fPct = fKcal / totalKcal;
            const pPct = pKcal / totalKcal;
            if (fPct >= 0.30 || pPct >= 0.25) return { gi: 'medium', source: 'keyword+macro', kw, note: 'yağ/protein yavaşlatır' };
          }
        }
      }
      return { gi: 'high', source: 'keyword', kw };
    }
  }
  for (const kw of GI_KEYWORDS.medium) {
    if (_giKwMatch(name, kw)) return { gi: 'medium', source: 'keyword', kw };
  }
  
  // 2. MAKRO ORANI TABANLI tahmin (anahtar kelime yoksa)
  if (item) {
    const c = item.carbs || 0, p = item.protein || 0, f = item.fat || 0;
    const total = c + p + f;
    if (total < 1) return { gi: 'low', source: 'fallback' };
    
    const cKcal = c * 4, pKcal = p * 4, fKcal = f * 9;
    const totalKcal = cKcal + pKcal + fKcal;
    if (totalKcal === 0) return { gi: 'low', source: 'fallback' };
    
    const cPct = cKcal / totalKcal;
    const fPct = fKcal / totalKcal;
    const pPct = pKcal / totalKcal;
    
    // Yağ baskın (>30% kalori) → düşük GI
    if (fPct >= 0.30) return { gi: 'low', source: 'macro', note: 'yağ ağırlıklı' };
    // Protein baskın → düşük GI
    if (pPct >= 0.25) return { gi: 'low', source: 'macro', note: 'protein ağırlıklı' };
    // Yüksek KH oranlı (>70% kalori) → orta-yüksek
    if (cPct >= 0.85) return { gi: 'high', source: 'macro', note: 'saf KH' };
    if (cPct >= 0.70) return { gi: 'medium', source: 'macro', note: 'KH baskın' };
    return { gi: 'medium', source: 'fallback' };
  }
  
  return { gi: 'medium', source: 'unknown' };
}

const GI_LABELS = {
  high:   { label: 'Hızlı pik',   emoji: '🔴', color: '#a03030', peakMin: 25, peakMax: 45,  description: 'KŞ hızlı yükselir, 30-45dk peak' },
  medium: { label: 'Orta hız',    emoji: '🟡', color: '#d97706', peakMin: 45, peakMax: 75,  description: 'KŞ orta hız yükselir, 60dk peak' },
  low:    { label: 'Yavaş/stabil',emoji: '🟢', color: '#5b9279', peakMin: 60, peakMax: 120, description: 'KŞ yavaş yükselir, 75-120dk peak' }
};

// Sepetin tamamı için glisemik pik tahmini
// Toplam KH + ağırlıklı GI + yağ/protein etkisi → peak süre + yükseliş tahmini
function calcGlycemicPeak(mealItems, isf, ratio) {
  if (!mealItems || mealItems.length === 0) return null;
  
  let totalCarbs = 0, totalProtein = 0, totalFat = 0;
  let weightedGiScore = 0; // 0=low, 1=medium, 2=high
  let totalCarbWeight = 0;
  const itemDetails = [];
  
  for (const item of mealItems) {
    const c = item.carbs || 0;
    const p = item.protein || 0;
    const f = item.fat || 0;
    totalCarbs += c;
    totalProtein += p;
    totalFat += f;
    
    const giInfo = getFoodGI(item.food, item);
    const score = giInfo.gi === 'high' ? 2 : giInfo.gi === 'medium' ? 1 : 0;
    
    if (c > 0) {
      weightedGiScore += score * c;
      totalCarbWeight += c;
    }
    itemDetails.push({ food: item.food, carbs: c, gi: giInfo.gi, score });
  }
  
  if (totalCarbs < 1) return null;
  
  // Ağırlıklı GI
  const avgScore = totalCarbWeight > 0 ? weightedGiScore / totalCarbWeight : 1;
  let combinedGi;
  if (avgScore >= 1.5) combinedGi = 'high';
  else if (avgScore >= 0.7) combinedGi = 'medium';
  else combinedGi = 'low';
  
  // Yağ ve protein peak'i geciktirir (yağ daha güçlü)
  const totalKcal = totalCarbs * 4 + totalProtein * 4 + totalFat * 9;
  const fatPct = totalKcal > 0 ? (totalFat * 9) / totalKcal : 0;
  const proteinPct = totalKcal > 0 ? (totalProtein * 4) / totalKcal : 0;
  
  let peakMin = GI_LABELS[combinedGi].peakMin;
  let peakMax = GI_LABELS[combinedGi].peakMax;
  
  // Yağ %25+ → +15dk geciktir, %35+ → +30dk
  let fatDelay = 0;
  if (fatPct >= 0.35) fatDelay = 30;
  else if (fatPct >= 0.25) fatDelay = 15;
  // Protein %25+ → +10dk
  let proteinDelay = proteinPct >= 0.25 ? 10 : 0;
  
  peakMin += fatDelay + proteinDelay;
  peakMax += fatDelay + proteinDelay;
  
  // Tahmini KŞ yükselişi:
  // Tipik: 1g KH ~3-5 mg/dL yükseltir (insulin etkisi öncesi)
  // İnsulin doğru hesap edildiyse net etki ~0 olmalı
  // Bu pik bolus öncesi tahmini, BOLUS YOKSA değer
  // Ama insulin pikinin geç gelişiyle (rapid 60-90dk peak), GI yüksekse mismatch olur
  const grossRise = totalCarbs * 4; // ortalama yükseliş gross
  
  // KH-insulin mismatch riski (insulin peak ~75dk, eğer yemek peak<60dk ise yüksek)
  let mismatchRisk = 'low';
  if (peakMin < 50 && combinedGi === 'high') mismatchRisk = 'high';
  else if (peakMin < 75 && combinedGi !== 'low') mismatchRisk = 'medium';
  
  return {
    combinedGi,
    label: GI_LABELS[combinedGi],
    peakMin: Math.round(peakMin),
    peakMax: Math.round(peakMax),
    totalCarbs: Math.round(totalCarbs),
    fatPct: Math.round(fatPct * 100),
    proteinPct: Math.round(proteinPct * 100),
    fatDelay,
    proteinDelay,
    grossRise: Math.round(grossRise),
    mismatchRisk,
    itemDetails
  };
}

function classifyMeal(entry) {
  const c = entry.carbs || 0;
  const p = entry.protein || 0;
  const f = entry.fat || 0;
  const total = c + p + f;
  if (total < 5) return 'unknown';
  
  const cPct = c / total;
  const pPct = p / total;
  const fPct = f / total;
  
  // Yağlı yemek: yağ >25% kalori payı (yağ 9 kcal/g, KH/protein 4 kcal/g)
  const cKcal = c * 4, pKcal = p * 4, fKcal = f * 9;
  const totalKcal = cKcal + pKcal + fKcal;
  if (totalKcal === 0) return 'unknown';
  
  const fKcalPct = fKcal / totalKcal;
  const pKcalPct = pKcal / totalKcal;
  
  if (fKcalPct >= 0.28) return 'high_fat';      // Pizza, kebap, kızartma (%28+ yağ kalori payı)
  if (pKcalPct >= 0.25) return 'high_protein';  // Et, balık ağırlıklı
  if (cPct >= 0.70 && f < 5) return 'fast_carb'; // Reçel, ekmek, makarna sade
  if (c >= 30) return 'mixed_carb';
  return 'mixed';
}

const MEAL_CLASS_LABELS = {
  fast_carb:    { label: 'Hızlı KH',      emoji: '⚡', color: '#5b9279' },
  mixed_carb:   { label: 'Karışık KH',    emoji: '🍽️', color: '#5b9279' },
  high_fat:     { label: 'Yağlı',         emoji: '🍕', color: '#d97706' },
  high_protein: { label: 'Proteinli',     emoji: '🥩', color: '#a8a06e' },
  mixed:        { label: 'Karışık',       emoji: '🍴', color: '#7a6f60' },
  unknown:      { label: 'Belirsiz',      emoji: '❓', color: '#a39885' }
};

function analyzeMealPatterns(days = 30) {
  const recent = getRecentDays(days);
  const classData = {};
  
  for (const [date, entries] of Object.entries(recent)) {
    for (const e of entries) {
      if (e.type !== 'meal' && e.type !== undefined && e.type !== 'food') continue;
      if (!(e.carbs > 5)) continue;
      if (!e.postMealBG || typeof e.postMealBG.value !== 'number') continue;
      if (typeof e.bg !== 'number') continue;
      
      const cls = classifyMeal(e);
      if (cls === 'unknown') continue;
      
      const delta = e.postMealBG.value - e.bg;
      if (!classData[cls]) classData[cls] = [];
      classData[cls].push({
        date, time: e.time,
        food: e.food,
        carbs: e.carbs, protein: e.protein || 0, fat: e.fat || 0,
        bg: e.bg, postBG: e.postMealBG.value, delta
      });
    }
  }
  
  const result = {};
  for (const [cls, recs] of Object.entries(classData)) {
    if (recs.length < 2) {
      result[cls] = { status: 'insufficient', count: recs.length };
      continue;
    }
    const deltas = recs.map(r => r.delta);
    const avgDelta = Math.round(deltas.reduce((a,b)=>a+b,0) / deltas.length);
    const goodMeals = recs.filter(r => Math.abs(r.delta) <= 50).length;
    const highMeals = recs.filter(r => r.delta > 80).length;
    
    let suggestion = '';
    if (cls === 'high_fat' && avgDelta > 60) {
      suggestion = 'Yağlı yemeklerde gecikmeli yükseliş var. Bolus dozunu %15-20 artırmayı veya 3-4 saat sonra düzeltme bolusu düşün.';
    } else if (cls === 'high_protein' && avgDelta > 50) {
      suggestion = 'Proteinli yemekler beklediğinden fazla yükseltiyor. Yarısını proteine göre dozla.';
    } else if (cls === 'fast_carb' && avgDelta > 80) {
      suggestion = 'Hızlı KH peak\'i çok yüksek. Bolus zamanlaması (yemekten 15-20dk önce) deneyebilirsin.';
    } else if (Math.abs(avgDelta) <= 40) {
      suggestion = '✓ Bu tip yemekler için iyi yönetim';
    }
    
    result[cls] = {
      status: 'ok',
      count: recs.length,
      avgDelta,
      goodMeals, highMeals,
      goodPct: Math.round(goodMeals / recs.length * 100),
      suggestion,
      records: recs.slice(-3).reverse()
    };
  }
  
  return result;
}

// ============================================================================
// Etiketlenmiş günlerde KŞ ortalaması farkı

function analyzeTagImpact(days = 60) {
  const recent = getRecentDays(days);
  const buckets = {
    normal:   { bgs: [] },
    stress:   { bgs: [] }, // stress >= 2 (Orta+Yüksek)
    illness:  { bgs: [] },
    alcohol:  { bgs: [] }
  };
  
  for (const [date, entries] of Object.entries(recent)) {
    const tags = LS.get(`karbsayar:tags:${date}`) || {};
    
    // Bu günün tüm BG'leri
    const dayBGs = [];
    for (const e of entries) {
      if (typeof e.bg === 'number' && e.bg > 0) dayBGs.push(e.bg);
      if (e.type === 'sleep') {
        if (typeof e.bgBed === 'number') dayBGs.push(e.bgBed);
        if (typeof e.bgWake === 'number') dayBGs.push(e.bgWake);
      }
      if (e.postMealBG && typeof e.postMealBG.value === 'number') dayBGs.push(e.postMealBG.value);
    }
    
    if (dayBGs.length === 0) continue;
    
    const hasStress = (tags.stress || 0) >= 2;
    const hasIllness = !!tags.illness;
    const hasAlcohol = !!tags.alcohol;
    const isNormal = !hasStress && !hasIllness && !hasAlcohol;
    
    if (isNormal) buckets.normal.bgs.push(...dayBGs);
    if (hasStress) buckets.stress.bgs.push(...dayBGs);
    if (hasIllness) buckets.illness.bgs.push(...dayBGs);
    if (hasAlcohol) buckets.alcohol.bgs.push(...dayBGs);
  }
  
  const compute = (arr) => {
    if (arr.length < 5) return { status: 'insufficient', count: arr.length };
    const avg = Math.round(arr.reduce((a,b)=>a+b,0) / arr.length);
    const tir = arr.filter(b => b >= 70 && b <= 180).length;
    return {
      status: 'ok',
      count: arr.length,
      avg,
      tirPct: Math.round(tir / arr.length * 100)
    };
  };
  
  return {
    normal:   compute(buckets.normal.bgs),
    stress:   compute(buckets.stress.bgs),
    illness:  compute(buckets.illness.bgs),
    alcohol:  compute(buckets.alcohol.bgs)
  };
}

// ============================================================================
// FAZ 5: TAHMİN MOTORU
// ============================================================================
// Egzersiz hassasiyetinden + ISF/ratio'dan + IOB'tan
// "Şu an Z durumda, X dakika Y yapsan KŞ ne olur?" tahmini

// === EGZERSİZ ÖNCESİ/SONRASI KH ÖNERİSİ ===
// KŞ + IOB + egzersiz tipi/yoğunluk → ne kadar KH almalı
// Hedef: egzersiz başlangıcı KŞ 100-160 arası, sonu >70
// === PATTERN ALARM SİSTEMİ ===
// Otomatik tespit edilen riskli pattern'lar (3+ gün üst üste, vb.)
// === SEYAHAT MODU / TIMEZONE GEÇİŞİ ===
// Doğu yönüne (saat ileri): bazal saati kademe kademe öne çek (1-2sa/gün)
// Batı yönüne (saat geri): bazal saati kademe kademe geri at
// Hedef: hedef şehir saatine 2-3 günde uyum sağla
function getTravelGuidance() {
  if (!state.travelModeOn) return null;
  const shift = parseInt(state.travelTZShift) || 0;
  if (shift === 0) return null;
  if (!state.travelStartDate) return null;
  
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const start = new Date(state.travelStartDate + 'T00:00:00');
  if (isNaN(start.getTime())) return null;
  const end = state.travelEndDate ? new Date(state.travelEndDate + 'T00:00:00') : null;
  if (end && isNaN(end.getTime())) return null;
  
  const daysSinceStart = Math.floor((today - start) / 86400000);
  if (daysSinceStart < 0) {
    return {
      status: 'before',
      daysUntil: Math.abs(daysSinceStart),
      shift,
      direction: shift > 0 ? 'east' : 'west'
    };
  }
  
  if (end && today > end) return null;
  
  // Geçiş hızı: günde max 2 saat kayma
  const adjustPerDay = 2;
  const totalAdjustNeeded = Math.abs(shift);
  const daysToAdjust = Math.ceil(totalAdjustNeeded / adjustPerDay);
  const currentAdjust = Math.min(totalAdjustNeeded, (daysSinceStart + 1) * adjustPerDay);
  const remainingAdjust = totalAdjustNeeded - currentAdjust;
  
  // Şu anki bazal saati önerisi (state.basalTime'e göre kayma)
  const baseMatch = (state.basalTime || '22:00').match(/^(\d{1,2}):(\d{2})$/);
  if (!baseMatch) return null;
  const baseH = parseInt(baseMatch[1]);
  const baseM = parseInt(baseMatch[2]);
  
  const adjDir = shift > 0 ? -1 : 1; // doğu yönü → daha erken (saatler ileri)
  const adjH = (baseH + adjDir * currentAdjust + 24) % 24;
  const suggestedTime = `${String(adjH).padStart(2,'0')}:${String(baseM).padStart(2,'0')}`;
  
  return {
    status: 'active',
    daysSinceStart,
    daysToAdjust,
    currentAdjust,
    remainingAdjust,
    shift,
    direction: shift > 0 ? 'east' : 'west',
    suggestedBasalTime: suggestedTime,
    originalBasalTime: state.basalTime
  };
}

function detectPatternAlarms() {
  const alarms = [];
  const all = getAllDayEntries();
  const sortedDates = Object.keys(all).sort().reverse();
  
  // 1. Son 3 gün üst üste sabah yüksek (5-9 saat arası KŞ >180)
  let consecutiveHighMornings = 0;
  let highMorningDates = [];
  for (let i = 0; i < Math.min(7, sortedDates.length); i++) {
    const date = sortedDates[i];
    const entries = all[date] || [];
    const morningBGs = [];
    for (const e of entries) {
      if (typeof e.bg !== 'number' || !e.time) continue;
      const hour = parseInt(String(e.time).split(':')[0]);
      if (hour >= 5 && hour <= 9) morningBGs.push(e.bg);
      if (e.type === 'sleep' && typeof e.bgWake === 'number') morningBGs.push(e.bgWake);
    }
    if (morningBGs.length === 0) {
      // Veri yok, çık
      if (consecutiveHighMornings < 3) break;
      else break;
    }
    const avg = morningBGs.reduce((s, b) => s + b, 0) / morningBGs.length;
    if (avg > 180) {
      consecutiveHighMornings++;
      highMorningDates.push({ date, avg: Math.round(avg) });
    } else {
      break;
    }
  }
  if (consecutiveHighMornings >= 3) {
    alarms.push({
      id: 'high-morning',
      severity: 'warning',
      icon: '🌅',
      title: 'Sabahları sürekli yüksek',
      desc: `${consecutiveHighMornings} gün üst üste sabah KŞ ortalaması >180 mg/dL.`,
      action: 'Bazal yetersiz olabilir veya dawn fenomeni belirginleşmiş. Doktorla bazal artışı veya akşam yemeği bolus zamanını gözden geçir.',
      dates: highMorningDates
    });
  }
  
  // 2. Son 7 gün içinde 3+ hipo
  const last7Dates = sortedDates.slice(0, 7);
  let recentHypos = 0;
  let hypoDetails = [];
  for (const date of last7Dates) {
    for (const e of (all[date] || [])) {
      if (e.type === 'hypo') {
        recentHypos++;
        hypoDetails.push({ date, time: e.time, bg: e.bg });
      }
    }
  }
  if (recentHypos >= 3) {
    alarms.push({
      id: 'frequent-hypo',
      severity: recentHypos >= 5 ? 'critical' : 'warning',
      icon: '⚠️',
      title: 'Son 7 günde sık hipo',
      desc: `${recentHypos} hipo. Hedef: hafta başına ≤1.`,
      action: 'Bolus dozlarını %10-15 azaltmayı düşün. Egzersiz öncesi/sonrası KH al. ISF değerini doktorla gözden geçir.',
      records: hypoDetails.slice(0, 5)
    });
  }
  
  // 3. Son 5 gün ortalama KŞ >200
  const last5Dates = sortedDates.slice(0, 5);
  const recent5BGs = [];
  for (const date of last5Dates) {
    for (const e of (all[date] || [])) {
      if (typeof e.bg === 'number' && e.bg > 0) recent5BGs.push(e.bg);
      if (e.postMealBG && typeof e.postMealBG.value === 'number') recent5BGs.push(e.postMealBG.value);
    }
  }
  if (recent5BGs.length >= 10) {
    const avg = recent5BGs.reduce((s, b) => s + b, 0) / recent5BGs.length;
    if (avg > 200) {
      alarms.push({
        id: 'high-avg',
        severity: 'critical',
        icon: '📈',
        title: '5 günlük ortalama yüksek',
        desc: `Ortalama KŞ ${Math.round(avg)} mg/dL (HbA1c tahmini ≈ ${((avg + 46.7) / 28.7).toFixed(1)}%).`,
        action: 'Bolus oranı ve ISF değerlerini doktorla gözden geçir. Hasta mısın? Stres mi var? Genel ayar değişikliği gerekebilir.'
      });
    }
  }
  
  // 4. Bolus atlanmış öğün riski (3+ kez son 7 gün)
  let mealsWithoutBolus = 0;
  let mealsTotal = 0;
  for (const date of last7Dates) {
    for (const e of (all[date] || [])) {
      if ((e.type === 'meal' || e.type === undefined) && e.carbs > 10) {
        mealsTotal++;
        if (!(e.insulin > 0)) mealsWithoutBolus++;
      }
    }
  }
  if (mealsWithoutBolus >= 3) {
    alarms.push({
      id: 'missed-bolus',
      severity: 'warning',
      icon: '💉',
      title: 'Bolus atlanmış öğünler',
      desc: `Son 7 günde ${mealsWithoutBolus} öğünde (${mealsTotal} toplam) bolus kaydı yok.`,
      action: 'Yemek hatırlatmalarını aç (Ayarlar → Yemek Hatırlatmaları), telefon bildirimleri etkinleştir.'
    });
  }
  
  // 5. Egzersiz sonrası hipo paterni (son 30 gün)
  const last30Dates = sortedDates.slice(0, 30);
  let exerciseFollowedByHypo = 0;
  let totalExercises = 0;
  for (const date of last30Dates) {
    const entries = all[date] || [];
    for (let i = 0; i < entries.length; i++) {
      const e = entries[i];
      if (e.type !== 'exercise') continue;
      totalExercises++;
      // Sonraki 6 saat içinde hipo var mı?
      const exTime = e.time || '00:00';
      const exMin = parseInt(exTime.split(':')[0]) * 60 + parseInt(exTime.split(':')[1]);
      for (let j = i + 1; j < entries.length; j++) {
        const e2 = entries[j];
        if (e2.type !== 'hypo') continue;
        const e2Time = e2.time || '00:00';
        const e2Min = parseInt(e2Time.split(':')[0]) * 60 + parseInt(e2Time.split(':')[1]);
        const diff = e2Min - exMin;
        if (diff > 0 && diff <= 360) {
          exerciseFollowedByHypo++;
          break;
        }
      }
    }
  }
  if (totalExercises >= 5 && exerciseFollowedByHypo >= 3 && (exerciseFollowedByHypo / totalExercises) >= 0.4) {
    alarms.push({
      id: 'exercise-hypo',
      severity: 'warning',
      icon: '🏃',
      title: 'Egzersiz sonrası sık hipo',
      desc: `${totalExercises} egzersizden ${exerciseFollowedByHypo}'si (${Math.round(exerciseFollowedByHypo/totalExercises*100)}%) hipoyla bitti.`,
      action: 'Egzersiz öncesi 15-20g KH al. Egzersiz öncesi yemek bolusunu %20-30 azalt.'
    });
  }
  
  return alarms;
}

function calcExerciseSnack(currentBG, iob, exType, duration, intensity) {
  if (!currentBG || isNaN(currentBG)) return null;
  
  const intensityFactor = intensity === 'light' ? 0.5 : intensity === 'high' ? 1.5 : 1.0;
  const durationHours = (duration || 30) / 60;
  
  // Egzersiz tipi başına ortalama KŞ düşüşü (mg/dL/saat, orta yoğunluk)
  const baseDeltaPerHour = {
    walk: 30, run: 80, bike: 60, fitness: 50, swim: 70, other: 50
  };
  const expectedDrop = (baseDeltaPerHour[exType] || 50) * durationHours * intensityFactor;
  
  // IOB'nin etkisi (her 1Ü ~50mg/dL düşürür, ISF tabanlı)
  const isf = state.isf || 50;
  const iobDrop = (iob || 0) * isf;
  
  // Toplam tahmini düşüş
  const totalExpectedDrop = expectedDrop + iobDrop;
  
  // Hedef egzersiz sonu KŞ: 90 mg/dL
  const targetEndBG = 90;
  const projectedEndBG = currentBG - totalExpectedDrop;
  
  let recommendation, color, snackG = 0, urgency = 'low';
  
  if (currentBG < 70) {
    recommendation = '⚠ Hipo bölgesinde — egzersizi başlatma! 15-20g hızlı KH al, 15dk bekle, KŞ kontrol et.';
    color = '#a03030';
    snackG = 20;
    urgency = 'critical';
  } else if (currentBG < 100 && (iob > 0.5 || expectedDrop > 30)) {
    snackG = 15;
    recommendation = `KŞ ${currentBG} düşük + ${iob > 0.5 ? `${fmt(iob,1)}Ü IOB` : 'egzersiz uzun'}. ${snackG}g KH al (1 muz / 1 elma / 3-4 glukoz tableti).`;
    color = '#d97706';
    urgency = 'high';
  } else if (projectedEndBG < 70 && totalExpectedDrop > 0) {
    // Hedef altına düşecek — telafi gerek
    const deficit = targetEndBG - projectedEndBG;
    snackG = Math.ceil(deficit / 4); // 1g KH ~4 mg/dL
    snackG = Math.min(60, Math.max(10, Math.round(snackG / 5) * 5));
    recommendation = `Tahmin: KŞ ${Math.round(projectedEndBG)} mg/dL'e düşecek. ${snackG}g KH al${snackG >= 30 ? ' (kompleks KH öner — pirinç pilavı, ekmek)' : ' (1 muz / 1 elma / glukoz tabletleri)'}.`;
    color = '#d97706';
    urgency = 'medium';
  } else if (projectedEndBG < 90) {
    snackG = 10;
    recommendation = `Sınırda olabilir. ${snackG}g hafif KH (1 yarım muz / 1 dilim ekmek) güvenli olur.`;
    color = '#a8a06e';
    urgency = 'low';
  } else if (currentBG > 250) {
    recommendation = '⚠ KŞ çok yüksek (>250). Önce keton kontrol et. Yoğun egzersiz yapma — ketozis riski.';
    color = '#a03030';
    urgency = 'critical';
  } else if (currentBG > 180) {
    recommendation = `KŞ ${currentBG} biraz yüksek. Egzersiz iyi düşürür, snack gerekmez. KŞ kontrol et.`;
    color = '#5b9279';
    urgency = 'low';
  } else {
    recommendation = `✓ KŞ ${currentBG} ideal. Tahmini bitiş ${Math.round(projectedEndBG)}. Snack gerekmez.`;
    color = '#047857';
    urgency = 'none';
  }
  
  return {
    snackG,
    recommendation,
    color,
    urgency,
    expectedDrop: Math.round(totalExpectedDrop),
    projectedEndBG: Math.round(projectedEndBG),
    iobDrop: Math.round(iobDrop)
  };
}

function predictExerciseImpact(exType, duration, intensity, currentBG, currentIOB) {
  const exA = analyzeExerciseSensitivity(90);
  if (exA.status === 'empty' || exA.totalCount < 3) {
    return { status: 'insufficient', message: 'En az 3 egzersiz kaydı gerekli' };
  }
  
  const band = getIOBBand(currentIOB);
  const typeData = exA.summary[exType];
  
  // İlk olarak: tam tip+band eşleşmesi
  if (typeData && typeData[band] && typeData[band].count >= 2) {
    const d = typeData[band];
    // perMin'e göre ölçekle
    const projectedDelta = Math.round(d.avgPerMin * duration);
    const predictedBG = currentBG ? Math.round(currentBG + projectedDelta) : null;
    return {
      status: 'ok',
      confidence: 'high',
      basedOn: `${d.count} benzer egzersiz`,
      projectedDelta,
      predictedBG,
      avgDeltaSample: d.avgDelta,
      sampleDuration: d.avgDuration
    };
  }
  
  // Fallback: aynı tip ama farklı band → en yakın bandı bul
  if (typeData) {
    const availBands = Object.keys(typeData);
    if (availBands.length > 0) {
      const closestBand = availBands[0];
      const d = typeData[closestBand];
      const projectedDelta = Math.round(d.avgPerMin * duration);
      const predictedBG = currentBG ? Math.round(currentBG + projectedDelta) : null;
      return {
        status: 'ok',
        confidence: 'medium',
        basedOn: `${d.count} ${exType} (farklı IOB seviyesi: ${IOB_BANDS.find(b=>b.key===closestBand)?.label})`,
        projectedDelta,
        predictedBG,
        avgDeltaSample: d.avgDelta,
        sampleDuration: d.avgDuration
      };
    }
  }
  
  // Genel ortalama
  let totalDelta = 0, totalCount = 0, totalDuration = 0;
  for (const t of Object.keys(exA.summary)) {
    for (const b of Object.keys(exA.summary[t])) {
      totalDelta += exA.summary[t][b].avgDelta * exA.summary[t][b].count;
      totalDuration += exA.summary[t][b].avgDuration * exA.summary[t][b].count;
      totalCount += exA.summary[t][b].count;
    }
  }
  if (totalCount > 0) {
    const avgPerMin = (totalDelta / totalCount) / (totalDuration / totalCount);
    const projectedDelta = Math.round(avgPerMin * duration);
    const predictedBG = currentBG ? Math.round(currentBG + projectedDelta) : null;
    return {
      status: 'ok',
      confidence: 'low',
      basedOn: `${totalCount} genel egzersiz (bu tip için yetersiz veri)`,
      projectedDelta,
      predictedBG
    };
  }
  
  return { status: 'insufficient' };
}

// Tüm günleri (today + history) tek listede topla
function getAllDayEntries() {
  const result = {};
  for (const [date, entries] of Object.entries(state.history)) {
    result[date] = entries;
  }
  result[state.date] = state.todayLog;
  return result;
}

// Son N günü filtrele
function getRecentDays(n) {
  const all = getAllDayEntries();
  const sorted = Object.keys(all).sort().reverse(); // En yeni önce
  const result = {};
  for (let i = 0; i < Math.min(n, sorted.length); i++) {
    result[sorted[i]] = all[sorted[i]];
  }
  return result;
}

// === BAZAL SAĞLIK ANALİZİ ===
// Uyku entry'lerinde bgBed → bgWake delta'sını analiz eder
function analyzeBasalHealth(days = 14) {
  const recent = getRecentDays(days);
  const sleepRecords = [];
  
  for (const [date, entries] of Object.entries(recent)) {
    for (const e of entries) {
      if (e.type === 'sleep' && typeof e.bgBed === 'number' && typeof e.bgWake === 'number') {
        sleepRecords.push({
          date,
          bgBed: e.bgBed,
          bgWake: e.bgWake,
          delta: e.bgWake - e.bgBed,
          quality: e.quality,
          durationMin: e.durationMin
        });
      }
    }
  }
  
  if (sleepRecords.length < 3) {
    return { status: 'insufficient', count: sleepRecords.length, message: 'En az 3 gece uyku verisi gerekli' };
  }
  
  // İstatistikler
  const deltas = sleepRecords.map(r => r.delta);
  const avgDelta = deltas.reduce((a,b)=>a+b, 0) / deltas.length;
  const stdDelta = Math.sqrt(deltas.map(d => (d - avgDelta) ** 2).reduce((a,b)=>a+b,0) / deltas.length);
  
  // Sınıflandırma
  const highMornings = sleepRecords.filter(r => r.delta > 40).length;
  const lowMornings = sleepRecords.filter(r => r.delta < -30).length;
  const stableMornings = sleepRecords.filter(r => Math.abs(r.delta) <= 30).length;
  
  // Skor: 0-100
  // Stabil = +1 puan, sapma her 10mg/dL = -2 puan
  let score = 100 - Math.min(50, Math.abs(avgDelta) * 1.5) - Math.min(30, stdDelta * 0.5);
  score = Math.max(0, Math.round(score));
  
  // Tavsiye
  let recommendation = '';
  let basalSuggestion = '';
  if (avgDelta > 40 && highMornings >= sleepRecords.length * 0.5) {
    recommendation = 'Sabah hyperglycemia paterni var. Bazal yetersiz görünüyor.';
    basalSuggestion = `${state.basalDose}Ü → ${Math.round((state.basalDose + 1) * 10)/10}Ü dene (1Ü artır, 3-5 gece izle)`;
  } else if (avgDelta < -30 && lowMornings >= sleepRecords.length * 0.4) {
    recommendation = 'Gece hipo eğilimi var. Bazal fazla olabilir.';
    basalSuggestion = `${state.basalDose}Ü → ${Math.round((state.basalDose - 1) * 10)/10}Ü dene (1Ü azalt, 3-5 gece izle)`;
  } else if (Math.abs(avgDelta) <= 20 && stdDelta < 30) {
    recommendation = 'Bazal dozu iyi seviyede. Devam.';
  } else if (stdDelta > 50) {
    recommendation = 'Geceler arası dalgalanma yüksek. Yemek/aktivite/stres etkilerini kontrol et.';
  } else {
    recommendation = 'Pattern karışık. Daha fazla veri biriktikçe analiz iyileşecek.';
  }
  
  return {
    status: 'ok',
    score,
    count: sleepRecords.length,
    avgDelta: Math.round(avgDelta),
    stdDelta: Math.round(stdDelta),
    highMornings, lowMornings, stableMornings,
    recommendation,
    basalSuggestion,
    records: sleepRecords
  };
}

// === SABAH HYPERGLYCEMIA / DAWN PHENOMENON ===
// Sabah uyanış KŞ + ilk 2 saatteki KŞ trendi (sabah 5-9 arası)
function analyzeDawnPhenomenon(days = 14) {
  const recent = getRecentDays(days);
  const morningBGs = [];
  
  for (const [date, entries] of Object.entries(recent)) {
    // Bu günde ilk yemek/ölçüm öncesi sabah KŞ
    const morningEntries = entries.filter(e => {
      const h = e.hour ?? parseInt(String(e.time || '0:0').split(':')[0]);
      return h >= 5 && h <= 9 && (typeof e.bg === 'number' || (e.type === 'sleep' && typeof e.bgWake === 'number'));
    });
    
    if (morningEntries.length === 0) continue;
    
    // En erken sabah KŞ
    morningEntries.sort((a, b) => {
      const ah = a.hour ?? parseInt(String(a.time || '0:0').split(':')[0]);
      const bh = b.hour ?? parseInt(String(b.time || '0:0').split(':')[0]);
      return ah - bh;
    });
    
    const first = morningEntries[0];
    const bg = first.type === 'sleep' ? first.bgWake : first.bg;
    morningBGs.push({ date, bg, time: first.time });
  }
  
  if (morningBGs.length < 3) {
    return { status: 'insufficient', count: morningBGs.length };
  }
  
  const values = morningBGs.map(m => m.bg);
  const avg = Math.round(values.reduce((a,b)=>a+b,0) / values.length);
  const max = Math.max(...values);
  const min = Math.min(...values);
  const above180 = morningBGs.filter(m => m.bg > 180).length;
  const above250 = morningBGs.filter(m => m.bg > 250).length;
  const inRange = morningBGs.filter(m => m.bg >= 80 && m.bg <= 130).length;
  const below70 = morningBGs.filter(m => m.bg < 70).length;
  
  const inRangePct = Math.round(inRange / morningBGs.length * 100);
  
  let pattern = '';
  if (avg > 160) pattern = 'high';
  else if (avg < 80) pattern = 'low';
  else pattern = 'good';
  
  return {
    status: 'ok',
    count: morningBGs.length,
    avg, max, min,
    above180, above250, inRange, below70, inRangePct,
    pattern,
    records: morningBGs
  };
}

// === GECE HİPO RİSKİ ===
// Geçmiş hypo entry'lerinde 0:00-06:00 arası olanları bul
function analyzeNightHypo(days = 30) {
  const recent = getRecentDays(days);
  const nightHypos = [];
  const totalHypos = [];
  
  for (const [date, entries] of Object.entries(recent)) {
    for (const e of entries) {
      if (e.type === 'hypo') {
        const h = e.hour ?? parseInt(String(e.time || '0:0').split(':')[0]);
        totalHypos.push({ date, hour: h, bg: e.bg, time: e.time });
        if (h >= 0 && h <= 6) {
          nightHypos.push({ date, hour: h, bg: e.bg, time: e.time });
        }
      }
    }
  }
  
  return {
    count: nightHypos.length,
    totalHypos: totalHypos.length,
    records: nightHypos,
    rate: totalHypos.length > 0 ? Math.round(nightHypos.length / totalHypos.length * 100) : 0,
    perWeek: Math.round(nightHypos.length / Math.max(1, days/7) * 10) / 10
  };
}

// === HİPO NEDEN ANALİZİ ===
// Her hipo için öncesindeki 4 saati incele
// Yüksek bolus, IOB var mı, egzersiz var mı, atlanmış öğün?
function analyzeHypoCauses(days = 60) {
  const recent = getRecentDays(days);
  const allDays = Object.keys(recent).sort();
  const hypos = [];
  
  // Tüm hipoları topla (date + minute formatında)
  for (const date of allDays) {
    for (const e of (recent[date] || [])) {
      if (e.type !== 'hypo') continue;
      const tParts = (e.time || '00:00').split(':');
      const min = parseInt(tParts[0]) * 60 + parseInt(tParts[1]);
      hypos.push({ date, time: e.time, min, bg: e.bg, hour: parseInt(tParts[0]) });
    }
  }
  
  if (hypos.length === 0) return { count: 0, status: 'no-hypos' };
  
  const causes = {
    highBolus: 0,        // Son 4 saat içinde büyük bolus (>5Ü)
    correction: 0,       // Düzeltme bolusu
    exercise: 0,         // Egzersiz vardı
    nightTime: 0,        // 0-6 saat (bazal kaynaklı)
    afterMeal: 0,        // 1-3 saat sonra (ratio yüksek)
    skippedMeal: 0,      // 4+ saattir yemek yenmemiş ama insulin var
    multiBolus: 0,       // 4 saat içinde 2+ bolus (stack)
    unknown: 0
  };
  
  const detailed = [];
  
  for (const hypo of hypos) {
    const dateEntries = recent[hypo.date] || [];
    // Önceki 4 saat (önceki gün de olabilir)
    const prevDateIdx = allDays.indexOf(hypo.date);
    const prevDateEntries = prevDateIdx > 0 ? (recent[allDays[prevDateIdx - 1]] || []) : [];
    
    let lastBolus = null, lastBolusMinAgo = null;
    let lastMeal = null, lastMealMinAgo = null;
    let bolusCount4h = 0;
    let totalBolus4h = 0;
    let hadCorrection = false;
    let hadExercise = false;
    
    const checkEntry = (e, isPrevDay) => {
      const tParts = (e.time || '00:00').split(':');
      const eMin = parseInt(tParts[0]) * 60 + parseInt(tParts[1]);
      // dakika farkı (önceki günse + 24*60)
      const minAgo = (isPrevDay ? hypo.min + (24*60) - eMin : hypo.min - eMin);
      if (minAgo < 0 || minAgo > 240) return; // Sadece 0-4 saat arası
      
      const ins = typeof e.insulin === 'number' ? e.insulin : 0;
      if (e.type === 'correction') hadCorrection = true;
      if (e.type === 'exercise') hadExercise = true;
      if (e.type !== 'basal' && ins > 0) {
        bolusCount4h++;
        totalBolus4h += ins;
        if (!lastBolus || minAgo < lastBolusMinAgo) {
          lastBolus = e;
          lastBolusMinAgo = minAgo;
        }
      }
      if ((e.type === 'meal' || e.type === undefined || e.type === 'food') && (e.carbs || 0) > 0) {
        if (!lastMeal || minAgo < lastMealMinAgo) {
          lastMeal = e;
          lastMealMinAgo = minAgo;
        }
      }
    };
    
    for (const e of dateEntries) checkEntry(e, false);
    for (const e of prevDateEntries) checkEntry(e, true);
    
    // Sınıflandırma (ÖNCELİK SIRASIYLA)
    let primaryCause = 'unknown';
    
    if (hypo.hour >= 0 && hypo.hour <= 6) {
      causes.nightTime++;
      primaryCause = 'nightTime';
    } else if (hadExercise) {
      causes.exercise++;
      primaryCause = 'exercise';
    } else if (bolusCount4h >= 2) {
      causes.multiBolus++;
      primaryCause = 'multiBolus';
    } else if (hadCorrection) {
      causes.correction++;
      primaryCause = 'correction';
    } else if (lastBolus && lastBolusMinAgo <= 180 && totalBolus4h > 5) {
      causes.highBolus++;
      primaryCause = 'highBolus';
    } else if (lastBolus && lastBolusMinAgo <= 180 && lastBolusMinAgo > 60) {
      causes.afterMeal++;
      primaryCause = 'afterMeal';
    } else if (totalBolus4h > 0 && (!lastMeal || lastMealMinAgo > 240)) {
      causes.skippedMeal++;
      primaryCause = 'skippedMeal';
    } else {
      causes.unknown++;
    }
    
    detailed.push({
      date: hypo.date, time: hypo.time, bg: hypo.bg,
      cause: primaryCause,
      lastBolusMinAgo, totalBolus4h, bolusCount4h,
      hadExercise, hadCorrection,
      lastMealMinAgo
    });
  }
  
  return {
    count: hypos.length,
    status: 'ok',
    causes,
    detailed: detailed.slice(-10).reverse(), // Son 10 hipo
    perWeek: Math.round(hypos.length / Math.max(1, days/7) * 10) / 10
  };
}

// === GENEL TIME IN RANGE (son 14 gün) ===
function analyzeTIR(days = 14) {
  const recent = getRecentDays(days);
  const allBGs = [];
  
  for (const [date, entries] of Object.entries(recent)) {
    for (const e of entries) {
      // Tüm KŞ değerlerini topla
      if (typeof e.bg === 'number' && e.bg > 0) {
        allBGs.push(e.bg);
      }
      if (e.type === 'sleep') {
        if (typeof e.bgBed === 'number') allBGs.push(e.bgBed);
        if (typeof e.bgWake === 'number') allBGs.push(e.bgWake);
      }
      if (e.type === 'exercise') {
        if (typeof e.bgAfter === 'number') allBGs.push(e.bgAfter);
      }
      // postMealBG
      if (e.postMealBG && typeof e.postMealBG.value === 'number') {
        allBGs.push(e.postMealBG.value);
      }
    }
  }
  
  if (allBGs.length < 10) {
    return { status: 'insufficient', count: allBGs.length };
  }
  
  const avg = Math.round(allBGs.reduce((a,b)=>a+b,0) / allBGs.length);
  const inRange = allBGs.filter(b => b >= 70 && b <= 180).length;
  const high = allBGs.filter(b => b > 180).length;
  const veryHigh = allBGs.filter(b => b > 250).length;
  const low = allBGs.filter(b => b < 70).length;
  const veryLow = allBGs.filter(b => b < 54).length;
  
  // Standart sapma
  const std = Math.sqrt(allBGs.map(b => (b - avg) ** 2).reduce((a,b)=>a+b,0) / allBGs.length);
  
  return {
    status: 'ok',
    count: allBGs.length,
    avg, std: Math.round(std),
    tirPct: Math.round(inRange / allBGs.length * 100),
    highPct: Math.round(high / allBGs.length * 100),
    veryHighPct: Math.round(veryHigh / allBGs.length * 100),
    lowPct: Math.round(low / allBGs.length * 100),
    veryLowPct: Math.round(veryLow / allBGs.length * 100),
    cv: Math.round(std / avg * 100) // coefficient of variation
  };
}

function startCarbPractice() {
  const eligible = Object.entries(DB).filter(([k, v]) => v.c > 5 && v.c < 80);
  if (eligible.length === 0) return;
  const [key, food] = eligible[Math.floor(Math.random() * eligible.length)];
  const units = food.u || [['gram', 1]];
  const firstUnit = units[0];
  const unitName = firstUnit[0];
  const unitG = firstUnit[1];
  const qty = (unitName === 'gram' || unitName === 'ml') ? 100 : Math.floor(Math.random() * 2) + 1;
  const portion = qty * unitG;
  state.practiceQuestion = {
    name: food.n, qty, unit: unitName, portion,
    realCarbs: Math.round((food.c * portion / 100) * 10) / 10,
    realProtein: Math.round((food.p * portion / 100) * 10) / 10,
    realFat: Math.round((food.f * portion / 100) * 10) / 10
  };
  state.practiceGuess = '';
  state.practiceResult = null;
  render();
}

function submitCarbGuess() {
  const q = state.practiceQuestion;
  if (!q) return;
  const guess = parseFloat(String(state.practiceGuess).replace(',', '.'));
  if (isNaN(guess)) return;
  const diff = guess - q.realCarbs;
  const absDiff = Math.abs(diff);
  const pctErr = (absDiff / q.realCarbs) * 100;
  let grade, color, msg;
  if (absDiff <= 5 || pctErr <= 10) { grade = 'Mükemmel'; color = '#047857'; msg = '🎯 İnanılmaz iyi tahmin!'; }
  else if (absDiff <= 10 || pctErr <= 20) { grade = 'İyi'; color = '#059669'; msg = '✓ İyi tahmin, klinik olarak yeterli'; }
  else if (absDiff <= 15 || pctErr <= 30) { grade = 'Geliştirilebilir'; color = '#d97706'; msg = '⚠ Çok uzak değil ama daha keskin olabilir'; }
  else { grade = 'Zayıf'; color = '#a03030'; msg = '⚠ Bu fark hipo/hyper riski yaratır'; }
  state.practiceResult = { guess, real: q.realCarbs, diff, absDiff: Math.round(absDiff * 10) / 10, pctErr: Math.round(pctErr), grade, color, msg };
  const stats = LS.get('karbsayar:practice-stats') || { count: 0, totalErr: 0, perfect: 0, good: 0, bad: 0 };
  stats.count++;
  stats.totalErr += absDiff;
  if (absDiff <= 5) stats.perfect++;
  else if (absDiff <= 10) stats.good++;
  else if (absDiff > 15) stats.bad++;
  LS.set('karbsayar:practice-stats', stats);
  render();
}

function cancelCarbPractice() {
  state.practiceQuestion = null;
  state.practiceResult = null;
  state.practiceGuess = '';
  render();
}

// ============================================================================
// TDD - Total Daily Dose
// ============================================================================
function calcTDD(entries) {
  let bolus = 0, basal = 0;
  entries.forEach(e => {
    const ins = typeof e.insulin === 'number' ? e.insulin : 0;
    if (e.type === 'basal') basal += ins;
    else bolus += ins;
  });
  return { bolus, basal, total: bolus + basal };
}

// ============================================================================
// HbA1c TAHMİNİ - ADAG formülü (Nathan et al, 2008)
// HbA1c = (avgBG mg/dL + 46.7) / 28.7
// Geriye dönük 90 gün KŞ ortalaması kullanılır
// ============================================================================
function estimateHbA1c(days) {
  const entries = getAllEntriesInPeriod(days);
  const bgValues = [];
  entries.forEach(e => {
    if (e.bg && e.bg > 0) bgValues.push(e.bg);
    if (e.postMealBG && typeof e.postMealBG.value === 'number') bgValues.push(e.postMealBG.value);
  });
  if (bgValues.length < 10) return null;
  const avgBG = bgValues.reduce((s, v) => s + v, 0) / bgValues.length;
  const a1c = (avgBG + 46.7) / 28.7;
  return { avgBG, a1c, n: bgValues.length };
}

// ============================================================================
// SAATLİK KŞ HEATMAP - hangi saatlerde sürekli yüksek/düşük
// ============================================================================
function calcHourlyBG(days) {
  const entries = getAllEntriesInPeriod(days);
  const buckets = {}; // 0-23 saat
  for (let h = 0; h < 24; h++) buckets[h] = [];

  entries.forEach(e => {
    if (e.bg && e.bg > 0) {
      const h = getEntryHour(e);
      if (h >= 0 && h < 24) buckets[h].push(e.bg);
    }
    if (e.postMealBG && typeof e.postMealBG.value === 'number' && e.postMealBG.time) {
      const m = e.postMealBG.time.match(/^(\d{1,2}):/);
      if (m) {
        const h = parseInt(m[1], 10);
        if (h >= 0 && h < 24) buckets[h].push(e.postMealBG.value);
      }
    }
  });

  const result = [];
  for (let h = 0; h < 24; h++) {
    const arr = buckets[h];
    if (arr.length === 0) {
      result.push({ hour: h, n: 0, avg: null });
    } else {
      const avg = arr.reduce((s, v) => s + v, 0) / arr.length;
      result.push({ hour: h, n: arr.length, avg });
    }
  }
  return result;
}

// ============================================================================
// TREND ANALİZİ - oran önerisi
// ============================================================================
function analyzeTrend(days) {
  const entries = getAllEntriesInPeriod(days);
  const meals = entries.filter(e => e.type !== 'correction' && e.type !== 'basal' && e.type !== 'hypo' && e.type !== 'bg');
  const withDelta = meals.filter(e => e.bg && e.postMealBG && typeof e.postMealBG.value === 'number');
  if (withDelta.length < 5) return { insufficientData: true, n: withDelta.length };

  const deltas = withDelta.map(e => e.postMealBG.value - e.bg);
  const avgDelta = deltas.reduce((s, v) => s + v, 0) / deltas.length;
  const stdDev = Math.sqrt(deltas.reduce((s, v) => s + Math.pow(v - avgDelta, 2), 0) / deltas.length);

  // Mevcut ortalama oran
  let currentRatio;
  if (state.ratioMode === 'fixed') {
    currentRatio = state.insulinRatio;
  } else {
    const ratios = Object.values(state.ratios);
    currentRatio = ratios.reduce((s, v) => s + v, 0) / ratios.length;
  }

  // Öneri mantığı:
  // delta > +30: oran çok yüksek, bolus az kalıyor → oranı düşür (1Ü daha çok karşılasın - hayır az - dur)
  // KH/insulin oranı: 1Ü = X g KH. X küçükse aynı KH için daha çok insulin çıkar.
  // Yemek sonrası yüksek = az insulin gitti = X'i KÜÇÜLT (1Ü daha çok karb için yetsin değil, daha az karb için yetsin)
  // Yani: delta > 30 → ratio'yu (X'i) küçült (örn 12 → 11)
  // delta < -30 → fazla insulin gitti → ratio'yu büyüt (X'i artır)

  let suggestion = null;
  let direction = null;
  if (Math.abs(avgDelta) > 30) {
    if (avgDelta > 30) {
      const newRatio = Math.max(5, Math.round(currentRatio * 0.92 * 10) / 10);
      suggestion = newRatio;
      direction = 'down';
    } else {
      const newRatio = Math.min(30, Math.round(currentRatio * 1.08 * 10) / 10);
      suggestion = newRatio;
      direction = 'up';
    }
  }

  return {
    n: withDelta.length, avgDelta, stdDev, currentRatio,
    suggestion, direction
  };
}

        <svg viewBox="0 0 ${w} ${h}" class="bg-chart-svg" preserveAspectRatio="none">
          <!-- Hedef bandı (70-180) -->
          <rect x="${padL}" y="${tirTop}" width="${w - padL - padR}" height="${tirBot - tirTop}" fill="#5b927915" />
          <!-- Y ekseni etiketleri -->
          ${[70, 130, 180, 250].filter(v => v >= yMin && v <= yMax).map(v => `
            <line x1="${padL}" y1="${yScale(v).toFixed(1)}" x2="${w - padR}" y2="${yScale(v).toFixed(1)}" stroke="#ede4d3" stroke-width="0.5" stroke-dasharray="2,2"/>
            <text x="${padL - 4}" y="${(yScale(v) + 3).toFixed(1)}" font-size="9" fill="#a8a08e" text-anchor="end">${v}</text>
          `).join('')}
          <!-- X ekseni etiketleri -->
          ${hours.map(hr => `
            <text x="${xScale(hr * 60).toFixed(1)}" y="${h - 6}" font-size="9" fill="#a8a08e" text-anchor="middle">${hr}:00</text>
          `).join('')}
          <!-- Çizgi -->
          <path d="${linePath}" fill="none" stroke="#5b9279" stroke-width="2" stroke-linejoin="round"/>
          <!-- Noktalar -->
          ${bgPoints.map(p => `
            <circle cx="${xScale(p.min).toFixed(1)}" cy="${yScale(p.bg).toFixed(1)}" r="4" fill="${colorFor(p.bg)}" stroke="#fff" stroke-width="1.5"/>
            ${p.type === 'hypo' ? `<circle cx="${xScale(p.min).toFixed(1)}" cy="${yScale(p.bg).toFixed(1)}" r="7" fill="none" stroke="${colorFor(p.bg)}" stroke-width="1.5" opacity="0.5"/>` : ''}
            ${p.insulin > 0 ? `<text x="${xScale(p.min).toFixed(1)}" y="${(yScale(p.bg) - 8).toFixed(1)}" font-size="8" fill="#7a6f60" text-anchor="middle">💉${p.insulin > 9 ? '' : fmt(p.insulin, 1)}</text>` : ''}
          `).join('')}
        </svg>
        <div class="bg-chart-legend">
          <span><span style="display:inline-block;width:8px;height:8px;background:#5b927930;border-radius:1px;vertical-align:middle"></span> Hedef 70-180</span>
          <span style="color:#047857">● Normal</span>
          <span style="color:#d97706">● Sınır</span>
          <span style="color:#a03030">● Yüksek/Düşük</span>
        </div>
      </div>`;
    }
  }

  // Öğün sepeti paneli (mealItems > 0)
  if (state.mealItems.length > 0 && isToday) {
    const totals = getMealTotals();
    const now = new Date();
    const bg = parseFloat(String(state.currentBG || "").replace(",", ".")) || null;
    const dose = applyAllAdjustments(calcInsulin(totals.carbs, now.getHours(), bg, iobInfo.total));
    const doseFmt = fmt(dose.totalRounded, state.roundStep === 1 ? 0 : 1);

    html += `<div class="meal-panel">
      <h3>${svg('plus','icn icn-sm')} Bu Öğün · ${state.mealItems.length} yemek</h3>

      <div class="meal-type-row">
        ${MEAL_TYPE_KEYS.map(k => `
          <button class="meal-type-pill ${state.currentMealType === k ? 'active' : ''}" data-act="setMealType" data-type="${k}">
            <span class="em">${MEAL_TYPES[k].emoji}</span>
            <span>${MEAL_TYPES[k].name}</span>
          </button>
        `).join('')}
      </div>

      <div class="meal-items">
        ${state.mealItems.map((item, idx) => `
          <div class="meal-item">
            <div class="meal-item-info">
              <div class="meal-item-name">${esc(item.food)}</div>
              <div class="meal-item-meta">${item.qty && item.unit !== 'gram' ? `${fmtQty(item.qty)} ${item.unit} (${fmt(item.portion)}g)` : `${fmt(item.portion)}g`}</div>
            </div>
            <div class="meal-item-kh">${fmt(item.carbs, 1)}g KH</div>
            <button class="icon-btn" data-act="removeMealItem" data-idx="${idx}">${svg('trash','icn icn-sm')}</button>
          </div>
        `).join('')}
      </div>
      <div class="meal-totals">
        <div class="item">
          <div class="l">Toplam KH</div>
          <div class="v">${fmt(totals.carbs, 1)}<span style="font-size:14px">g</span></div>
        </div>
        <div class="item dose dose-clickable" data-act="toggleDoseBreakdown">
          <div class="l">Toplam İnsülin${state.bolusOverridePct !== 0 ? ` · ${state.bolusOverridePct > 0 ? '+' : ''}${state.bolusOverridePct}%` : ''}</div>
          <div class="v" style="${state.bolusOverridePct !== 0 ? 'color:#d97706' : ''}">${doseFmt}<span style="font-size:14px"> Ü</span></div>
          <div class="breakdown">${dose.label} · 1Ü=${fmt(dose.ratio)}g${dose.iobReduction > 0 ? ` · IOB −${fmt(dose.iobReduction,1)}` : dose.correction > 0 ? ` · +${fmt(dose.correction,1)} düz.` : ''}${dose.exerciseAdjusted ? ` · 🏃−${dose.exerciseReduction}%` : ''} <span class="dose-tap-hint">${state.doseBreakdownOpen ? '▼' : '▶'} detay</span></div>
        </div>
      </div>
      
      ${state.doseBreakdownOpen ? (() => {
        // Detaylı hesap kırılımı
        const carbDose = totals.carbs / dose.ratio;
        const rows = [];
        rows.push({ label: `KH dozu: ${fmt(totals.carbs, 1)}g ÷ ${fmt(dose.ratio)} g/Ü`, value: `${fmt(carbDose, 2)} Ü`, color: '#3a3530' });
        if (dose.rawCorrection > 0) {
          rows.push({ label: `Düzeltme: (${bg} − ${state.targetBG}) ÷ ${state.isf} mg/dL/Ü`, value: `+${fmt(dose.rawCorrection, 2)} Ü`, color: '#d97706' });
        }
        if (dose.iobReduction > 0) {
          rows.push({ label: `IOB azaltma: aktif insulin (${fmt(iobInfo.total, 1)}Ü)`, value: `−${fmt(dose.iobReduction, 2)} Ü`, color: '#5a4f70' });
        }
        rows.push({ label: 'Ham toplam', value: `${fmt(carbDose + dose.correction, 2)} Ü`, color: '#3a3530', bold: true });
        if (dose.exerciseAdjusted && dose.exerciseReduction > 0) {
          rows.push({ label: `🏃 Egzersiz indirim (−${dose.exerciseReduction}%)`, value: `×${(1 - dose.exerciseReduction / 100).toFixed(2)}`, color: '#5b9279' });
        }
        if (dose.sickAdjusted && state.sickModeMultiplier > 0) {
          rows.push({ label: `🤒 Hasta günü (+${state.sickModeMultiplier}%)`, value: `×${(1 + state.sickModeMultiplier / 100).toFixed(2)}`, color: '#d97706' });
        }
        if (dose.overrideApplied && state.bolusOverridePct !== 0) {
          rows.push({ label: `Manuel ayar (${state.bolusOverridePct > 0 ? '+' : ''}${state.bolusOverridePct}%)`, value: `×${(1 + state.bolusOverridePct / 100).toFixed(2)}`, color: '#d97706' });
        }
        rows.push({ label: `Yuvarlanmış (${state.roundStep === 1 ? '1Ü' : state.roundStep === 0.5 ? '0.5Ü' : '0.1Ü'} adım)`, value: `${fmt(dose.totalRounded, 2)} Ü`, color: '#047857', bold: true });
        
        return `<div class="dose-breakdown-panel">
          <div class="dose-breakdown-title">📐 Hesap Detayı</div>
          ${rows.map(r => `<div class="dose-breakdown-row" style="${r.bold ? 'font-weight:600' : ''}">
            <span style="color:${r.color}">${r.label}</span>
            <span style="color:${r.color};font-variant-numeric:tabular-nums">${r.value}</span>
          </div>`).join('')}
          <div class="tiny muted" style="margin-top:6px;font-size:10px;line-height:1.4">
            <b>Formül:</b> Ü = (KH ÷ ratio) + (KŞ − hedef) ÷ ISF − IOB · ayarlar
          </div>
        </div>`;
      })() : ''}
      
      <div class="bolus-override-row">
        <button class="bolus-override-btn" data-act="bolusOverrideMinus" title="−10%">−</button>
        <div class="bolus-override-info">
          <div class="bolus-override-label">Doz ayarı</div>
          <div class="bolus-override-value ${state.bolusOverridePct !== 0 ? 'active' : ''}">${state.bolusOverridePct === 0 ? 'Normal' : (state.bolusOverridePct > 0 ? '+' : '') + state.bolusOverridePct + '%'}</div>
        </div>
        <button class="bolus-override-btn" data-act="bolusOverridePlus" title="+10%">+</button>
        ${state.bolusOverridePct !== 0 ? `<button class="bolus-override-reset" data-act="bolusOverrideReset" title="Sıfırla">↺</button>` : ''}
      </div>
      ${(() => {
        const gp = calcGlycemicPeak(state.mealItems, state.isf, dose.ratio);
        if (!gp) return '';
        return `<div class="glycemic-card glycemic-${gp.combinedGi}">
          <div class="glycemic-header">
            <div class="glycemic-icon">${gp.label.emoji}</div>
            <div class="glycemic-info">
              <div class="glycemic-label">Glisemik pik</div>
              <div class="glycemic-title" style="color:${gp.label.color}">${gp.label.label}</div>
            </div>
            <div class="glycemic-time">
              <div class="glycemic-time-val">${gp.peakMin}–${gp.peakMax}<span class="glycemic-time-unit">dk</span></div>
              <div class="glycemic-time-lbl">peak süresi</div>
            </div>
          </div>
          ${gp.fatDelay > 0 || gp.proteinDelay > 0 ? `<div class="glycemic-modifier">
            ${gp.fatDelay > 0 ? `<span>🥑 Yağ %${gp.fatPct} → +${gp.fatDelay}dk geciktirir</span>` : ''}
            ${gp.proteinDelay > 0 ? `<span>🥩 Protein %${gp.proteinPct} → +${gp.proteinDelay}dk geciktirir</span>` : ''}
          </div>` : ''}
          ${gp.mismatchRisk === 'high' ? `<div class="glycemic-warning">
            ⚠ <b>Insulin-yemek uyumsuzluğu riski:</b> Hızlı pik (${gp.peakMin}dk), insulin peak (~75dk). Hipo + sonra yüksek riski. ${state.bolusBrand === 'Fiasp' || state.bolusBrand === 'Lyumjev' ? 'Fiasp/Lyumjev gibi ultra-hızlı insulin daha uyumlu.' : 'Pre-bolus zamanlamasına dikkat et.'}
          </div>` : gp.mismatchRisk === 'medium' ? `<div class="glycemic-note">
            ℹ Pre-bolus zamanlaması önemli (${state.bolusBrand} insulin peak ~75dk).
          </div>` : ''}
        </div>`;
      })()}
      
      ${(() => {
        const pb = calcPrebolusTiming(state.mealItems, bg, iobInfo.total);
        if (!pb) return '';
        const cls = MEAL_CLASS_LABELS[pb.mealClass] || MEAL_CLASS_LABELS.mixed;
        let timingTxt = '', timingCol = '#5b9279';
        if (pb.strategy === 'wait') {
          timingTxt = '⚠ Önce KH al, sonra bolus';
          timingCol = '#a03030';
        } else if (pb.strategy === 'split') {
          timingTxt = `Şimdi yarı / ${pb.recommendedMin || 30}dk sonra yarı (split)`;
          timingCol = '#d97706';
        } else if (pb.recommendedMin === 0) {
          timingTxt = 'Yemekle birlikte';
        } else {
          timingTxt = `${pb.recommendedMin}dk önce vur, sonra ye`;
        }
        return `<div class="prebolus-card">
          <div class="prebolus-row">
            <div class="prebolus-icon">⏱️</div>
            <div class="prebolus-text">
              <div class="prebolus-main"><b>${cls.emoji} ${cls.label}</b> · <span style="color:${timingCol}">${timingTxt}</span></div>
              <div class="prebolus-sub">${esc(pb.reason)}</div>
            </div>
            ${pb.recommendedMin > 0 && pb.strategy !== 'wait' ? `<button class="prebolus-timer-btn" data-act="startPrebolusTimer" data-min="${pb.recommendedMin}" title="Bolus vurduktan sonra başlat">▶</button>` : ''}
          </div>
        </div>`;
      })()}
      ${showFPWarning(totals.fat, totals.protein) ? fpWarningHtml(totals.fat, totals.protein) : ''}
      <div class="exercise-toggle ${state.exerciseMode ? 'active' : ''}" data-act="toggleExercise">
        <span class="l"><span class="em">🏃</span> Egzersiz var / yakında <span style="font-size:11px;opacity:.85">(−${state.exerciseReduction}%)</span></span>
        <span class="switch"></span>
      </div>
      <div class="sick-toggle ${state.sickMode ? 'active' : ''}" data-act="toggleSickMode">
        <span class="l"><span class="em">🤒</span> Hasta günü <span style="font-size:11px;opacity:.85">(+${state.sickModeMultiplier}%)</span></span>
        <span class="switch"></span>
      </div>
      <div class="notes-row">
        <label>Not (opsiyonel)</label>
        <input class="in" type="text" placeholder="Doğum günü yemeği, geç bolus..." value="${esc(state.currentNotes)}" data-input="currentNotes">
      </div>
      <div class="meal-photo-row">
        ${state.pendingMealPhoto ? `
          <div class="meal-photo-preview">
            <img src="${state.pendingMealPhoto}" alt="Yemek fotoğrafı">
            <button class="meal-photo-remove" data-act="removeMealPhoto" title="Foto kaldır">×</button>
          </div>
        ` : `
          <button class="btn-photo-attach" data-act="triggerMealPhoto" type="button">
            📷 Yemek fotoğrafı ekle (opsiyonel)
          </button>
          <input type="file" accept="image/*" capture="environment" data-input="mealPhotoFile" style="display:none">
        `}
      </div>
      ${state.useCorrection ? `
        <div class="meal-bg-row">
          <label>Şu anki kan şekerin (opsiyonel — düzeltme için)</label>
          <div class="meal-bg-input">
            <input class="in" type="text" inputmode="decimal" placeholder="örn 180" value="${esc(state.currentBG)}" data-input="currentBG">
            <span class="tiny muted">mg/dL</span>
          </div>
        </div>
      ` : ''}
      <button class="template-save-btn" data-act="saveAsTemplate">${svg('plus','icn icn-sm')} Bu Öğünü Şablon Olarak Kaydet</button>
      <div class="btn-pair">
        <button class="btn btn-secondary" data-act="cancelMeal">Sepeti Boşalt</button>
        <button class="btn btn-primary" data-act="commitMeal">${svg('check','icn icn-sm')} Öğünü Kaydet · ${doseFmt} Ü</button>
      </div>
    </div>`;
  }

  if (state.estimate) {
    const e = state.estimate;
    const now = new Date();
    const hour = now.getHours();
    const bg = parseFloat(String(state.currentBG || "").replace(",", ".")) || null;
    const dose = applyAllAdjustments(calcInsulin(e.carbs, hour, bg, iobInfo.total));
    const inMeal = state.mealItems.length > 0;

    html += `<div class="card card-active">
      <div class="preview-row">
        <div>
          <div class="preview-name">${esc(e.food)}</div>
          <div class="preview-meta">${portionLabel(e)} · kaynak: ${e.source}</div>
        </div>
        <span class="conf ${confClass(e.confidence)}">${e.confidence}</span>
      </div>

      <div class="meal-type-row">
        ${MEAL_TYPE_KEYS.map(k => `
          <button class="meal-type-pill ${state.currentMealType === k ? 'active' : ''}" data-act="setMealType" data-type="${k}">
            <span class="em">${MEAL_TYPES[k].emoji}</span>
            <span>${MEAL_TYPES[k].name}</span>
          </button>
        `).join('')}
      </div>

      <div class="macro-grid">
        <div class="macro macro-blue"><div class="l">KH</div><div class="v">${fmt(e.carbs, 1)}</div><div class="s">${e.carbsPer100g}g/100g</div></div>
        <div class="macro macro-slate"><div class="l">Protein</div><div class="v">${fmt(e.protein, 1)}</div><div class="s">${e.proteinPer100g}g/100g</div></div>
        <div class="macro macro-slate"><div class="l">Yağ</div><div class="v">${fmt(e.fat, 1)}</div><div class="s">${e.fatPer100g}g/100g</div></div>
      </div>
      <div class="dose-card">
        <div class="dose-hdr">
          <span>${svg('drop','icn icn-sm')} Öğün İnsulini</span>
          <span>${dose.label}</span>
        </div>
        <div class="dose-main">
          <div class="dose-num">
            <div>
              <div style="display:flex;align-items:baseline;gap:3px"><span class="v">${fmt(dose.totalRaw, 2)}</span><span class="u">Ü</span></div>
              <span class="l">hesap</span>
            </div>
          </div>
          <div class="arrow">→</div>
          <div class="dose-num dose-rounded">
            <div>
              <div style="display:flex;align-items:baseline;gap:3px"><span class="v">${fmt(dose.totalRounded, state.roundStep === 1 ? 0 : 1)}</span><span class="u">Ü</span></div>
              <span class="l">${state.roundStep ? `kalem (${state.roundStep}Ü)` : 'gerçek'}</span>
            </div>
          </div>
        </div>
        <div class="dose-meta">
          ${(() => {
            const parts = [`1 Ü = ${fmt(dose.ratio)}g KH`, `KH: ${fmt(dose.carbDose, 2)} Ü`];
            if (dose.correction > 0 || dose.iobReduction > 0) {
              parts.push(`Düzeltme: ${fmt(dose.rawCorrection, 2)} Ü`);
            }
            if (dose.iobReduction > 0) {
              parts.push(`IOB: −${fmt(dose.iobReduction, 2)} Ü`);
            } else if (dose.iob > 0.05) {
              parts.push(`Aktif insülin var: ${fmt(dose.iob, 1)} Ü`);
            }
            if (dose.exerciseAdjusted) {
              parts.push(`Egzersiz: −${dose.exerciseReduction}% (${fmt(dose.preExerciseRaw, 2)} → ${fmt(dose.totalRaw, 2)})`);
            }
            return parts.join(' · ');
          })()}
        </div>
        ${state.useCorrection ? `
          <div class="dose-bg">
            <label>Şu anki kan şekerin (opsiyonel)</label>
            <div class="bg-row">
              <input class="bg-in" type="number" inputmode="decimal" placeholder="örn 180" value="${esc(state.currentBG)}" data-input="currentBG">
              <span class="bg-unit">mg/dL</span>
            </div>
            ${bg ? `<div class="bg-result">${
              bg > state.targetBG ? `Yüksek (+${bg - state.targetBG} mg/dL) → +${fmt(dose.correction, 2)} Ü düzeltme eklendi`
              : bg < state.targetBG ? `Düşük (-${state.targetBG - bg} mg/dL) → düzeltme eklenmedi, dikkatli ol`
              : 'Hedefte ✓'
            }</div>` : ''}
          </div>` : ''}
      </div>
      ${e.notes ? `<div class="note">💡 ${esc(e.notes)}</div>` : ''}
      ${showFPWarning(e.fat, e.protein) ? fpWarningHtml(e.fat, e.protein) : ''}
      <div class="exercise-toggle ${state.exerciseMode ? 'active' : ''}" data-act="toggleExercise">
        <span class="l"><span class="em">🏃</span> Egzersiz var / yakında <span style="font-size:11px;opacity:.85">(−${state.exerciseReduction}%)</span></span>
        <span class="switch"></span>
      </div>
      <div class="sick-toggle ${state.sickMode ? 'active' : ''}" data-act="toggleSickMode">
        <span class="l"><span class="em">🤒</span> Hasta günü <span style="font-size:11px;opacity:.85">(+${state.sickModeMultiplier}%)</span></span>
        <span class="switch"></span>
      </div>
      <div class="notes-row">
        <label>Not (opsiyonel)</label>
        <input class="in" type="text" placeholder="Stresli, geç yedim, kola eklendi..." value="${esc(state.currentNotes)}" data-input="currentNotes">
      </div>
      <div class="btn-pair">
        <button class="btn btn-secondary" data-act="cancelEstimate">${svg('x','icn icn-sm')} İptal</button>
        ${inMeal
          ? `<button class="btn btn-primary" data-act="addToMeal">${svg('plus','icn icn-sm')} Öğüne Ekle</button>`
          : `<button class="btn btn-primary" data-act="confirmAdd">${svg('check','icn icn-sm')} Güne Ekle</button>`
        }
      </div>
      ${!inMeal ? `
        <button class="add-more-link" data-act="addToMeal">
          ${svg('plus','icn icn-sm')} Bu öğüne yemek daha ekle (sepet)
        </button>
      ` : ''}
    </div>`;
  } else if (isToday && state.correctionFormOpen) {
    // Düzeltme / Ara iğne formu
    const preview = calcCorrectionPreview();
    html += `<div class="corr-card">
      <h3>${svg('drop','icn icn-sm')} Sadece Düzeltme / Ara İğne</h3>

      <div class="corr-input-block">
        <label>Şu anki kan şekerin (mg/dL)</label>
        <div class="corr-input-row">
          <input class="in" type="text" inputmode="decimal" placeholder="örn 180" value="${esc(state.correctionBG)}" data-input="correctionBG">
          <span class="tiny muted">mg/dL</span>
        </div>
        <div class="qc-presets-label">Hızlı seçim:</div>
        <div class="qc-presets">
          ${[150, 180, 200, 250, 300].map(v => `<button class="qc-preset ${state.correctionBG == v ? 'active' : ''}" data-act="setCorrectionBG" data-val="${v}">${v}</button>`).join('')}
        </div>
      </div>

      <div class="corr-or">— YA DA —</div>

      <div class="corr-input-block">
        <label>Manuel doz (doktor verdiyse, hesap istemezsen)</label>
        <div class="corr-input-row">
          <input class="in" type="text" inputmode="decimal" placeholder="örn 2" value="${esc(state.correctionManual)}" data-input="correctionManual">
          <span class="tiny muted">Ü</span>
        </div>
      </div>

      ${preview ? `
        <div class="corr-preview">
          <div>
            <span class="v">${fmt(preview.raw, 2)}</span><span style="font-size:14px;color:#a39885"> Ü</span>
            <span class="arrow">→</span>
            <span class="vr">${fmt(preview.rounded, state.roundStep === 1 ? 0 : 1)}</span><span style="font-size:18px;color:#5d4d7d"> Ü</span>
          </div>
          <div class="l">hesap → kalem ${state.roundStep ? `(${state.roundStep}Ü adım)` : ''}</div>
          <div class="breakdown">
            ${preview.type === 'manual' ? `Manuel: ${fmt(preview.raw, 2)} Ü${preview.iob > 0.05 ? ` · Aktif insülin: ${fmt(preview.iob, 1)} Ü (dikkat)` : ''}` :
              preview.type === 'manual_override' ? `Manuel ${fmt(preview.raw, 2)} Ü kullanılacak (hesap önerisi: ${fmt(preview.calculated, 2)} Ü)` :
              `KŞ ${preview.bg} → Hedef ${preview.target}, ISF ${preview.isf}<br>
               Ham: ${fmt(preview.rawCorrection, 2)} Ü${preview.iobReduction > 0 ? ` − IOB ${fmt(preview.iobReduction, 2)} Ü = ${fmt(preview.raw, 2)} Ü` : ''}`
            }
          </div>
        </div>
      ` : `<div class="corr-preview empty">KŞ veya manuel doz gir, hesap burada görünecek</div>`}

      ${state.error ? `<div class="err">${svg('alert','icn icn-sm')}<span>${esc(state.error)}</span></div>` : ''}

      <div class="notes-row">
        <label>Not (opsiyonel)</label>
        <input class="in" type="text" placeholder="Sabah yüksekliği, geç düzeltme..." value="${esc(state.correctionNotes)}" data-input="correctionNotes">
      </div>
