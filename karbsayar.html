            metaText = `${e.time}${e.endTime ? '→'+e.endTime : ''} · ${e.duration}dk${iobTxt}${deltaTxt}`;
          } else if (isSleep) {
            const hours = Math.floor((e.durationMin || 0) / 60);
            const mins = (e.durationMin || 0) % 60;
            const deltaTxt = e.bgDelta != null ? ` · ${e.bgDelta > 0 ? '+' : ''}${e.bgDelta} mg/dL` : '';
            metaText = `${e.bedTime}→${e.wakeTime} · ${hours}s${mins ? mins+'dk' : ''}${deltaTxt}`;
          } else if (isCorrection) {
            metaText = `${e.time} · ${e.bg ? `KŞ ${e.bg}` : 'manuel'} · düzeltme${e.brand ? ` · ${e.brand}` : ''}`;
          } else if (isMeal) {
            metaText = `${e.time} · ${e.items.length} yemek (${fmt(e.portion)}g) · öğün${e.brand ? ` · ${e.brand}` : ''}`;
          } else {
            metaText = `${e.time} · ${portionLabel(e)} · ${e.source}${e.brand ? ` · ${e.brand}` : ''}`;
          }
          if (e.exerciseAdjusted) metaText += ' · 🏃';
          if (e.sickAdjusted) metaText += ' · 🤒';

          // Yemek sonrası KŞ durumu
          const now = new Date();
          const entryTime = getEntryDateTime(e, state.date);
          const elapsedMin = (now - entryTime) / 60000;
          const eligibleForPostBG = !isCorrection && !isBasal && !isHypo && !isBG && (e.carbs || 0) >= 10 && elapsedMin >= 90 && elapsedMin <= 240 && isToday;
          const hasPostBG = e.postMealBG && typeof e.postMealBG.value === 'number';
          const postBGDelta = hasPostBG && e.bg ? (e.postMealBG.value - e.bg) : null;

          // Düzenleme modu
          if (state.editingEntry === e.id) {
            const draft = state.editDraft;
            return `<div class="entry" style="flex-direction:column;align-items:stretch">
              <div class="entry-flex">
                <div class="entry-name">${esc(e.food)}</div>
                <div class="entry-meta">${e.time} · düzenleniyor</div>
              </div>
              <div class="edit-entry-form">
                <div class="edit-entry-row">
                  <label>Saat</label>
                  <input class="in" type="text" inputmode="numeric" placeholder="14:30" value="${esc(draft.time || '')}" data-edit-input="time">
                </div>
                ${!isCorrection ? `
                  <div class="edit-entry-row">
                    <label>Öğün</label>
                    <div class="meal-type-row" style="margin-bottom:0">
                      ${MEAL_TYPE_KEYS.map(k => `
                        <button class="meal-type-pill ${draft.mealType === k ? 'active' : ''}" data-act="setEditMealType" data-type="${k}">
                          <span class="em">${MEAL_TYPES[k].emoji}</span>
                          <span>${MEAL_TYPES[k].name}</span>
                        </button>
                      `).join('')}
                    </div>
                  </div>
                ` : ''}
                <div class="edit-entry-row">
                  <label>KŞ</label>
                  <input class="in" type="text" inputmode="decimal" placeholder="opsiyonel" value="${esc(draft.bg || '')}" data-edit-input="bg">
                  <span class="tiny muted">mg/dL</span>
                </div>
                <div class="edit-entry-row">
                  <label>İnsulin</label>
                  <input class="in" type="text" inputmode="decimal" placeholder="${fmt(ins, 1)}" value="${esc(draft.insulin || '')}" data-edit-input="insulin">
                  <span class="tiny muted">Ü</span>
                </div>
                <div class="edit-entry-row">
                  <label>Not</label>
                  <input class="in" type="text" placeholder="opsiyonel" value="${esc(draft.notes || '')}" data-edit-input="notes">
                </div>
                <div class="btn-pair" style="margin-top:8px">
                  <button class="btn btn-secondary" data-act="cancelEditEntry">İptal</button>
                  <button class="btn btn-primary" data-act="saveEditEntry" data-id="${e.id}">Kaydet</button>
                </div>
              </div>
            </div>`;
          }

          return `<div class="entry ${isBasal ? 'entry-basal' : isHypo ? 'entry-hypo' : isBG ? 'entry-bg' : isExercise ? 'entry-exercise' : isSleep ? 'entry-sleep' : ''}" style="flex-direction:column;align-items:stretch">
            <div style="display:flex;align-items:center;gap:10px;width:100%">
              <div class="entry-flex">
                <div class="entry-name">${mt ? `<span class="meal-type-tag">${mt.emoji} ${mt.name}</span>` : ''}${isBasal ? '<span class="basal-tag">🌙 Bazal</span>' : ''}${isHypo ? '<span class="hypo-tag">⚠ Hipo</span>' : ''}${isBG ? '<span class="bg-tag">💧 KŞ</span>' : ''}${isExercise ? '<span class="exercise-tag">🏃 Egzersiz</span>' : ''}${isSleep ? '<span class="sleep-tag">🌙 Uyku</span>' : ''}${esc(e.food)}</div>
                <div class="entry-meta">${metaText}</div>
                ${isMeal ? `<div class="entry-meta" style="margin-top:3px;font-size:10px">${e.items.map(i => esc(i.food)).join(' · ')}</div>` : ''}
                ${e.notes ? `<div class="entry-note">📝 ${esc(e.notes)}</div>` : ''}
                ${isHypo && e.reason ? `<div class="entry-note">📝 ${esc(e.reason)}</div>` : ''}
                ${hasPostBG ? `
                  <div class="pbg-line ${postBGDelta !== null ? (postBGDelta > 30 ? 'delta-up' : postBGDelta < -30 ? 'delta-down' : '') : ''}">
                    💧 Sonrası: ${e.postMealBG.value} mg/dL${postBGDelta !== null ? ` (${postBGDelta >= 0 ? '+' : ''}${Math.round(postBGDelta)})` : ''} · ${e.postMealBG.time}
                  </div>
                ` : eligibleForPostBG ? `
                  <button class="pbg-link" data-act="startPostBG" data-id="${e.id}">+ Yemek sonrası KŞ ekle</button>
                ` : ''}
                ${(isMeal || (e.carbs > 0 && !isHypo && !isBG)) && hasPostBG ? `
                  <div class="entry-rating">
                    ${[1,2,3,4,5].map(n => `<button class="entry-star ${(e.rating || 0) >= n ? 'active' : ''}" data-act="rateEntry" data-id="${e.id}" data-rating="${n}" title="${n} yıldız">★</button>`).join('')}
                    <span class="entry-rating-label">${e.rating ? (e.rating >= 4 ? '✓ Çalıştı' : e.rating <= 2 ? '✗ Çalışmadı' : 'Orta') : 'Bu öğün/bolus nasıldı?'}</span>
                  </div>
                ` : ''}
                ${!isHypo && !isBG ? `<span class="entry-dose">${svg('drop','icn icn-sm')} ${fmt(ins, state.roundStep === 1 ? 0 : 1)} Ü</span>` : ''}
              </div>
              <div class="entry-val">
                <div class="v">${isCorrection || isBasal ? '—' : isBG ? `${e.bg}` : isHypo ? `+${fmt(e.treatGrams || 0)}g` : fmt(e.carbs, 1) + 'g'}</div>
                <div class="u">${isCorrection || isBasal ? '' : isBG ? 'mg/dL' : 'KH'}</div>
              </div>
              ${isToday ? `
                ${!isBasal && !isHypo && !isBG ? `<button class="icon-btn icon-btn-blue" data-act="startEditEntry" data-id="${e.id}">${svg('edit','icn icn-sm')}</button>` : ''}
                <button class="icon-btn" data-act="deleteEntry" data-id="${e.id}">${svg('trash','icn icn-sm')}</button>
              ` : ''}
            </div>
            ${e.mealPhoto ? `<div class="entry-meal-photo"><img src="${e.mealPhoto}" alt="Yemek fotoğrafı" data-act="viewMealPhoto" data-id="${e.id}"></div>` : ''}
            ${state.postBgInputId === e.id ? `
              <div class="pbg-input-row">
                <input class="in" type="text" inputmode="decimal" placeholder="Yemek sonrası KŞ (mg/dL)" value="${esc(state.postBgValue)}" data-input="postBgValue" autofocus>
                <button class="btn btn-secondary" data-act="cancelPostBG">İptal</button>
                <button class="btn btn-primary" data-act="savePostBG">Kaydet</button>
              </div>
            ` : ''}
          </div>`;
        }).join('')}
      </div>
    `}
  </div></div>`;
  return html;
}

function renderLibrary() {
  const filtered = Object.entries(state.library)
    .filter(([k,v]) => !state.librarySearch || v.name.toLowerCase().includes(state.librarySearch.toLowerCase()))
    .sort((a,b) => a[1].name.localeCompare(b[1].name, 'tr'));

  const templateEntries = Object.entries(state.templates)
    .sort((a,b) => a[1].name.localeCompare(b[1].name, 'tr'));

  return `<div class="content">
    ${templateEntries.length > 0 ? `
      <div class="section-title">${svg('plus','icn icn-sm')} Şablonlar (${templateEntries.length})</div>
      <div style="margin-bottom:8px">
        ${templateEntries.map(([key, tpl]) => {
          const mt = tpl.mealType ? mealTypeLabel(tpl.mealType) : null;
          const totalC = tpl.items.reduce((s, i) => s + (i.carbs || 0), 0);
          return `<div class="template-list-item">
            <div class="info">
              <div class="nm">${mt ? `<span class="meal-type-tag">${mt.emoji} ${mt.name}</span>` : ''}${esc(tpl.name)}</div>
              <div class="mt">${tpl.items.length} yemek · <span class="v">${fmt(totalC, 1)}g KH</span> · ${tpl.items.map(i => esc(i.food)).slice(0, 3).join(', ')}${tpl.items.length > 3 ? '...' : ''}</div>
            </div>
            <button class="icon-btn icon-btn-blue" data-act="loadTemplate" data-key="${esc(key)}" title="Sepete yükle">${svg('plus','icn icn-sm')}</button>
            <button class="icon-btn" data-act="deleteTemplate" data-key="${esc(key)}">${svg('trash','icn icn-sm')}</button>
          </div>`;
        }).join('')}
      </div>
    ` : ''}

    <div class="search-bar">
      ${svg('search','icn icn-sm')}
      <input type="text" placeholder="Kayıtlı yemek ara..." value="${esc(state.librarySearch)}" data-input="librarySearch">
    </div>
    <div class="muted tiny" style="padding:0 4px">
      ${Object.keys(state.library).length} kişisel kayıt · ${Object.keys(DB).length} hazır gömülü yemek
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${filtered.length === 0 ? `<div class="card empty">${Object.keys(state.library).length === 0 ? 'Henüz kişisel kayıt yok. Yemek ekledikçe burası dolacak.' : 'Eşleşme yok'}</div>` :
        filtered.map(([key, food]) => state.editingFood === key ? renderEditForm(key, food) : `
          <div class="lib-item">
            <div class="lib-row">
              <div class="entry-flex">
                <div class="lib-name">${esc(food.name)}</div>
                <div class="lib-meta">KH: <span class="v">${food.carbsPer100g}g</span> · P: ${food.proteinPer100g || 0}g · Y: ${food.fatPer100g || 0}g <span class="muted">/100g</span></div>
                ${food.notes ? `<div class="lib-note">${esc(food.notes)}</div>` : ''}
              </div>
              <button class="icon-btn icon-btn-blue" data-act="editLib" data-key="${esc(key)}">${svg('edit','icn icn-sm')}</button>
              <button class="icon-btn" data-act="deleteLib" data-key="${esc(key)}">${svg('trash','icn icn-sm')}</button>
            </div>
          </div>
        `).join('')
      }
    </div>
  </div>`;
}

      <div class="grid3">
        <div><label>KH/100g</label><input class="in" type="number" inputmode="decimal" value="${food.carbsPer100g}" data-edit="c" data-key="${esc(key)}"></div>
        <div><label>Pro/100g</label><input class="in" type="number" inputmode="decimal" value="${food.proteinPer100g || 0}" data-edit="p" data-key="${esc(key)}"></div>
        <div><label>Yağ/100g</label><input class="in" type="number" inputmode="decimal" value="${food.fatPer100g || 0}" data-edit="f" data-key="${esc(key)}"></div>

      <input class="in" type="text" value="${esc(food.notes || '')}" placeholder="Not (opsiyonel)" data-edit="n" data-key="${esc(key)}">

function renderHistory() {
  const stats = calcStats(state.statPeriod);
  const sorted = Object.entries(state.history)
    .map(([d, entries]) => ({
      date: d,
      total: entries.reduce((s,e) => s + e.carbs, 0),
      insulin: entries.reduce((s,e) => s + (typeof e.insulin === 'number' ? e.insulin : calcInsulin(e.carbs, getEntryHour(e)).totalRounded), 0),
      count: entries.length
    }))
    .filter(h => h.count > 0)
    .sort((a,b) => b.date.localeCompare(a.date));

  const maxFoodCount = stats.empty ? 0 : Math.max(...stats.topFoods.map(f => f[1]), 1);

  return `<div class="content">
    <div class="stat-period">
      <button class="${state.statPeriod === 7 ? 'active' : ''}" data-act="setStatPeriod" data-days="7">Son 7 gün</button>
      <button class="${state.statPeriod === 30 ? 'active' : ''}" data-act="setStatPeriod" data-days="30">Son 30 gün</button>
      <button class="${state.statPeriod === 90 ? 'active' : ''}" data-act="setStatPeriod" data-days="90">Son 90 gün</button>
    </div>
    
    <div class="card" style="padding:10px 12px;margin-bottom:12px">
      <div style="position:relative">
        <input class="in" type="text" placeholder="🔍 Yemek geçmişinde ara (örn pizza, pilav)" value="${esc(state.foodSearchQuery || '')}" data-input="foodSearchQuery" autocomplete="off">
        ${state.foodSearchQuery ? `<button class="search-clear" data-act="clearFoodSearch" type="button">×</button>` : ''}
      </div>
      ${(() => {
        const q = (state.foodSearchQuery || '').trim();
        if (!q || q.length < 2) return '';
        const nq = normTR(q);
        const matches = [];
        const all = getAllDayEntries();
        for (const [date, entries] of Object.entries(all)) {
          for (const e of entries) {
            if (!e.food || !(e.carbs > 0)) continue;
            // Tek yemek veya öğün içindeki yemekler
            const names = [e.food];
            if (e.items) for (const it of e.items) names.push(it.food);
            const found = names.some(n => normTR(n).includes(nq));
            if (found) {
              matches.push({ date, time: e.time, food: e.food, carbs: e.carbs, insulin: e.insulin || 0, mealType: e.mealType, postBG: e.postMealBG, bg: e.bg });
            }
          }
        }
        matches.sort((a, b) => (b.date + b.time).localeCompare(a.date + a.time));
        if (matches.length === 0) return `<div class="tiny muted" style="margin-top:10px">"${esc(q)}" için kayıt bulunamadı.</div>`;
        const totalC = matches.reduce((s, m) => s + (m.carbs || 0), 0);
        const totalI = matches.reduce((s, m) => s + (m.insulin || 0), 0);
        const avgC = totalC / matches.length;
        const avgI = totalI / matches.length;
        // Post-meal delta ortalaması
        const withDelta = matches.filter(m => m.postBG && typeof m.postBG.value === 'number' && typeof m.bg === 'number');
        const avgDelta = withDelta.length > 0 ? withDelta.reduce((s, m) => s + (m.postBG.value - m.bg), 0) / withDelta.length : null;
        return `
        <div class="search-stats">
          <div><b>${matches.length}</b> kayıt</div>
          <div>Ort: <b>${fmt(avgC, 0)}g</b> KH · <b>${fmt(avgI, 1)}Ü</b></div>
          ${avgDelta !== null ? `<div>Δ KŞ: <b style="color:${avgDelta > 50 ? '#a03030' : avgDelta < -20 ? '#a03030' : '#047857'}">${avgDelta > 0 ? '+' : ''}${Math.round(avgDelta)}</b></div>` : ''}
        </div>
        <div class="search-results">
          ${matches.slice(0, 12).map(m => `<div class="search-result" data-act="goToDay" data-date="${m.date}">
            <div class="sr-date">${new Date(m.date).toLocaleDateString('tr-TR', { day: 'numeric', month: 'short' })} · ${m.time}</div>
            <div class="sr-food">${esc(m.food)}</div>
            <div class="sr-meta"><b>${fmt(m.carbs, 0)}g</b> KH${m.insulin > 0 ? ` · ${fmt(m.insulin, 1)}Ü` : ''}${m.postBG ? ` · sonrası ${m.postBG.value}` : ''}</div>
          </div>`).join('')}
          ${matches.length > 12 ? `<div class="tiny muted" style="text-align:center;padding:8px">+${matches.length - 12} kayıt daha</div>` : ''}
        </div>`;
      })()}
    </div>

    ${stats.empty ? '<div class="card empty">Bu dönemde kayıt yok</div>' : `
      <div class="stats-grid">
        <div class="stat-card">
          <div class="lbl">Günlük Ortalama KH</div>
          <div class="v">${fmt(stats.avgC, 0)}<span class="u">g</span></div>
          <div class="s">${stats.dayCount} aktif gün</div>
        </div>
        <div class="stat-card">
          <div class="lbl">Günlük Ortalama İnsulin</div>
          <div class="v">${fmt(stats.avgI, 1)}<span class="u">Ü</span></div>
          <div class="s">${stats.totalEntries} kayıt</div>
        </div>
        <div class="stat-card">
          <div class="lbl">Toplam KH</div>
          <div class="v">${fmt(stats.totalC, 0)}<span class="u">g</span></div>
          <div class="s">${stats.mealCount} öğün</div>
        </div>
        <div class="stat-card">
          <div class="lbl">Toplam İnsulin</div>
          <div class="v">${fmt(stats.totalI, 1)}<span class="u">Ü</span></div>
          <div class="s">${stats.correctionCount} düzeltme${stats.hypoCount > 0 ? ` · ${stats.hypoCount} hipo ⚠` : ''}</div>
        </div>
      </div>

      ${stats.avgDelta !== null ? `
        <div class="card" style="margin-bottom:12px">
          <h2>${svg('drop','icn icn-sm')} Yemek Sonrası KŞ Analizi</h2>
          <div class="row" style="margin-bottom:8px">
            <div>
              <div class="tiny muted">Ortalama Sapma</div>
              <div style="font-size:24px;font-weight:700;color:${stats.avgDelta > 30 ? '#dc2626' : stats.avgDelta < -30 ? '#16a34a' : '#3d6850'}">${stats.avgDelta >= 0 ? '+' : ''}${fmt(stats.avgDelta, 0)} mg/dL</div>
            </div>
            <div style="text-align:right">
              <div class="tiny muted">Örnek</div>
              <div style="font-size:14px;font-weight:600">${stats.withPrePostCount} öğün</div>
            </div>
          </div>
          <div class="tiny muted" style="line-height:1.4">
            ${stats.avgDelta > 30 ? '⚠️ Yemek sonrası KŞ ortalama hedef üstünde — KH/insulin oranını düşürmeyi (örn 1Ü = 10g → 9g) doktorla konuş.' :
              stats.avgDelta < -30 ? '⚠️ Yemek sonrası KŞ ortalama hedef altında — KH/insulin oranını yükseltmeyi (örn 1Ü = 10g → 11g) doktorla konuş.' :
              '✓ Yemek sonrası KŞ hedefe yakın — mevcut oranlar iyi çalışıyor.'}
          </div>
        </div>
      ` : ''}

      <div class="section-title">Öğün Tipine Göre Dağılım</div>
      <div class="mt-summary-row">
        ${MEAL_TYPE_KEYS.map(k => {
          const m = stats.byMealType[k];
          const avgC = m.n > 0 ? m.c / m.n : 0;
          const avgI = m.n > 0 ? m.i / m.n : 0;
          return `<div class="mt-summary">
            <div class="em">${MEAL_TYPES[k].emoji}</div>
            <div class="nm">${MEAL_TYPES[k].name}</div>
            <div class="v">${fmt(avgC, 0)}g</div>
            <div class="s">${fmt(avgI, 1)}Ü · n=${m.n}</div>
          </div>`;
        }).join('')}
      </div>

      ${stats.topFoods.length > 0 ? `
        <div class="section-title">En Çok Yenenler (Top ${stats.topFoods.length})</div>
        <div class="card" style="margin-bottom:12px">
          ${stats.topFoods.map(([name, count]) => `
            <div class="bar-row">
              <div class="label" title="${esc(name)}">${esc(name)}</div>
              <div class="bar-bg">
                <div class="bar-fill" style="width:${Math.max(8, (count / maxFoodCount) * 100)}%">${count}</div>
              </div>
              <div class="v">${count}x</div>
            </div>
          `).join('')}
        </div>
      ` : ''}

      ${(() => {
        // HbA1c tahmini
        const a1c = estimateHbA1c(state.statPeriod);
        if (!a1c) return '';
        return `<div class="hba1c-card">
          <div class="t">${svg('drop','icn icn-sm')} Tahmini HbA1c (ADAG formülü)</div>
          <div><span class="v">${a1c.a1c.toFixed(1)}</span><span class="u">%</span></div>
          <div class="s">Son ${state.statPeriod} gün · ${a1c.n} ölçüm · Ortalama KŞ ${fmt(a1c.avgBG, 0)} mg/dL<br>${a1c.a1c < 7 ? '✓ Hedef altı' : a1c.a1c < 8 ? '⚠ Hafif yüksek (hedef <7)' : '⚠ Yüksek — doktorunla konuş'}. Tahmindir, gerçek lab sonucu farklı olabilir.</div>
        </div>`;
      })()}

      ${(() => {
        // Trend & oran önerisi
        const t = analyzeTrend(state.statPeriod);
        if (t.insufficientData) return `<div class="trend-card">
          <div class="t">${svg('drop','icn icn-sm')} Trend & Oran Analizi</div>
          <div class="sug" style="border-top:none;padding-top:0">Yemek sonrası KŞ verisi henüz az (${t.n}). En az 5 öğünde "yemek sonrası KŞ" ekleyince oran önerisi çıkar.</div>
        </div>`;
        if (!t.suggestion) return `<div class="trend-card">
          <div class="t">${svg('drop','icn icn-sm')} Trend & Oran Analizi</div>
          <div><span class="v">${t.avgDelta >= 0 ? '+' : ''}${fmt(t.avgDelta, 0)} mg/dL</span></div>
          <div class="sug">✓ Yemek sonrası KŞ ortalama hedefe yakın (${t.n} öğün, std ±${fmt(t.stdDev, 0)}). KH/insulin oranın <b>1Ü ≈ ${fmt(t.currentRatio, 1)}g</b> doğru çalışıyor.</div>
        </div>`;
        return `<div class="trend-card">
          <div class="t">${svg('drop','icn icn-sm')} Trend & Oran Önerisi</div>
          <div><span class="v">${t.avgDelta >= 0 ? '+' : ''}${fmt(t.avgDelta, 0)} mg/dL</span></div>
          <div class="sug">
            ${t.direction === 'down'
              ? `Yemek sonrası KŞ <b>ortalama yüksek</b> (${t.n} öğün, std ±${fmt(t.stdDev, 0)}). Mevcut oranın <b>1Ü = ${fmt(t.currentRatio, 1)}g</b>. Daha çok insulin gerekiyor → oranı <b>1Ü = ${t.suggestion}g</b>'a düşürmeyi doktorla konuş.`

function render() {
  const activeFocus = document.activeElement;
  const focusKey = activeFocus && activeFocus.dataset && (activeFocus.dataset.input || activeFocus.dataset.edit);
  const focusKeyAttr = activeFocus && activeFocus.dataset && activeFocus.dataset.key;
  const cursorPos = activeFocus && typeof activeFocus.selectionStart === 'number' ? activeFocus.selectionStart : null;

  let body;
  if (state.view === 'today') body = renderToday();
  else if (state.view === 'library') body = renderLibrary();
  else if (state.view === 'history') body = renderHistory();
  else if (state.view === 'brain') body = renderBrain();
  else if (state.view === 'practice') body = renderCarbPractice();
  else if (state.view === 'settings') body = renderSettings();

  document.getElementById('root').innerHTML = `
    <div class="hdr">
      <h1>${svg('act','icn icn-lg')} <span style="color:#3a3530">KarbSayar</span></h1>
      <div class="hdr-sub">Tip 1 Diyabet · KH Sayım</div>
    </div>
    ${body}
    <div class="nav">
      <div class="nav-grid">
        ${[
          { id: 'today', icon: 'act', label: 'Bugün' },
          { id: 'library', icon: 'db', label: 'Kütüphane' },
          { id: 'brain', icon: 'brain', label: 'Beyin' },
          { id: 'history', icon: 'hist', label: 'Geçmiş' },
          { id: 'settings', icon: 'sett', label: 'Ayarlar' }
        ].map(t => `<button class="nav-btn ${state.view === t.id ? 'active' : ''}" data-act="setView" data-view="${t.id}">
          ${svg(t.icon, 'icn icn-lg')}<span>${t.label}</span>
        </button>`).join('')}
      </div>
    </div>
  `;

  if (focusKey) {
    let el;
    if (focusKeyAttr) el = document.querySelector(`[data-edit="${focusKey}"][data-key="${focusKeyAttr}"]`);
    else el = document.querySelector(`[data-input="${focusKey}"]`);
    if (el) {
      el.focus();
      if (cursorPos !== null) { try { el.setSelectionRange(cursorPos, cursorPos); } catch (e) {} }
    }
  }
  document.body.classList.toggle('dark', state.darkMode);
}

// Inline güncellemeler — render olmadan
function refreshUnitDropdown() {
  const sel = document.querySelector('[data-input="portionUnit"]');
  if (!sel) return;
  ensureValidUnit();
  const units = getUnitsForFood(state.foodInput);
  sel.innerHTML = units.map(([n, g]) =>
    `<option value="${esc(n)}" ${n === state.portionUnit ? 'selected' : ''}>${esc(n)} (${g}g)</option>`
  ).join('');
  refreshGramsDisplay();
}
function refreshGramsDisplay() {
  const span = document.querySelector('[data-display="grams"]');
  if (!span) return;
  const grams = getCurrentGrams();
  span.innerHTML = grams > 0 ? `= <b>${fmt(grams)} gram</b>` : '';
}

// ============================================================================
// EVENT HANDLING
// ============================================================================
document.addEventListener('click', (ev) => {
  const t = ev.target.closest('[data-act]');
  if (!t) return;
  const act = t.dataset.act;

  if (act === 'setView') { state.view = t.dataset.view; state.error = null; render(); }
  else if (act === 'toggleManual') { state.manualMode = !state.manualMode; state.error = null; render(); }
  else if (act === 'lookup') lookupFood();
  else if (act === 'submitManual') submitManual();
  else if (act === 'cancelEstimate') {
    state.estimate = null;
    state.currentBG = '';
    if (state.mealItems.length === 0) state.currentMealType = null;
    render();
  }
  else if (act === 'confirmAdd') confirmAdd();
  else if (act === 'addToMeal') addToMealCart();
  else if (act === 'removeMealItem') removeMealItem(parseInt(t.dataset.idx, 10));
  else if (act === 'cancelMeal') cancelMeal();
  else if (act === 'commitMeal') commitMeal();
  else if (act === 'setMealType') {
    state.currentMealType = t.dataset.type;
    render();
  }
  else if (act === 'setEditMealType') {
    state.editDraft.mealType = t.dataset.type;
    render();
  }
  else if (act === 'toggleExercise') {
    state.exerciseMode = !state.exerciseMode;
    render();
  }
  else if (act === 'toggleSickMode') {
    state.sickMode = !state.sickMode;
    render();
  }
  else if (act === 'commitBasal') commitBasal();
  else if (act === 'openHypoForm') openHypoForm(state.currentBG);
  else if (act === 'cancelHypoForm') cancelHypoForm();
  else if (act === 'commitHypo') commitHypo();
  else if (act === 'setHypoTreat') {
    state.hypoTreatGrams = t.dataset.val;
    render();
  }
  // === EGZERSİZ FORM ===
  else if (act === 'openExerciseForm') openExerciseForm();
  else if (act === 'cancelExerciseForm') cancelExerciseForm();
  else if (act === 'commitExercise') commitExercise();
  else if (act === 'setExType') { state.exType = t.dataset.val; render(); }
  else if (act === 'setExDuration') { state.exDuration = t.dataset.val; render(); }
  else if (act === 'setExIntensity') { state.exIntensity = t.dataset.val; render(); }
  // === UYKU FORM ===
  else if (act === 'openSleepForm') openSleepForm();
  else if (act === 'cancelSleepForm') cancelSleepForm();
  else if (act === 'commitSleep') commitSleep();
  else if (act === 'setSleepQuality') { state.sleepQuality = t.dataset.val; render(); }
  // === ETIKET FORM ===
  else if (act === 'openTagForm') openTagForm();
  else if (act === 'cancelTagForm') cancelTagForm();
  else if (act === 'commitTags') commitTags();
  else if (act === 'setTagStress') { state.tagStress = parseInt(t.dataset.val); render(); }
  // === TAHMİN ===
  else if (act === 'setPredictType') { state.predictType = t.dataset.val; render(); }
  else if (act === 'setPredictDuration') { state.predictDuration = t.dataset.val; render(); }
  else if (act === 'setQBGPreset') {
    state.quickBG = t.dataset.val;
    state.quickBGActions = true;
    render();
  }
  else if (act === 'adjustQBG') {
    adjustQuickBG(parseInt(t.dataset.delta, 10));
  }
  else if (act === 'applyQBG') {
    applyQuickBG(t.dataset.target);
  }
  else if (act === 'saveAsTemplate') saveCurrentAsTemplate();
  else if (act === 'loadTemplate') {
    loadTemplate(t.dataset.key);
    state.view = 'today';
    render();
  }
  else if (act === 'deleteTemplate') deleteTemplate(t.dataset.key);
  else if (act === 'startEditEntry') startEditEntry(t.dataset.id);
  else if (act === 'cancelEditEntry') cancelEditEntry();
  else if (act === 'saveEditEntry') saveEditEntry(t.dataset.id);
  else if (act === 'startPostBG') startPostBGInput(t.dataset.id);
  else if (act === 'cancelPostBG') cancelPostBGInput();
  else if (act === 'savePostBG') savePostBG();
  else if (act === 'setStatPeriod') {
    state.statPeriod = parseInt(t.dataset.days, 10);
    render();
  }
  else if (act === 'exportCSV') exportCSV();
  else if (act === 'generateDoctorReport14') generateDoctorReport(14);
  else if (act === 'generateDoctorReport30') generateDoctorReport(30);
  else if (act === 'generateDoctorReport90') generateDoctorReport(90);
  else if (act === 'generateEmergencyCard') generateEmergencyCard();
  else if (act === 'startCarbPractice') startCarbPractice();
  else if (act === 'submitCarbGuess') submitCarbGuess();
  else if (act === 'cancelCarbPractice') cancelCarbPractice();
  else if (act === 'goToPractice') { state.view = 'practice'; render(); }
  else if (act === 'startNewBolusPen') {
    if (confirm('Yeni bolus kalem başlat? Bugünden itibaren takip edilir.')) startNewPen('bolus');
  }
  else if (act === 'startNewBasalPen') {
    if (confirm('Yeni bazal kalem başlat? Bugünden itibaren takip edilir.')) startNewPen('basal');
  }
  else if (act === 'clearFoodSearch') {
    state.foodSearchQuery = '';
    render();
  }
  else if (act === 'bolusOverridePlus') {
    state.bolusOverridePct = Math.min(50, (state.bolusOverridePct || 0) + 10);
    render();
  }
  else if (act === 'bolusOverrideMinus') {
    state.bolusOverridePct = Math.max(-50, (state.bolusOverridePct || 0) - 10);
    render();
  }
  else if (act === 'bolusOverrideReset') {
    state.bolusOverridePct = 0;
    render();
  }
  else if (act === 'toggleDoseBreakdown') {
    state.doseBreakdownOpen = !state.doseBreakdownOpen;
    render();
  }
  else if (act === 'rateEntry') {
    const id = t.dataset.id;
    const rating = parseInt(t.dataset.rating);
    if (!id || isNaN(rating)) return;
    const idx = state.todayLog.findIndex(e => e.id === id);
    if (idx >= 0) {
      // Aynı yıldıza tekrar tıklarsa sıfırla
      const newRating = state.todayLog[idx].rating === rating ? 0 : rating;
      state.todayLog[idx].rating = newRating;
      saveLog([...state.todayLog]);
    } else {
      // Geçmişte mi?
      for (const [date, entries] of Object.entries(state.history)) {
        const i = entries.findIndex(e => e.id === id);
        if (i >= 0) {
          const newRating = entries[i].rating === rating ? 0 : rating;
          entries[i].rating = newRating;
          state.history[date] = entries;
          LS.set(`karbsayar:log:${date}`, entries);
          break;
        }
      }
    }
    render();
  }
  else if (act === 'toggleQuickBolus') {
    state.quickBolusOpen = !state.quickBolusOpen;
    if (!state.quickBolusOpen) state.quickBolusCarbs = '';
    render();
  }
  else if (act === 'setQuickBolusPreset') {
    state.quickBolusCarbs = t.dataset.val;
    render();
  }
  else if (act === 'adjustQuickBolus') {
    const delta = parseInt(t.dataset.delta) || 0;
    const cur = parseFloat(String(state.quickBolusCarbs || '0').replace(',', '.')) || 0;
    state.quickBolusCarbs = String(Math.max(0, cur + delta));
    render();
  }
  else if (act === 'quickBolusSave') {
    const carbs = parseFloat(String(state.quickBolusCarbs || '').replace(',', '.'));
    if (isNaN(carbs) || carbs <= 0) return;
    const now = new Date();
    const bg = parseFloat(String(state.currentBG || '').replace(',', '.')) || null;
    const iob = calcIOB(now).total;
    const dose = applyAllAdjustments(calcInsulin(carbs, now.getHours(), bg, iob));
    const newEntry = {
      id: genId(),
      type: 'meal',
      food: `Hızlı bolus (${fmt(carbs, 0)}g KH)`,
      portion: 0, qty: carbs, unit: 'gram', unitG: 1,
      carbs, protein: 0, fat: 0,
      time: now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }),
      hour: now.getHours(),
      source: 'hızlı bolus',
      insulin: dose.totalRounded, insulinRaw: dose.totalRaw, insulinRatio: dose.ratio,
      bg: bg || null,
      mealType: getDefaultMealType(now.getHours()),
      brand: state.bolusBrand,
      exerciseAdjusted: dose.exerciseAdjusted || false,
      sickAdjusted: dose.sickAdjusted || false,
      overrideApplied: dose.overrideApplied || false,
      overridePct: dose.overridePct || 0
    };
    saveLog([...state.todayLog, newEntry]);
    state.quickBolusCarbs = '';
    state.quickBolusOpen = false;
    render();
  }
  else if (act === 'triggerMealPhoto') {
    const fi = document.querySelector('[data-input="mealPhotoFile"]');
    if (fi) fi.click();
  }
  else if (act === 'removeMealPhoto') {
    state.pendingMealPhoto = null;
    render();
  }
  else if (act === 'viewMealPhoto') {
    const id = t.dataset.id;
    // Bütün gün/geçmiş tarayıp entry'yi bul
    let entry = state.todayLog.find(e => e.id === id);
    if (!entry) {
      for (const day of Object.values(state.history)) {
        const found = day.find(e => e.id === id);
        if (found) { entry = found; break; }
      }
    }
    if (entry && entry.mealPhoto) {
      // Lightbox: yeni pencerede aç
      const win = window.open('', '_blank');
      if (win) {
        win.document.write(`<!DOCTYPE html><html><head><title>${esc(entry.food)}</title><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui;color:#fff}img{max-width:100%;max-height:90vh;object-fit:contain}.info{position:fixed;top:0;left:0;right:0;background:rgba(0,0,0,.7);padding:14px;text-align:center}</style></head><body><div class="info">${esc(entry.food)} · ${entry.time}</div><img src="${entry.mealPhoto}"></body></html>`);
        win.document.close();
      }
    }
  }
  else if (act === 'setCorrectionBG') {
    state.correctionBG = t.dataset.val;
    render();
  }
  else if (act === 'openCorrection') {
    state.correctionFormOpen = true;
    state.estimate = null;
    state.error = null;
    render();
  }
  else if (act === 'cancelCorrection') {
    state.correctionFormOpen = false;
    state.correctionBG = '';
    state.correctionManual = '';
    state.error = null;
    render();
  }
  else if (act === 'commitCorrection') commitCorrection();
  else if (act === 'deleteEntry') deleteEntry(t.dataset.id);
  else if (act === 'pickSuggestion') {
    state.foodInput = t.dataset.name;
    state.suggestions = [];
    // Yeni yemek için doğal birime geç
    const units = getUnitsForFood(state.foodInput);
    state.portionUnit = units[0][0];
    // Akıllı default miktar: gram/ml ise 100, diğerleri (adet/dilim/porsiyon) için 1
    const firstUnit = units[0][0];
    if (firstUnit === 'gram' || firstUnit === 'ml') {
      state.portionQty = '100';
    } else {
      state.portionQty = '1';
    }
    render();
    const inp = document.querySelector('[data-input="portionQty"]');
    if (inp) { inp.focus(); inp.select(); }
  }
  else if (act === 'toggleFav') {
    const name = t.dataset.name;
    const carbs = parseFloat(t.dataset.carbs) || 0;
    toggleFavorite(name, carbs);
    render();
  }
  else if (act === 'quickAddToMeal') {
    quickAddToMeal(t.dataset.name);
  }
  else if (act === 'toggleVoice') {
    startVoiceInput();
  }
  else if (act === 'triggerPhoto') {
    const fi = document.querySelector('[data-input="photoFile"]');
    if (fi) fi.click();
  }
  else if (act === 'startPrebolusTimer') {
    const min = parseInt(t.dataset.min) || 15;
    state.prebolusActive = true;
    state.prebolusTotalMin = min;
    state.prebolusEndTime = Date.now() + min * 60 * 1000;
    LS.set('karbsayar:prebolusEnd', state.prebolusEndTime);
    LS.set('karbsayar:prebolusTotal', min);
    // Notification iste
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
    render();
  }
  else if (act === 'cancelPrebolusTimer') {
    state.prebolusActive = false;
    state.prebolusEndTime = null;
    LS.set('karbsayar:prebolusEnd', null);
    render();
  }
  else if (act === 'editLib') { state.editingFood = t.dataset.key; render(); }
  else if (act === 'cancelEdit') { state.editingFood = null; render(); }
  else if (act === 'saveEdit') {
    const key = t.dataset.key;
    const c = parseFloat(document.querySelector(`[data-edit="c"][data-key="${key}"]`).value) || 0;
    const p = parseFloat(document.querySelector(`[data-edit="p"][data-key="${key}"]`).value) || 0;
    const f = parseFloat(document.querySelector(`[data-edit="f"][data-key="${key}"]`).value) || 0;
    const n = document.querySelector(`[data-edit="n"][data-key="${key}"]`).value;
    updateLibFood(key, { carbsPer100g: c, proteinPer100g: p, fatPer100g: f, notes: n });
  }
  else if (act === 'deleteLib') deleteFromLibrary(t.dataset.key);
  else if (act === 'goToDay') { state.date = t.dataset.date; state.view = 'today'; loadDayLog(); render(); }
  else if (act === 'exportData') {
    const data = {
      library: state.library, templates: state.templates, history: state.history,
      settings: {
        insulinRatio: state.insulinRatio, ratioMode: state.ratioMode, ratios: state.ratios,
        useCorrection: state.useCorrection, isf: state.isf, targetBG: state.targetBG,
        roundStep: state.roundStep, diaMinutes: state.diaMinutes,
        darkMode: state.darkMode, exerciseReduction: state.exerciseReduction
      }
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `karbsayar-yedek-${new Date().toISOString().split('T')[0]}.json`;
    a.click(); URL.revokeObjectURL(url);
  }
  else if (act === 'importData') {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.json,application/json';
    inp.onchange = async (e) => {
      const file = e.target.files[0]; if (!file) return;
      try {
        const txt = await file.text();
        const data = JSON.parse(txt);
        if (data.library) saveLibrary(data.library);
        if (data.templates) saveTemplates(data.templates);
        if (data.history) {
          for (const [d, entries] of Object.entries(data.history)) LS.set(`karbsayar:log:${d}`, entries);
          state.history = data.history;
        }
        if (data.settings) {
          const s = data.settings;
          if (typeof s.insulinRatio === 'number') state.insulinRatio = s.insulinRatio;
          if (s.ratioMode) state.ratioMode = s.ratioMode;
          if (s.ratios) state.ratios = { ...state.ratios, ...s.ratios };
          if (typeof s.useCorrection === 'boolean') state.useCorrection = s.useCorrection;
          if (typeof s.isf === 'number') state.isf = s.isf;
          if (typeof s.targetBG === 'number') state.targetBG = s.targetBG;
          if (typeof s.roundStep === 'number') state.roundStep = s.roundStep;
          if (typeof s.diaMinutes === 'number') state.diaMinutes = s.diaMinutes;
          if (typeof s.darkMode === 'boolean') state.darkMode = s.darkMode;
          if (typeof s.exerciseReduction === 'number') state.exerciseReduction = s.exerciseReduction;
          persistAllSettings();
        }
        loadDayLog();
        alert('Yedek yüklendi.');
        render();
      } catch (err) { alert('Hata: ' + err.message); }
    };
    inp.click();
  }
});

document.addEventListener('input', (ev) => {
  const t = ev.target;
  // Düzenleme formu input'ları
  if (t.dataset && t.dataset.editInput) {
    state.editDraft[t.dataset.editInput] = t.value;
    return;
  }
  if (!t.dataset || !t.dataset.input) return;
  const key = t.dataset.input;

  if (key === 'foodInput') {
    state.foodInput = t.value;
    updateSuggestions();
    // Suggestions update inline
    const wrap = t.parentElement;
    const old = wrap.querySelector('.suggestions');
    if (old) old.remove();
    if (!state.manualMode && state.suggestions.length > 0) {
      const div = document.createElement('div');
      div.className = 'suggestions';
      div.innerHTML = state.suggestions.map(s => `<button class="suggestion" data-act="pickSuggestion" data-name="${esc(s.name)}">
        <span>${esc(s.name)}</span>
        <span class="tag ${s.src === 'lib' ? 'tag-lib' : 'tag-db'}">${s.src === 'lib' ? 'kayıtlı' : 'DB'}</span>
      </button>`).join('');
      wrap.appendChild(div);
    }
    // Birim dropdown'unu güncelle (yiyecek değişti, birimler değişebilir)
    refreshUnitDropdown();
  }
  else if (key === 'portionQty') { state.portionQty = t.value; refreshGramsDisplay(); }
  else if (key === 'manualCarbs') state.manualCarbs = t.value;
  else if (key === 'manualProtein') state.manualProtein = t.value;
  else if (key === 'manualFat') state.manualFat = t.value;
  else if (key === 'librarySearch') { state.librarySearch = t.value; render(); }
  else if (key === 'currentBG') { state.currentBG = t.value; render(); }
  else if (key === 'correctionBG') { state.correctionBG = t.value; render(); }
  else if (key === 'correctionManual') { state.correctionManual = t.value; render(); }
  else if (key === 'currentNotes') state.currentNotes = t.value;
  else if (key === 'correctionNotes') state.correctionNotes = t.value;
  else if (key === 'postBgValue') state.postBgValue = t.value;
  else if (key === 'hypoBG') state.hypoBG = t.value;
  else if (key === 'hypoTreatGrams') { state.hypoTreatGrams = t.value; render(); }
  else if (key === 'hypoReason') state.hypoReason = t.value;
  // Egzersiz inputları
  else if (key === 'exDuration') state.exDuration = t.value;
  else if (key === 'exDistance') state.exDistance = t.value;
  else if (key === 'exSteps') state.exSteps = t.value;
  else if (key === 'exBgBefore') { state.exBgBefore = t.value; render(); }
  else if (key === 'exBgAfter') { state.exBgAfter = t.value; render(); }
  else if (key === 'exNote') state.exNote = t.value;
  // Uyku inputları
  else if (key === 'sleepBedTime') state.sleepBedTime = t.value;
  else if (key === 'sleepWakeTime') state.sleepWakeTime = t.value;
  else if (key === 'sleepBgBed') { state.sleepBgBed = t.value; render(); }
  else if (key === 'sleepBgWake') { state.sleepBgWake = t.value; render(); }
  else if (key === 'sleepNote') state.sleepNote = t.value;
  // Etiket inputları
  else if (key === 'tagNote') state.tagNote = t.value;
  // Carb practice
  else if (key === 'practiceGuess') state.practiceGuess = t.value;
  else if (key === 'foodSearchQuery') state.foodSearchQuery = t.value;
  else if (key === 'quickBolusCarbs') state.quickBolusCarbs = t.value;
  // Yemek hatırlatma saatleri
  else if (key === 'breakfastReminder') { state.breakfastReminder = t.value; saveSettings({ breakfastReminder: t.value }); }
  else if (key === 'lunchReminder') { state.lunchReminder = t.value; saveSettings({ lunchReminder: t.value }); }
  else if (key === 'dinnerReminder') { state.dinnerReminder = t.value; saveSettings({ dinnerReminder: t.value }); }
  else if (key === 'penLowThreshold') {
    const v = parseFloat(String(t.value).replace(',', '.'));
    if (!isNaN(v) && v > 0) { state.penLowThreshold = v; saveSettings({ penLowThreshold: v }); }
  }
  else if (key === 'bedtimeStart') { state.bedtimeStart = t.value; saveSettings({ bedtimeStart: t.value }); }
  else if (key === 'bedtimeEnd') { state.bedtimeEnd = t.value; saveSettings({ bedtimeEnd: t.value }); }
  else if (key === 'hba1cTarget') {
    const v = parseFloat(String(t.value).replace(',', '.'));
    if (!isNaN(v) && v > 4 && v < 15) { state.hba1cTarget = v; saveSettings({ hba1cTarget: v }); }
  }
  else if (key === 'hba1cLastLabValue') { state.hba1cLastLabValue = t.value; saveSettings({ hba1cLastLabValue: t.value }); }
  else if (key === 'hba1cLastLabDate') { state.hba1cLastLabDate = t.value; saveSettings({ hba1cLastLabDate: t.value }); }
  else if (key === 'travelTZShift') {
    const v = parseInt(t.value);
    if (!isNaN(v) && v >= -12 && v <= 14) { state.travelTZShift = v; saveSettings({ travelTZShift: v }); }
  }
  else if (key === 'travelStartDate') { state.travelStartDate = t.value; saveSettings({ travelStartDate: t.value }); }
  else if (key === 'travelEndDate') { state.travelEndDate = t.value; saveSettings({ travelEndDate: t.value }); }
  else if (key === 'quickBG') {
    state.quickBG = t.value;
    const v = parseFloat(String(t.value).replace(',', '.'));
    const wasActive = state.quickBGActions;
    state.quickBGActions = !isNaN(v) && v > 0;
    if (wasActive !== state.quickBGActions) render();
  }
  else if (key === 'apiKey') { state.apiKey = t.value; saveSettings({ apiKey: t.value }); }
  // Acil kart inputları
  else if (key === 'emergencyName') { state.emergencyName = t.value; saveSettings({ emergencyName: t.value }); }
  else if (key === 'emergencyPhone') { state.emergencyPhone = t.value; saveSettings({ emergencyPhone: t.value }); }
  else if (key === 'emergencyContact1Name') { state.emergencyContact1Name = t.value; saveSettings({ emergencyContact1Name: t.value }); }
  else if (key === 'emergencyContact1Phone') { state.emergencyContact1Phone = t.value; saveSettings({ emergencyContact1Phone: t.value }); }
  else if (key === 'emergencyContact2Name') { state.emergencyContact2Name = t.value; saveSettings({ emergencyContact2Name: t.value }); }
  else if (key === 'emergencyContact2Phone') { state.emergencyContact2Phone = t.value; saveSettings({ emergencyContact2Phone: t.value }); }
  else if (key === 'emergencyDoctorName') { state.emergencyDoctorName = t.value; saveSettings({ emergencyDoctorName: t.value }); }
  else if (key === 'emergencyDoctorPhone') { state.emergencyDoctorPhone = t.value; saveSettings({ emergencyDoctorPhone: t.value }); }
  else if (key === 'emergencyAllergies') { state.emergencyAllergies = t.value; saveSettings({ emergencyAllergies: t.value }); }
  else if (key === 'emergencyOtherMeds') { state.emergencyOtherMeds = t.value; saveSettings({ emergencyOtherMeds: t.value }); }
  else if (key === 'emergencyNotes') { state.emergencyNotes = t.value; saveSettings({ emergencyNotes: t.value }); }
});

// Enter tuşu kısayolları
document.addEventListener('keydown', (ev) => {
  if (ev.key !== 'Enter') return;
  const t = ev.target;
  if (!t.dataset) return;
  const key = t.dataset.input;
  
  // Yemek input'unda Enter → ilk öneriyi seç veya direkt ara
  if (key === 'foodInput') {
    ev.preventDefault();
    if (state.suggestions && state.suggestions.length > 0) {
      const first = state.suggestions[0];
      state.foodInput = first.name;
      state.suggestions = [];
      const units = getUnitsForFood(state.foodInput);
      state.portionUnit = units[0][0];
      const firstUnit = units[0][0];
      state.portionQty = (firstUnit === 'gram' || firstUnit === 'ml') ? '100' : '1';
      render();
      const inp = document.querySelector('[data-input="portionQty"]');
      if (inp) { inp.focus(); inp.select(); }
    } else if (state.foodInput.trim().length >= 2) {
      lookupFood();
    }
    return;
  }
  
  // Miktar input'unda Enter → hesapla/öğüne ekle
  if (key === 'portionQty') {
    ev.preventDefault();
    if (state.estimate) {
      // Tahmin var, öğüne ekle
      addToMealCart();
    } else {
      lookupFood();
    }
    return;
  }
  
  // KŞ input'unda Enter (hızlı kontrol)
  if (key === 'currentBG' || key === 'quickBG') {
    ev.preventDefault();
    t.blur();
    return;
  }
});

document.addEventListener('change', (ev) => {
  const t = ev.target;
  if (!t.dataset) return;
  const key = t.dataset.input;
  
  // Toggle (checkbox) handler
  if (t.dataset.toggle) {
    const tk = t.dataset.toggle;
    if (tk === 'tagIllness') state.tagIllness = t.checked;
    else if (tk === 'tagAlcohol') state.tagAlcohol = t.checked;
    else if (tk === 'tagPeriod') state.tagPeriod = t.checked;
    else if (tk === 'mealRemindersOn') {
      state.mealRemindersOn = t.checked;
      saveSettings({ mealRemindersOn: state.mealRemindersOn });
      render();
    }
    else if (tk === 'sleepModeOn') {
      state.sleepModeOn = t.checked;
      saveSettings({ sleepModeOn: state.sleepModeOn });
      render();
    }
    else if (tk === 'travelModeOn') {
      state.travelModeOn = t.checked;
      saveSettings({ travelModeOn: state.travelModeOn });
      render();
    }
    return;
  }
  
  // Foto seçimi
  if (t.dataset.input === 'photoFile' && t.files && t.files[0]) {
    estimateFromPhoto(t.files[0]);
    t.value = ''; // Reset for next selection
    return;
  }
  // Yemek fotoğrafı (öğüne ekle)
  if (t.dataset.input === 'mealPhotoFile' && t.files && t.files[0]) {
    attachMealPhoto(t.files[0]);
    t.value = '';
    return;
  }
  // Sayı ayarları için doğrulayıcı: virgülü noktaya çevir, geçerli pozitif değilse eski değere döndür
  const parseSettingNumber = (raw) => {
    const v = parseFloat(String(raw).replace(',', '.'));
    return (!isNaN(v) && v > 0) ? v : null;
  };

  if (t.type === 'date' && t.dataset.act === 'setDate') { state.date = t.value; loadDayLog(); render(); }
  else if (key === 'portionUnit') { state.portionUnit = t.value; refreshGramsDisplay(); }
  else if (key === 'ratioMode') { state.ratioMode = t.value; saveSettings({ ratioMode: state.ratioMode }); render(); }
  else if (key === 'emergencyBloodType') { state.emergencyBloodType = t.value; saveSettings({ emergencyBloodType: t.value }); }
  else if (key === 'roundStep') { state.roundStep = parseFloat(t.value); saveSettings({ roundStep: state.roundStep }); render(); }
  else if (key === 'useCorrection') { state.useCorrection = t.checked; saveSettings({ useCorrection: state.useCorrection }); render(); }
  else if (key === 'insulinRatio') {
    const v = parseSettingNumber(t.value);
    if (v !== null) { state.insulinRatio = v; saveSettings({ insulinRatio: v }); }
    t.value = state.insulinRatio;
  }
  else if (key === 'ratio_breakfast') {
    const v = parseSettingNumber(t.value);
    if (v !== null) { state.ratios.breakfast = v; saveSettings({ ratios: state.ratios }); }
    t.value = state.ratios.breakfast;
  }
  else if (key === 'ratio_lunch') {
    const v = parseSettingNumber(t.value);
    if (v !== null) { state.ratios.lunch = v; saveSettings({ ratios: state.ratios }); }
    t.value = state.ratios.lunch;
  }
  else if (key === 'ratio_dinner') {
    const v = parseSettingNumber(t.value);
    if (v !== null) { state.ratios.dinner = v; saveSettings({ ratios: state.ratios }); }
    t.value = state.ratios.dinner;
  }
  else if (key === 'ratio_night') {
    const v = parseSettingNumber(t.value);
    if (v !== null) { state.ratios.night = v; saveSettings({ ratios: state.ratios }); }
    t.value = state.ratios.night;
  }
  else if (key === 'isf') {
    const v = parseSettingNumber(t.value);
    if (v !== null) { state.isf = v; saveSettings({ isf: v }); }
    t.value = state.isf;
  }
  else if (key === 'targetBG') {
    const v = parseSettingNumber(t.value);
    if (v !== null) { state.targetBG = v; saveSettings({ targetBG: v }); }
    t.value = state.targetBG;
  }
  else if (key === 'diaHours') {
    const v = parseSettingNumber(t.value);
    if (v !== null && v >= 1 && v <= 8) {
      state.diaMinutes = v * 60;
      saveSettings({ diaMinutes: state.diaMinutes });
    }
    t.value = state.diaMinutes / 60;
  }
  else if (key === 'darkMode') {
    state.darkMode = t.checked;
    saveSettings({ darkMode: state.darkMode });
    document.body.classList.toggle('dark', state.darkMode);
  }
  else if (key === 'exerciseReduction') {
    const v = parseSettingNumber(t.value);
    if (v !== null && v >= 0 && v <= 80) {
      state.exerciseReduction = v;
      saveSettings({ exerciseReduction: v });
    }
    t.value = state.exerciseReduction;
    render();
  }
  else if (key === 'bolusBrand') {
    state.bolusBrand = t.value;
    saveSettings({ bolusBrand: state.bolusBrand });
    render();
  }
  else if (key === 'basalBrand') {
    state.basalBrand = t.value;
    saveSettings({ basalBrand: state.basalBrand });
    render();
  }
  else if (key === 'basalDose') {
    const v = parseSettingNumber(t.value);
    if (v !== null && v >= 0 && v <= 200) {
      state.basalDose = v;
      saveSettings({ basalDose: v });
    }
    t.value = state.basalDose;
    render();
  }
  else if (key === 'basalTime') {
    if (/^\d{1,2}:\d{2}$/.test(t.value)) {
      state.basalTime = t.value;
      saveSettings({ basalTime: state.basalTime });
    }
  }
  else if (key === 'sickModeMultiplier') {
    const v = parseSettingNumber(t.value);
    if (v !== null && v >= 0 && v <= 100) {
      state.sickModeMultiplier = v;
      saveSettings({ sickModeMultiplier: v });
    }
    t.value = state.sickModeMultiplier;
    render();
  }
  else if (key === 'cgmDevice') {
    state.cgmDevice = t.value;
    saveSettings({ cgmDevice: state.cgmDevice });
    render();
  }
  else if (key === 'sensorStartDate') {
    if (t.value) {
      state.sensorStartDate = t.value;
      saveSettings({ sensorStartDate: state.sensorStartDate });
      render();
    }
  }
});

loadAll();
render();

// Pre-bolus timer aktifse her saniye render et
setInterval(() => {
  if (state.prebolusActive && state.prebolusEndTime) {
    render();
  }
}, 1000);

// PWA service worker kaydı (Android'de install prompt + offline için)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
