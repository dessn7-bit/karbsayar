<title>KarbSayar</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#3a3530;background:#f7f4ee;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select{font:inherit;color:inherit;outline:none;width:100%}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
.app{max-width:640px;margin:0 auto;padding-bottom:80px;min-height:100vh}
.hdr{background:#fff;border-bottom:1px solid #ede4d3;padding:14px 20px;position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.hdr h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.hdr-sub{font-size:11px;color:#8a7d6a}
.icn{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.icn-sm{width:16px;height:16px}
.icn-lg{width:20px;height:20px}
.content{padding:16px;display:flex;flex-direction:column;gap:16px}
.row{display:flex;justify-content:space-between;align-items:center;gap:12px}
.muted{color:#8a7d6a}
.tiny{font-size:11px}
input[type=date],.in,select{background:#faf5ed;border:1px solid #ede4d3;border-radius:8px;padding:8px 12px;font-size:14px;font-weight:500}
input[type=date]:focus,.in:focus,select:focus{border-color:#5b9279;background:#fff}
.card-blue{background:linear-gradient(135deg,#a8c5b9,#b8b0c4);color:#fff;border-radius:16px;padding:20px;box-shadow:0 4px 14px rgba(122,140,131,.18)}
.card-blue .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;opacity:.8;margin-bottom:4px}
.big{font-size:48px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.unit{font-size:20px;opacity:.8}
.divider{margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,.2);display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;font-size:14px}
.divider .lbl-sm{opacity:.7;font-size:11px}
.divider .val{font-weight:600;font-variant-numeric:tabular-nums}
.card{background:#fff;border:1px solid #ede4d3;border-radius:16px;padding:16px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.card-active{border:2px solid #a8c5b9}
.card-amber{background:#fffbeb;border:1px solid #fde68a;border-radius:16px;padding:16px}
.card h2{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.input-wrap{position:relative;display:flex;flex-direction:column;gap:8px}
.input-wrap .in{padding:10px 12px;width:100%;border-radius:8px}
.input-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.input-grid .in{padding:8px;font-size:14px}
.qty-row{display:grid;grid-template-columns:90px 1fr;gap:8px;align-items:center}
.qty-row .in{padding:10px 12px}
.qty-grams{font-size:12px;color:#8a7d6a;font-weight:500;padding-left:4px;font-variant-numeric:tabular-nums}
.qty-grams b{color:#4a7d65;font-weight:600}
.suggestions{position:absolute;top:42px;left:0;right:0;background:#fff;border:1px solid #ede4d3;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:20;overflow:hidden;max-height:240px;overflow-y:auto}
.suggestion{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;font-size:14px;border-bottom:1px solid #f5efe6;width:100%;text-align:left;cursor:pointer}
.suggestion:last-child{border:none}
.suggestion:hover,.suggestion:active{background:#faf5ed}
.tag{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500}
.tag-lib{background:#dceae0;color:#4a7d65}
.tag-db{background:#d1fae5;color:#047857}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border-radius:8px;font-size:14px;font-weight:600;transition:background .15s}
.btn-primary{background:#5b9279;color:#fff}
.btn-primary:hover,.btn-primary:active{background:#4a7d65}
.btn-primary:disabled{background:#d6cebd}
.btn-secondary{background:#f5efe6;color:#3a3530}
.btn-secondary:hover,.btn-secondary:active{background:#ede4d3}
.btn-link{font-size:11px;color:#8a7d6a}
.btn-link:hover{color:#5b9279}
.btn-full{width:100%}
.err{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:#be123c;background:#fff1f2;padding:10px 12px;border-radius:8px}
.err .icn{flex-shrink:0;margin-top:2px}
.entry{display:flex;align-items:center;gap:10px;padding:12px;background:#faf5ed;border-radius:8px}
.entry-name{font-weight:500;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.entry-meta{font-size:11px;color:#8a7d6a;margin-top:2px}
.entry-val{text-align:right}
.entry-val .v{font-weight:700;color:#5b9279;font-variant-numeric:tabular-nums}
.entry-val .u{font-size:10px;color:#a39885}
.entry-flex{flex:1;min-width:0}
.icon-btn{padding:6px;color:#a39885;border-radius:6px}
.icon-btn:hover{color:#be123c;background:#fff1f2}
.entry-dose{display:inline-flex;align-items:center;gap:3px;background:#ecf0ed;color:#5b9279;padding:3px 8px;border-radius:9999px;font-size:11px;font-weight:600;font-variant-numeric:tabular-nums;margin-top:4px}
.empty{text-align:center;color:#a39885;font-size:14px;padding:32px 16px}
.preview-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.preview-name{font-size:16px;font-weight:600}
.preview-meta{font-size:11px;color:#8a7d6a;margin-top:2px}
.conf{font-size:11px;padding:4px 8px;border-radius:9999px;font-weight:500}
.conf-yuksek{color:#047857;background:#d1fae5}
.conf-orta{color:#b45309;background:#fef3c7}
.conf-dusuk{color:#be123c;background:#ffe4e6}
.conf-kayitli{color:#4a7d65;background:#dceae0}
.conf-manuel{color:#3a3530;background:#f5efe6}
.macro-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.macro{padding:12px;border-radius:8px;text-align:center}
.macro-blue{background:#ecf0ed}
.macro-blue .l{font-size:11px;color:#4a7d65;font-weight:500}
.macro-blue .v{font-size:24px;font-weight:700;color:#3d6850;font-variant-numeric:tabular-nums}
.macro-blue .s{font-size:10px;color:#5b9279}
.macro-slate{background:#faf5ed}
.macro-slate .l{font-size:11px;color:#8a7d6a;font-weight:500}
.macro-slate .v{font-size:20px;font-weight:700;color:#2d3b3d;font-variant-numeric:tabular-nums}
.macro-slate .s{font-size:10px;color:#a39885}
.dose-card{background:linear-gradient(135deg,#5b9279,#3d6850);color:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 4px 12px rgba(91,146,121,.22)}
.dose-card .dose-hdr{display:flex;justify-content:space-between;align-items:center;font-size:11px;opacity:.85;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.dose-card .dose-main{display:flex;align-items:baseline;justify-content:center;gap:14px;margin-bottom:10px}
.dose-card .dose-num{display:flex;align-items:baseline;gap:4px}
.dose-card .dose-num .v{font-size:36px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
.dose-card .dose-num .u{font-size:18px;opacity:.85}
.dose-card .dose-num .l{font-size:10px;opacity:.7;display:block;text-align:center;margin-top:2px}
.dose-card .arrow{font-size:20px;opacity:.6;align-self:center}
.dose-card .dose-rounded .v{font-size:44px;color:#fff}
.dose-card .dose-rounded .u{font-size:22px}
.dose-card .dose-meta{font-size:11px;opacity:.85;text-align:center;border-top:1px solid rgba(255,255,255,.2);padding-top:8px}
.dose-bg{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.2)}
.dose-bg label{display:block;font-size:11px;opacity:.85;margin-bottom:4px}
.dose-bg .bg-row{display:flex;gap:8px;align-items:center}
.dose-bg .bg-in{flex:1;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:6px 10px;font-size:14px;color:#fff;font-weight:500}
.dose-bg .bg-in::placeholder{color:rgba(255,255,255,.5)}
.dose-bg .bg-in:focus{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.5)}
.dose-bg .bg-unit{font-size:11px;opacity:.85}
.dose-bg .bg-result{font-size:11px;opacity:.95;margin-top:6px}
.note{font-size:12px;color:#3a3530;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:8px 12px;margin-bottom:12px}
.btn-pair{display:flex;gap:8px}
.btn-pair .btn-secondary{flex:1}
.btn-pair .btn-primary{flex:2}
.lib-item{background:#fff;border:1px solid #ede4d3;border-radius:12px;padding:12px}
.lib-row{display:flex;align-items:center;gap:12px}
.lib-name{font-size:14px;font-weight:500}
.lib-meta{font-size:11px;color:#8a7d6a;margin-top:2px}
.lib-meta .v{font-weight:600;color:#5b9279}
.lib-note{font-size:11px;color:#a39885;margin-top:2px}
.icon-btn-blue:hover{color:#5b9279;background:#ecf0ed}
.search-bar{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #ede4d3;border-radius:12px;padding:12px}
.search-bar input{flex:1;font-size:14px}
.day-btn{display:block;width:100%;background:#fff;border:1px solid #ede4d3;border-radius:12px;padding:16px;text-align:left;transition:border-color .15s}
.day-btn:hover{border-color:#a8c5b9}
.day-btn .d{font-size:14px;font-weight:500;text-transform:capitalize}
.day-btn .c{font-size:11px;color:#8a7d6a;margin-top:2px}
.day-btn .t{font-size:20px;font-weight:700;color:#5b9279;font-variant-numeric:tabular-nums}
.day-btn .tl{font-size:10px;color:#a39885}
.set-row{display:flex;align-items:center;gap:10px;font-size:14px}
.set-row .in{flex:0 0 100px;width:100px;padding:10px 12px;font-size:16px;text-align:center;font-weight:600}
.set-row .lbl-text{flex:1}
.set-time-row{padding:12px 0;border-bottom:1px solid #f5efe6}
.set-time-row:last-child{border:none;padding-bottom:4px}
.set-time-row:first-child{padding-top:4px}
.set-time-row .lbl-row{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
.set-time-row .lbl-row .em{font-size:16px}
.set-time-row .lbl-row .name{font-size:14px;font-weight:500}
.set-time-row .lbl-row .rng{font-size:11px;color:#a39885;font-weight:400}
.set-time-row .input-row{display:flex;align-items:center;gap:10px;font-size:14px}
.set-time-row .input-row .in{flex:0 0 100px;padding:10px 12px;font-size:16px;text-align:center;font-weight:600}
.set-time-row .input-row .un{font-size:13px;color:#3a3530}
.radio-group{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.radio-opt{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#faf5ed;border:1px solid #ede4d3;border-radius:8px;cursor:pointer;font-size:14px}
.radio-opt input{width:auto}
.radio-opt.active{background:#ecf0ed;border-color:#5b9279;color:#4a7d65;font-weight:500}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;margin-bottom:8px;cursor:pointer}
.checkbox-row input{width:18px;height:18px;cursor:pointer}
.api-input{font-family:ui-monospace,monospace}
.ok{font-size:12px;color:#047857;margin-top:8px}
.note-info{display:flex;gap:8px;font-size:12px;color:#78350f}
.note-info .icn{flex-shrink:0;color:#d97706;margin-top:2px}
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #ede4d3;z-index:20}
.nav-grid{max-width:640px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr 1fr 1fr}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:12px;color:#a39885;transition:color .15s}
.nav-btn.active{color:#5b9279}
.nav-btn span{font-size:10px;font-weight:500}
.edit-form{display:flex;flex-direction:column;gap:8px}
.edit-form .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.edit-form label{font-size:10px;color:#8a7d6a;display:block;margin-bottom:2px}
.spin{animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.iob-card{background:linear-gradient(135deg,#a89bb5,#8a7ca0);color:#fff;border-radius:12px;padding:12px 16px;box-shadow:0 4px 12px rgba(138,124,160,.2)}
.iob-row{display:flex;align-items:center;gap:12px}
.iob-icon{flex-shrink:0;opacity:.85;display:flex}
.iob-text{flex:1;min-width:0}
.iob-main{font-size:14px;font-weight:500;display:flex;align-items:baseline;gap:6px}
.iob-main .v{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
.iob-sub{font-size:11px;opacity:.85;margin-top:2px}

/* Öğün sepeti */
.meal-panel{background:linear-gradient(135deg,#fef3c7,#fde68a);border:2px solid #fbbf24;border-radius:16px;padding:16px}
.meal-panel h3{font-size:14px;font-weight:700;color:#92400e;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.meal-items{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.meal-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border-radius:8px}
.meal-item-info{flex:1;min-width:0}
.meal-item-name{font-weight:500;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.meal-item-meta{color:#8a7d6a;font-size:11px;margin-top:2px}
.meal-item-kh{font-size:13px;font-weight:600;color:#5b9279;font-variant-numeric:tabular-nums;flex-shrink:0}
.meal-totals{display:grid;grid-template-columns:1fr 1fr;gap:8px;background:#fff;border-radius:8px;padding:12px;margin-bottom:12px}
.meal-totals .item{text-align:center}
.meal-totals .item .l{color:#8a7d6a;font-size:11px;font-weight:500}
.meal-totals .item .v{font-weight:700;font-size:22px;color:#92400e;font-variant-numeric:tabular-nums;margin-top:2px}
.meal-totals .item.dose .v{color:#5b9279;font-size:24px}
.meal-totals .item .breakdown{font-size:10px;color:#a39885;margin-top:2px}
.meal-bg-row{background:#fff;border-radius:8px;padding:10px;margin-bottom:12px}
.meal-bg-row label{font-size:11px;color:#8a7d6a;display:block;margin-bottom:6px;font-weight:500}
.meal-bg-input{display:flex;gap:8px;align-items:center}
.meal-bg-input .in{flex:1;padding:8px 10px}
.add-more-link{display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;color:#5b9279;padding:10px;margin-top:8px;background:#ecf0ed;border:1px dashed #a8c5b9;border-radius:8px;font-weight:500;cursor:pointer;width:100%}
.add-more-link:hover{background:#dceae0}

/* Düzeltme / Ara iğne */
.corr-trigger{display:flex;align-items:center;justify-content:center;gap:8px;background:#fff;border:2px dashed #b8b0c4;border-radius:12px;padding:14px;width:100%;font-size:14px;font-weight:500;color:#5d4d7d;margin-top:4px;cursor:pointer}
.corr-trigger:hover,.corr-trigger:active{background:#f5f1f7;border-style:solid}
.corr-card{background:linear-gradient(135deg,#f5f1f7,#ebe5f0);border:2px solid #b8b0c4;border-radius:16px;padding:16px}
.corr-card h3{font-size:14px;font-weight:700;color:#5d4d7d;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.corr-input-block{margin-bottom:10px;background:#fff;border-radius:8px;padding:12px}
.corr-input-block label{font-size:12px;color:#3a3530;display:block;margin-bottom:6px;font-weight:500}
.corr-input-row{display:flex;gap:8px;align-items:center}
.corr-input-row .in{flex:1;padding:10px 12px;font-size:16px;font-weight:600;text-align:center}
.corr-or{text-align:center;font-size:11px;color:#a39885;margin:4px 0;font-weight:500;letter-spacing:.05em}
.corr-preview{background:#fff;border-radius:8px;padding:14px;margin-bottom:12px;text-align:center;border:1px solid #ede4d3}

const GENERIC_UNITS = [
  ['gram', 1],
  ['yemek kaşığı', 15],
  ['tatlı kaşığı', 10],
  ['çay kaşığı', 5],
  ['su bardağı', 200],
  ['çay bardağı', 100],
  ['avuç', 30]
];

const searchDB = (q) => {
  q = q.toLowerCase().trim();
  if (DB[q]) return DB[q];
  for (const [k,v] of Object.entries(DB)) {
    if (k.includes(q) || v.n.toLowerCase().includes(q)) return v;
  }
  return null;
};

function ensureGram(units) {
  if (units.some(u => u[0] === 'gram')) return units;
  return [...units, ['gram', 1]];
}

function getUnitsForFood(name) {
  const q = (name || '').toLowerCase().trim();
  if (!q) return GENERIC_UNITS;
  // User library
  const lib = state.library[q];
  if (lib && Array.isArray(lib.units) && lib.units.length) return ensureGram(lib.units);
  // DB exact
  if (DB[q] && DB[q].u) return ensureGram(DB[q].u);
  // DB partial
  for (const [k, v] of Object.entries(DB)) {
    if ((k.includes(q) || v.n.toLowerCase().includes(q)) && v.u) return ensureGram(v.u);
  }
  return GENERIC_UNITS;
}

  del:(k)=>{try{localStorage.removeItem(k)}catch(e){}},
  keys:(p)=>{try{return Object.keys(localStorage).filter(k=>k.startsWith(p))}catch(e){return[]}}

function loadAll() {
  state.library = LS.get('karbsayar:library') || {};
  state.templates = LS.get('karbsayar:templates') || {};
  const s = LS.get('karbsayar:settings') || {};
  if (typeof s.insulinRatio === 'number') state.insulinRatio = s.insulinRatio;
  if (s.ratioMode) state.ratioMode = s.ratioMode;
  if (s.ratios) state.ratios = { ...state.ratios, ...s.ratios };
  if (typeof s.useCorrection === 'boolean') state.useCorrection = s.useCorrection;
  if (typeof s.isf === 'number') state.isf = s.isf;
  if (typeof s.targetBG === 'number') state.targetBG = s.targetBG;
  if (typeof s.roundStep === 'number') state.roundStep = s.roundStep;
  if (typeof s.diaMinutes === 'number') state.diaMinutes = s.diaMinutes;
  if (typeof s.darkMode === 'boolean') state.darkMode = s.darkMode;
  if (typeof s.exerciseReduction === 'number') state.exerciseReduction = s.exerciseReduction;
  state.apiKey = s.apiKey || '';
  state.history = {};
  LS.keys('karbsayar:log:').forEach(k => {
    const d = k.replace('karbsayar:log:', '');
    state.history[d] = LS.get(k) || [];
  });

// İNSULİN HESABI
// ============================================================================
function ratioKeyForHour(h) {
  if (h >= 4 && h < 11) return 'breakfast';
  if (h >= 11 && h < 16) return 'lunch';
  if (h >= 16 && h < 21) return 'dinner';
  return 'night';
}
function ratioLabelForHour(h) {
  if (state.ratioMode === 'fixed') return 'sabit oran';
  return ({ breakfast: 'kahvaltı', lunch: 'öğle', dinner: 'akşam', night: 'gece' })[ratioKeyForHour(h)];
}
function getRatioForHour(h) {
  if (state.ratioMode === 'fixed') return state.insulinRatio;
  return state.ratios[ratioKeyForHour(h)] || state.insulinRatio;
}
function roundDose(d) {
  const step = Number(state.roundStep);
  if (!step) return Math.round(d * 10) / 10;
  return Math.round(d / step) * step;
}
function calcInsulin(carbs, hour, bg, iob) {
  iob = iob || 0;
  const ratio = getRatioForHour(hour);
  const carbDose = ratio > 0 ? carbs / ratio : 0;
  let rawCorrection = 0;
  let iobReduction = 0;
  let correction = 0;
  if (bg && state.useCorrection && state.isf > 0) {
    rawCorrection = Math.max(0, (bg - state.targetBG) / state.isf);
    iobReduction = Math.min(iob, rawCorrection);
    correction = rawCorrection - iobReduction;
  }
  const totalRaw = carbDose + correction;
  return {
    ratio, carbDose, rawCorrection, correction, iob, iobReduction, totalRaw,
    totalRounded: roundDose(totalRaw),
    label: ratioLabelForHour(hour)
  };
}

// IOB (Aktif İnsülin) hesabı — hızlı insülin (rapid acting) için eğri model
// Profil yaklaşıklığı: t/DIA=0.25→%70 aktif, 0.50→%35, 0.75→%10, 1.0→%0
function iobFraction(elapsedMin, diaMin) {
  if (elapsedMin <= 0) return 1;
  if (elapsedMin >= diaMin) return 0;
  const x = elapsedMin / diaMin;
  if (x <= 0.25) return 1 - (x / 0.25) * 0.30;
  if (x <= 0.50) return 0.70 - ((x - 0.25) / 0.25) * 0.35;
  if (x <= 0.75) return 0.35 - ((x - 0.50) / 0.25) * 0.25;
  return 0.10 - ((x - 0.75) / 0.25) * 0.10;
}

function getEntryDateTime(entry, dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const [h, mi] = String(entry.time || '00:00').split(':').map(Number);
  return new Date(y, m - 1, d, h || 0, mi || 0);
}

function calcIOB(now) {
  now = now || new Date();
  let total = 0;
  const contributions = [];
  const todayStr = now.toISOString().split('T')[0];
  const yesterdayStr = new Date(now.getTime() - 86400000).toISOString().split('T')[0];

  for (const dateStr of [yesterdayStr, todayStr]) {
    const entries = (dateStr === todayStr && state.date === todayStr)
      ? state.todayLog
      : (state.history[dateStr] || []);
    for (const entry of entries) {
      if (typeof entry.insulin !== 'number' || entry.insulin <= 0) continue;
      const entryTime = getEntryDateTime(entry, dateStr);
      const elapsedMin = (now - entryTime) / 60000;
      if (elapsedMin < 0 || elapsedMin >= state.diaMinutes) continue;
      const fraction = iobFraction(elapsedMin, state.diaMinutes);
      const contribution = entry.insulin * fraction;
      total += contribution;
      contributions.push({ food: entry.food, insulin: entry.insulin, active: contribution, elapsedMin });
    }
  }
  contributions.sort((a, b) => a.elapsedMin - b.elapsedMin);
  return { total, contributions };
}

function fmtTimeSince(min) {
  if (min < 1) return 'az önce';
  if (min < 60) return `${Math.round(min)}dk`;
  const h = Math.floor(min / 60);
  const m = Math.round(min % 60);
  return m > 0 ? `${h}sa ${m}dk` : `${h}sa`;
}

}

  const fromLib = Object.entries(state.library)
    .filter(([k,v]) => v.name.toLowerCase().includes(q))

function buildEstimate(food, portion, c, p, f, source, conf, notes) {
  state.estimate = {
    food, portion,
    carbsPer100g: c, carbs: (c * portion) / 100,
    proteinPer100g: p, protein: (p * portion) / 100,
    fatPer100g: f, fat: (f * portion) / 100,
    source, confidence: conf, notes: notes || '',
    qty: parseFloat(state.portionQty) || 0,

  };

function lookupFood() {
  const food = state.foodInput.trim();
  const portion = getCurrentGrams();
  if (!food) { state.error = 'Yemek adı gerekli'; render(); return; }
  if (!portion || portion <= 0) { state.error = 'Geçerli miktar gerekli'; render(); return; }
  state.error = null;

  const libKey = food.toLowerCase();
  if (state.library[libKey]) {
    const lib = state.library[libKey];
    buildEstimate(food, portion, lib.carbsPer100g, lib.proteinPer100g, lib.fatPer100g, 'kütüphane', 'kayıtlı', lib.notes || '');
    render(); return;
  }
  const db = searchDB(food);
  if (db) {
    buildEstimate(db.n, portion, db.c, db.p, db.f, 'veritabanı', 'yüksek', db.o);
    render(); return;
  }
  if (state.apiKey) { estimateAI(food, portion); return; }
  state.error = 'Bu yemek bulunamadı. Manuel gir veya Ayarlar\'dan API anahtarı ekle.';
  render();
}

async function estimateAI(food, portion) {
  state.loading = true; state.error = null; render();
  try {
    const prompt = `Sen bir beslenme uzmanısın. Tip 1 diyabet hastası için karbonhidrat sayımı yapıyorsun. Doğruluk kritik.

Yemek: "${food}"
Porsiyon: ${portion} gram

Bu yemeğin 100 gram başına besin değerlerini ver. Türk mutfağı dahil tüm yemekleri tanı. Pişmiş halini değerlendir. Karbonhidrat: net karb (toplam - lif).

SADECE şu JSON formatında cevap ver, markdown kullanma:
{"carbsPer100g":<sayı>,"proteinPer100g":<sayı>,"fatPer100g":<sayı>,"confidence":"yüksek|orta|düşük","notes":"<varsa kısa not, yoksa boş>"}`;
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({ model: 'claude-haiku-4-5', max_tokens: 400, messages: [{ role: 'user', content: prompt }] })
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error(`API ${res.status}: ${err.substring(0, 100)}`);
    }
    const data = await res.json();
    const text = data.content.filter(c => c.type === 'text').map(c => c.text).join('').trim();
    const cleaned = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(cleaned);
    buildEstimate(food, portion, parsed.carbsPer100g, parsed.proteinPer100g, parsed.fatPer100g, 'ai', parsed.confidence, parsed.notes);
  } catch (e) {
    state.error = 'AI tahmin başarısız: ' + e.message;
  }
  state.loading = false;
  render();
}

  if (state.mealItems.length === 0) return;

function calcCorrectionPreview() {
  const bg = parseFloat(state.correctionBG) || null;
  const manual = parseFloat(state.correctionManual) || null;
  if (!bg && !manual) return null;

  const now = new Date();
  const hour = now.getHours();
  const iob = calcIOB(now).total;

  if (manual && !bg) {
    return { type: 'manual', raw: manual, rounded: roundDose(manual), iob };
  }
  // BG verildi
  const dose = calcInsulin(0, hour, bg, iob);
  if (manual) {
    // Hem BG hem manuel — manuel kullan, ama BG bilgisini göster
    return { type: 'manual_override', raw: manual, rounded: roundDose(manual),
             bg, target: state.targetBG, isf: state.isf, calculated: dose.totalRaw, iob };
  }
  return {
    type: 'calculated',
    bg, target: state.targetBG, isf: state.isf,
    rawCorrection: dose.rawCorrection,
    iobReduction: dose.iobReduction,
    iob,
    raw: dose.totalRaw,
    rounded: dose.totalRounded
  };
}

function commitCorrection() {
  const preview = calcCorrectionPreview();
  if (!preview) {
    state.error = 'KŞ veya manuel doz girmelisin';
    render();
    return;
  }
  if (preview.rounded <= 0) {
    const bg = parseFloat(state.correctionBG) || null;
    const iob = preview.iob || 0;
    let msg;
    if (bg && bg < state.targetBG) msg = `KŞ hedef altında (${bg} < ${state.targetBG}). Düzeltme gerekmiyor.`;
    else if (iob > 0) msg = `Aktif insülin yeterli (${fmt(iob,1)} Ü). Ek düzeltme gerekmiyor.`;
    else msg = 'Hesaplanan doz 0. Kayıt yapılmadı.';
    alert(msg);
    return;
  }

  const now = new Date();
  const hour = now.getHours();
  const bg = parseFloat(state.correctionBG) || null;

  let label;
  if (preview.type === 'manual') label = 'Manuel doz';
  else label = `Ara iğne · KŞ ${bg}`;

  const newEntry = {
    id: Date.now().toString(),
    type: 'correction',
    food: label,
    portion: 0, carbs: 0, protein: 0, fat: 0,
    time: now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }),

  updated.notes = draft.notes || '';
  const bg = parseFloat(String(draft.bg).replace(',', '.'));
  updated.bg = !isNaN(bg) && bg > 0 ? bg : null;
  const ins = parseFloat(String(draft.insulin).replace(',', '.'));
  if (!isNaN(ins) && ins >= 0) updated.insulin = ins;
  const newLog = [...state.todayLog];
  newLog[idx] = updated;
  saveLog(newLog);
  state.editingEntry = null;
  state.editDraft = {};
  render();
}

// ============================================================================
// YEMEK SONRASI KAN ŞEKERİ (öğrenme döngüsü)
// ============================================================================
function entriesNeedingPostBG(now) {
  now = now || new Date();
  return state.todayLog.filter(e => {
    if (e.type === 'correction') return false;
    if (e.postMealBG && typeof e.postMealBG.value === 'number') return false;
    if (!e.carbs || e.carbs < 10) return false;
    const t = getEntryDateTime(e, state.date);
    const elapsedMin = (now - t) / 60000;
    return elapsedMin >= 90 && elapsedMin <= 240;
  });
}

function startPostBGInput(entryId) {
  state.postBgInputId = entryId;
  state.postBgValue = '';
  render();
}

function cancelPostBGInput() {
  state.postBgInputId = null;
  state.postBgValue = '';
  render();
}

function savePostBG() {
  if (!state.postBgInputId) return;
  const v = parseFloat(String(state.postBgValue).replace(',', '.'));
  if (isNaN(v) || v <= 0) { alert('Geçerli bir KŞ değeri gir'); return; }
  const idx = state.todayLog.findIndex(e => e.id === state.postBgInputId);
  if (idx === -1) return;
  const newLog = [...state.todayLog];
  newLog[idx] = {
    ...newLog[idx],
    postMealBG: {
      value: v,
      time: new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }),
      loggedAt: new Date().toISOString()
    }
  };
  saveLog(newLog);
  state.postBgInputId = null;
  state.postBgValue = '';
  render();
}

// ============================================================================
// İSTATİSTİKLER (öğrenme için temel)
// ============================================================================
function getAllEntriesInPeriod(days) {
  const now = new Date();
  const cutoff = new Date(now.getTime() - days * 86400000);
  cutoff.setHours(0, 0, 0, 0);
  const cutoffStr = cutoff.toISOString().split('T')[0];
  const dates = new Set(Object.keys(state.history));
  if (state.todayLog.length > 0) dates.add(state.date);
  const arr = [];
  for (const d of dates) {
    if (d < cutoffStr) continue;
    const entries = (d === state.date) ? state.todayLog : (state.history[d] || []);
    entries.forEach(e => arr.push({ ...e, _date: d }));
  }
  return arr;
}

function calcStats(days) {
  const entries = getAllEntriesInPeriod(days);
  if (entries.length === 0) return { empty: true, days };

  const dates = new Set(entries.map(e => e._date));
  const dayCount = dates.size || 1;

  const mealEntries = entries.filter(e => e.type !== 'correction');
  const correctionEntries = entries.filter(e => e.type === 'correction');

  const totalC = mealEntries.reduce((s, e) => s + (e.carbs || 0), 0);
  const totalI = entries.reduce((s, e) => s + (typeof e.insulin === 'number' ? e.insulin : 0), 0);
  const totalP = mealEntries.reduce((s, e) => s + (e.protein || 0), 0);
  const totalF = mealEntries.reduce((s, e) => s + (e.fat || 0), 0);

  // En çok yenenler
  const foodCounts = {};
  mealEntries.forEach(e => {
    if (e.type === 'meal' && Array.isArray(e.items) && e.items.length > 1) {
      e.items.forEach(i => { foodCounts[i.food] = (foodCounts[i.food] || 0) + 1; });
    } else if (e.food) {
      foodCounts[e.food] = (foodCounts[e.food] || 0) + 1;
    }
  });
  const topFoods = Object.entries(foodCounts).sort((a, b) => b[1] - a[1]).slice(0, 8);

  // Öğün tipine göre
  const byMealType = {};
  MEAL_TYPE_KEYS.forEach(k => byMealType[k] = { c: 0, i: 0, n: 0, deltaSum: 0, deltaN: 0 });
  mealEntries.forEach(e => {
    const mt = e.mealType || getDefaultMealType(getEntryHour(e));
    if (byMealType[mt]) {
      byMealType[mt].c += e.carbs || 0;
      byMealType[mt].i += typeof e.insulin === 'number' ? e.insulin : 0;
      byMealType[mt].n += 1;
      if (e.bg && e.postMealBG && typeof e.postMealBG.value === 'number') {
        byMealType[mt].deltaSum += (e.postMealBG.value - e.bg);
        byMealType[mt].deltaN += 1;
      }
    }
  });

  // Yemek sonrası KŞ analiz
  const withPostBG = mealEntries.filter(e => e.postMealBG && typeof e.postMealBG.value === 'number');
  const withPrePost = withPostBG.filter(e => e.bg);
  const avgPostMealBG = withPostBG.length ? withPostBG.reduce((s, e) => s + e.postMealBG.value, 0) / withPostBG.length : null;
  const avgDelta = withPrePost.length ? withPrePost.reduce((s, e) => s + (e.postMealBG.value - e.bg), 0) / withPrePost.length : null;

  return {
    days, dayCount, totalEntries: entries.length, mealCount: mealEntries.length, correctionCount: correctionEntries.length,
    totalC, totalI, totalP, totalF,
    avgC: totalC / dayCount, avgI: totalI / dayCount,
    topFoods, byMealType,
    postBGCount: withPostBG.length, avgPostMealBG, avgDelta,
    withPrePostCount: withPrePost.length
  };
}

// ============================================================================
// CSV EXPORT (doktor vizit için)
// ============================================================================
function exportCSV() {
  const rows = [['Tarih', 'Saat', 'Tip', 'Öğün Türü', 'Yemek', 'Porsiyon (g)', 'KH (g)', 'Protein (g)', 'Yağ (g)', 'KŞ Önce', 'İnsulin (Ü)', 'KŞ Sonrası', 'KŞ Sonrası Saat', 'Notlar']];
  const allDays = new Set([...Object.keys(state.history), state.date]);
  Array.from(allDays).sort().forEach(date => {
    const entries = (date === state.date) ? state.todayLog : (state.history[date] || []);
    entries.forEach(e => {
      rows.push([
        date,
        e.time || '',
        e.type === 'correction' ? 'Düzeltme' : e.type === 'meal' ? 'Öğün' : 'Yemek',
        e.mealType ? mealTypeLabel(e.mealType).name : '',
        e.food || '',
        fmt(e.portion || 0, 0),
        fmt(e.carbs || 0, 1),
        fmt(e.protein || 0, 1),
        fmt(e.fat || 0, 1),
        e.bg || '',
        typeof e.insulin === 'number' ? fmt(e.insulin, 2) : '',
        e.postMealBG && typeof e.postMealBG.value === 'number' ? e.postMealBG.value : '',
        e.postMealBG && e.postMealBG.time ? e.postMealBG.time : '',
        (e.notes || '').replace(/"/g, '""').replace(/[\r\n]+/g, ' ')
      ]);
    });
  });
  const csv = rows.map(r => r.map(c => `"${String(c)}"`).join(',')).join('\r\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `karbsayar-${new Date().toISOString().split('T')[0]}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ============================================================================
// YAĞ/PROTEİN GECİKME UYARISI
// ============================================================================
function fpBurden(fat, protein) { return (fat || 0) + (protein || 0) * 0.5; }
function showFPWarning(fat, protein) { return (fat || 0) >= 20 || fpBurden(fat, protein) >= 30; }
function fpWarningHtml(fat, protein) {
  const burden = fpBurden(fat, protein);
  const high = (fat || 0) >= 30 || burden >= 45;
  return `<div class="fp-warning">
    ${svg('alert','icn icn-sm')}
    <div>
      <b>${high ? 'Çok yüksek' : 'Yüksek'} yağ/protein:</b> ${fmt(fat, 1)}g yağ + ${fmt(protein, 1)}g protein.
      Glikoz piki ${high ? '2-4' : '1-3'} saat gecikebilir. <b>Split bolus</b> düşün: ~%50 şimdi, ~%50 ${high ? '2sa' : '1.5sa'} sonra.
    </div>
  </div>`;
}

// ============================================================================
// EGZERSİZ MODU - dose hesabını ayarla
// ============================================================================
function applyExerciseAdjustment(dose) {
  if (!state.exerciseMode || state.exerciseReduction <= 0) return dose;
  const factor = (100 - state.exerciseReduction) / 100;
  const adjustedRaw = dose.totalRaw * factor;
  return {
    ...dose,
    preExerciseRaw: dose.totalRaw,
    totalRaw: adjustedRaw,
    totalRounded: roundDose(adjustedRaw),
    exerciseAdjusted: true,
    exerciseReduction: state.exerciseReduction
  };
}

      ` : `<div class="corr-preview empty">KŞ veya manuel doz gir, hesap burada görünecek</div>`}

      ${state.error ? `<div class="err">${svg('alert','icn icn-sm')}<span>${esc(state.error)}</span></div>` : ''}

      <div class="notes-row">
        <label>Not (opsiyonel)</label>
        <input class="in" type="text" placeholder="Sabah yüksekliği, geç düzeltme..." value="${esc(state.correctionNotes)}" data-input="correctionNotes">
      </div>

      <div class="btn-pair">
        <button class="btn btn-secondary" data-act="cancelCorrection">${svg('x','icn icn-sm')} İptal</button>
        <button class="btn btn-primary" data-act="commitCorrection" ${!preview || preview.rounded <= 0 ? 'disabled' : ''}>${svg('check','icn icn-sm')} Kaydet${preview && preview.rounded > 0 ? ` · ${fmt(preview.rounded, state.roundStep === 1 ? 0 : 1)} Ü` : ''}</button>
      </div>
    </div>`;
  } else if (isToday) {
    const sugHtml = state.suggestions.length ? `<div class="suggestions">
      ${state.suggestions.map(s => `<button class="suggestion" data-act="pickSuggestion" data-name="${esc(s.name)}">
        <span>${esc(s.name)}</span>
        <span class="tag ${s.src === 'lib' ? 'tag-lib' : 'tag-db'}">${s.src === 'lib' ? 'kayıtlı' : 'DB'}</span>
      </button>`).join('')}
    </div>` : '';

    // Birim seçici options
    ensureValidUnit();
    const units = getUnitsForFood(state.foodInput);
    const unitOptions = units.map(([n, g]) =>
      `<option value="${esc(n)}" ${n === state.portionUnit ? 'selected' : ''}>${esc(n)} (${g}g)</option>`
    ).join('');
    const grams = getCurrentGrams();
    const gramsDisplay = grams > 0 ? `= <b>${fmt(grams)} gram</b>` : '';

    html += `<div class="card">
      ${Object.keys(state.templates).length > 0 ? `
        <div class="template-section-title">${svg('plus','icn icn-sm')} SIK YENENLER</div>
        <div class="templates-row">
          ${Object.entries(state.templates).slice(0, 12).map(([key, tpl]) => {
            const mt = tpl.mealType ? mealTypeLabel(tpl.mealType) : null;
            return `<button class="template-pill" data-act="loadTemplate" data-key="${esc(key)}" title="${esc(tpl.name)}">
              ${mt ? `<span class="em">${mt.emoji}</span>` : ''}
              <span>${esc(tpl.name)}</span>
              <span style="opacity:.6;font-size:10px">· ${tpl.items.length}</span>
            </button>`;
          }).join('')}
        </div>
      ` : ''}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2 style="margin:0">${svg('plus','icn icn-sm')} Yemek Ekle</h2>
        <button class="btn-link" data-act="toggleManual">${state.manualMode ? '← Otomatik ara' : 'Manuel gir →'}</button>
      </div>
      <div class="input-wrap">
        <div style="position:relative">
          <input class="in" type="text" placeholder="Yemek adı (pilav, baklava, ekmek...)" value="${esc(state.foodInput)}" data-input="foodInput" autocomplete="off">
          ${!state.manualMode ? sugHtml : ''}
        </div>
        <div class="qty-row">
          <input class="in" type="number" inputmode="decimal" placeholder="Miktar" value="${esc(state.portionQty)}" data-input="portionQty">
          <select class="in" data-input="portionUnit">${unitOptions}</select>
        </div>
        <div class="qty-grams" data-display="grams">${gramsDisplay}</div>
        ${state.manualMode ? `<div class="input-grid" style="margin-top:4px">
          <input class="in" type="number" inputmode="decimal" placeholder="KH/100g" value="${esc(state.manualCarbs)}" data-input="manualCarbs">
          <input class="in" type="number" inputmode="decimal" placeholder="Pro/100g" value="${esc(state.manualProtein)}" data-input="manualProtein">
          <input class="in" type="number" inputmode="decimal" placeholder="Yağ/100g" value="${esc(state.manualFat)}" data-input="manualFat">
        </div>` : ''}
        ${state.error ? `<div class="err">${svg('alert','icn icn-sm')}<span>${esc(state.error)}</span></div>` : ''}
        <button class="btn btn-primary btn-full" data-act="${state.manualMode ? 'submitManual' : 'lookup'}" ${state.loading ? 'disabled' : ''}>
          ${state.loading ? `${svgSpin} Hesaplanıyor...` : state.manualMode ? `${svg('check','icn icn-sm')} Önizle` : `${svg('search','icn icn-sm')} Ara / Hesapla`}
        </button>
      </div>
    </div>
    <button class="corr-trigger" data-act="openCorrection">${svg('drop','icn icn-sm')} Sadece Düzeltme / Ara İğne</button>`;
  }

  html += `<div class="card">
    <h2>${svg('cal','icn icn-sm')} ${state.todayLog.length === 0 ? 'Henüz Kayıt Yok' : `${state.todayLog.length} Kayıt`}</h2>
    ${state.todayLog.length === 0 ? `<div class="empty">${isToday ? 'Yemek eklemeye başla' : 'Bu gün için kayıt yok'}</div>` : `
      <div style="display:flex;flex-direction:column;gap:8px">
        ${state.todayLog.map(e => {
          const ins = typeof e.insulin === 'number' ? e.insulin : calcInsulin(e.carbs, getEntryHour(e)).totalRounded;
          const isCorrection = e.type === 'correction';
          const isMeal = e.type === 'meal' && Array.isArray(e.items) && e.items.length > 1;
          const mt = !isCorrection && e.mealType ? mealTypeLabel(e.mealType) : null;
          let metaText;
          if (isCorrection) {
            metaText = `${e.time} · ${e.bg ? `KŞ ${e.bg}` : 'manuel'} · düzeltme`;
          } else if (isMeal) {
            metaText = `${e.time} · ${e.items.length} yemek (${fmt(e.portion)}g) · öğün`;
          } else {
            metaText = `${e.time} · ${portionLabel(e)} · ${e.source}`;
          }
          if (e.exerciseAdjusted) metaText += ' · 🏃';

          // Yemek sonrası KŞ durumu
          const now = new Date();
          const entryTime = getEntryDateTime(e, state.date);
          const elapsedMin = (now - entryTime) / 60000;
          const eligibleForPostBG = !isCorrection && (e.carbs || 0) >= 10 && elapsedMin >= 90 && elapsedMin <= 240 && isToday;
          const hasPostBG = e.postMealBG && typeof e.postMealBG.value === 'number';
          const postBGDelta = hasPostBG && e.bg ? (e.postMealBG.value - e.bg) : null;

          // Düzenleme modu
          if (state.editingEntry === e.id) {
            const draft = state.editDraft;
            return `<div class="entry" style="flex-direction:column;align-items:stretch">
              <div class="entry-flex">
                <div class="entry-name">${esc(e.food)}</div>
                <div class="entry-meta">${e.time} · düzenleniyor</div>
              </div>
              <div class="edit-entry-form">
                <div class="edit-entry-row">
                  <label>Saat</label>
                  <input class="in" type="text" inputmode="numeric" placeholder="14:30" value="${esc(draft.time || '')}" data-edit-input="time">
                </div>
                ${!isCorrection ? `
                  <div class="edit-entry-row">
                    <label>Öğün</label>
                    <div class="meal-type-row" style="margin-bottom:0">
                      ${MEAL_TYPE_KEYS.map(k => `
                        <button class="meal-type-pill ${draft.mealType === k ? 'active' : ''}" data-act="setEditMealType" data-type="${k}">
                          <span class="em">${MEAL_TYPES[k].emoji}</span>
                          <span>${MEAL_TYPES[k].name}</span>
                        </button>
                      `).join('')}
                    </div>
                  </div>
                ` : ''}
                <div class="edit-entry-row">
                  <label>KŞ</label>
                  <input class="in" type="text" inputmode="decimal" placeholder="opsiyonel" value="${esc(draft.bg || '')}" data-edit-input="bg">
                  <span class="tiny muted">mg/dL</span>
                </div>
                <div class="edit-entry-row">
                  <label>İnsulin</label>
                  <input class="in" type="text" inputmode="decimal" placeholder="${fmt(ins, 1)}" value="${esc(draft.insulin || '')}" data-edit-input="insulin">
                  <span class="tiny muted">Ü</span>
                </div>
                <div class="edit-entry-row">
                  <label>Not</label>
                  <input class="in" type="text" placeholder="opsiyonel" value="${esc(draft.notes || '')}" data-edit-input="notes">
                </div>
                <div class="btn-pair" style="margin-top:8px">
                  <button class="btn btn-secondary" data-act="cancelEditEntry">İptal</button>
                  <button class="btn btn-primary" data-act="saveEditEntry" data-id="${e.id}">Kaydet</button>
                </div>
              </div>
            </div>`;
          }

          return `<div class="entry" style="flex-direction:column;align-items:stretch">
            <div style="display:flex;align-items:center;gap:10px;width:100%">
              <div class="entry-flex">
                <div class="entry-name">${mt ? `<span class="meal-type-tag">${mt.emoji} ${mt.name}</span>` : ''}${esc(e.food)}</div>
                <div class="entry-meta">${metaText}</div>
                ${isMeal ? `<div class="entry-meta" style="margin-top:3px;font-size:10px">${e.items.map(i => esc(i.food)).join(' · ')}</div>` : ''}
                ${e.notes ? `<div class="entry-note">📝 ${esc(e.notes)}</div>` : ''}
                ${hasPostBG ? `
                  <div class="pbg-line ${postBGDelta !== null ? (postBGDelta > 30 ? 'delta-up' : postBGDelta < -30 ? 'delta-down' : '') : ''}">
                    💧 Sonrası: ${e.postMealBG.value} mg/dL${postBGDelta !== null ? ` (${postBGDelta >= 0 ? '+' : ''}${Math.round(postBGDelta)})` : ''} · ${e.postMealBG.time}
                  </div>
                ` : eligibleForPostBG ? `
                  <button class="pbg-link" data-act="startPostBG" data-id="${e.id}">+ Yemek sonrası KŞ ekle</button>
                ` : ''}
                <span class="entry-dose">${svg('drop','icn icn-sm')} ${fmt(ins, state.roundStep === 1 ? 0 : 1)} Ü</span>
              </div>
              <div class="entry-val"><div class="v">${isCorrection ? '—' : fmt(e.carbs, 1) + 'g'}</div><div class="u">${isCorrection ? '' : 'KH'}</div></div>
              ${isToday ? `
                <button class="icon-btn icon-btn-blue" data-act="startEditEntry" data-id="${e.id}">${svg('edit','icn icn-sm')}</button>
                <button class="icon-btn" data-act="deleteEntry" data-id="${e.id}">${svg('trash','icn icn-sm')}</button>
              ` : ''}
            </div>
            ${state.postBgInputId === e.id ? `
              <div class="pbg-input-row">
                <input class="in" type="text" inputmode="decimal" placeholder="Yemek sonrası KŞ (mg/dL)" value="${esc(state.postBgValue)}" data-input="postBgValue" autofocus>
                <button class="btn btn-secondary" data-act="cancelPostBG">İptal</button>
                <button class="btn btn-primary" data-act="savePostBG">Kaydet</button>
              </div>
            ` : ''}
          </div>`;
        }).join('')}
      </div>
    `}
  </div></div>`;
  return html;
}

function renderLibrary() {
  const filtered = Object.entries(state.library)
    .filter(([k,v]) => !state.librarySearch || v.name.toLowerCase().includes(state.librarySearch.toLowerCase()))
    .sort((a,b) => a[1].name.localeCompare(b[1].name, 'tr'));

  const templateEntries = Object.entries(state.templates)
    .sort((a,b) => a[1].name.localeCompare(b[1].name, 'tr'));

  return `<div class="content">
    ${templateEntries.length > 0 ? `
      <div class="section-title">${svg('plus','icn icn-sm')} Şablonlar (${templateEntries.length})</div>
      <div style="margin-bottom:8px">
        ${templateEntries.map(([key, tpl]) => {
          const mt = tpl.mealType ? mealTypeLabel(tpl.mealType) : null;
          const totalC = tpl.items.reduce((s, i) => s + (i.carbs || 0), 0);
          return `<div class="template-list-item">
            <div class="info">
              <div class="nm">${mt ? `<span class="meal-type-tag">${mt.emoji} ${mt.name}</span>` : ''}${esc(tpl.name)}</div>
              <div class="mt">${tpl.items.length} yemek · <span class="v">${fmt(totalC, 1)}g KH</span> · ${tpl.items.map(i => esc(i.food)).slice(0, 3).join(', ')}${tpl.items.length > 3 ? '...' : ''}</div>
            </div>
            <button class="icon-btn icon-btn-blue" data-act="loadTemplate" data-key="${esc(key)}" title="Sepete yükle">${svg('plus','icn icn-sm')}</button>
            <button class="icon-btn" data-act="deleteTemplate" data-key="${esc(key)}">${svg('trash','icn icn-sm')}</button>
          </div>`;
        }).join('')}
      </div>
    ` : ''}

    <div class="search-bar">
      ${svg('search','icn icn-sm')}
      <input type="text" placeholder="Kayıtlı yemek ara..." value="${esc(state.librarySearch)}" data-input="librarySearch">
    </div>
    <div class="muted tiny" style="padding:0 4px">
      ${Object.keys(state.library).length} kişisel kayıt · ${Object.keys(DB).length} hazır gömülü yemek
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${filtered.length === 0 ? `<div class="card empty">${Object.keys(state.library).length === 0 ? 'Henüz kişisel kayıt yok. Yemek ekledikçe burası dolacak.' : 'Eşleşme yok'}</div>` :
        filtered.map(([key, food]) => state.editingFood === key ? renderEditForm(key, food) : `
          <div class="lib-item">
            <div class="lib-row">
              <div class="entry-flex">
                <div class="lib-name">${esc(food.name)}</div>
                <div class="lib-meta">KH: <span class="v">${food.carbsPer100g}g</span> · P: ${food.proteinPer100g || 0}g · Y: ${food.fatPer100g || 0}g <span class="muted">/100g</span></div>
                ${food.notes ? `<div class="lib-note">${esc(food.notes)}</div>` : ''}
              </div>
              <button class="icon-btn icon-btn-blue" data-act="editLib" data-key="${esc(key)}">${svg('edit','icn icn-sm')}</button>
              <button class="icon-btn" data-act="deleteLib" data-key="${esc(key)}">${svg('trash','icn icn-sm')}</button>
            </div>
          </div>
        `).join('')
      }
    </div>
  </div>`;
}

function renderEditForm(key, food) {
  return `<div class="lib-item">
    <div class="edit-form">
      <div class="lib-name">${esc(food.name)}</div>
      <div class="grid3">
        <div><label>KH/100g</label><input class="in" type="number" inputmode="decimal" value="${food.carbsPer100g}" data-edit="c" data-key="${esc(key)}"></div>
        <div><label>Pro/100g</label><input class="in" type="number" inputmode="decimal" value="${food.proteinPer100g || 0}" data-edit="p" data-key="${esc(key)}"></div>
        <div><label>Yağ/100g</label><input class="in" type="number" inputmode="decimal" value="${food.fatPer100g || 0}" data-edit="f" data-key="${esc(key)}"></div>
      </div>
      <input class="in" type="text" value="${esc(food.notes || '')}" placeholder="Not (opsiyonel)" data-edit="n" data-key="${esc(key)}">
      <div class="btn-pair">
        <button class="btn btn-secondary" data-act="cancelEdit">İptal</button>
        <button class="btn btn-primary" data-act="saveEdit" data-key="${esc(key)}">Kaydet</button>
      </div>
    </div>
  </div>`;
}

function renderHistory() {
  const stats = calcStats(state.statPeriod);
  const sorted = Object.entries(state.history)
    .map(([d, entries]) => ({
      date: d,
      total: entries.reduce((s,e) => s + e.carbs, 0),
      insulin: entries.reduce((s,e) => s + (typeof e.insulin === 'number' ? e.insulin : calcInsulin(e.carbs, getEntryHour(e)).totalRounded), 0),
      count: entries.length
    }))
    .filter(h => h.count > 0)
    .sort((a,b) => b.date.localeCompare(a.date));

  const maxFoodCount = stats.empty ? 0 : Math.max(...stats.topFoods.map(f => f[1]), 1);

  return `<div class="content">
    <div class="stat-period">
      <button class="${state.statPeriod === 7 ? 'active' : ''}" data-act="setStatPeriod" data-days="7">Son 7 gün</button>
      <button class="${state.statPeriod === 30 ? 'active' : ''}" data-act="setStatPeriod" data-days="30">Son 30 gün</button>
      <button class="${state.statPeriod === 90 ? 'active' : ''}" data-act="setStatPeriod" data-days="90">Son 90 gün</button>
    </div>

    ${stats.empty ? '<div class="card empty">Bu dönemde kayıt yok</div>' : `
      <div class="stats-grid">
        <div class="stat-card">
          <div class="lbl">Günlük Ortalama KH</div>
          <div class="v">${fmt(stats.avgC, 0)}<span class="u">g</span></div>
          <div class="s">${stats.dayCount} aktif gün</div>
        </div>
        <div class="stat-card">
          <div class="lbl">Günlük Ortalama İnsulin</div>
          <div class="v">${fmt(stats.avgI, 1)}<span class="u">Ü</span></div>
          <div class="s">${stats.totalEntries} kayıt</div>
        </div>
        <div class="stat-card">
          <div class="lbl">Toplam KH</div>
          <div class="v">${fmt(stats.totalC, 0)}<span class="u">g</span></div>
          <div class="s">${stats.mealCount} öğün</div>
        </div>
        <div class="stat-card">
          <div class="lbl">Toplam İnsulin</div>
          <div class="v">${fmt(stats.totalI, 1)}<span class="u">Ü</span></div>
          <div class="s">${stats.correctionCount} düzeltme</div>
        </div>
      </div>

      ${stats.avgDelta !== null ? `
        <div class="card" style="margin-bottom:12px">
          <h2>${svg('drop','icn icn-sm')} Yemek Sonrası KŞ Analizi</h2>
          <div class="row" style="margin-bottom:8px">
            <div>
              <div class="tiny muted">Ortalama Sapma</div>
              <div style="font-size:24px;font-weight:700;color:${stats.avgDelta > 30 ? '#dc2626' : stats.avgDelta < -30 ? '#16a34a' : '#3d6850'}">${stats.avgDelta >= 0 ? '+' : ''}${fmt(stats.avgDelta, 0)} mg/dL</div>
            </div>
            <div style="text-align:right">
              <div class="tiny muted">Örnek</div>
              <div style="font-size:14px;font-weight:600">${stats.withPrePostCount} öğün</div>
            </div>
          </div>
          <div class="tiny muted" style="line-height:1.4">
            ${stats.avgDelta > 30 ? '⚠️ Yemek sonrası KŞ ortalama hedef üstünde — KH/insulin oranını düşürmeyi (örn 1Ü = 10g → 9g) doktorla konuş.' :
              stats.avgDelta < -30 ? '⚠️ Yemek sonrası KŞ ortalama hedef altında — KH/insulin oranını yükseltmeyi (örn 1Ü = 10g → 11g) doktorla konuş.' :
              '✓ Yemek sonrası KŞ hedefe yakın — mevcut oranlar iyi çalışıyor.'}
          </div>
        </div>
      ` : ''}

      <div class="section-title">Öğün Tipine Göre Dağılım</div>
      <div class="mt-summary-row">
        ${MEAL_TYPE_KEYS.map(k => {
          const m = stats.byMealType[k];
          const avgC = m.n > 0 ? m.c / m.n : 0;
          const avgI = m.n > 0 ? m.i / m.n : 0;
          return `<div class="mt-summary">
            <div class="em">${MEAL_TYPES[k].emoji}</div>
            <div class="nm">${MEAL_TYPES[k].name}</div>
            <div class="v">${fmt(avgC, 0)}g</div>
            <div class="s">${fmt(avgI, 1)}Ü · n=${m.n}</div>
          </div>`;
        }).join('')}
      </div>

      ${stats.topFoods.length > 0 ? `
        <div class="section-title">En Çok Yenenler (Top ${stats.topFoods.length})</div>
        <div class="card" style="margin-bottom:12px">
          ${stats.topFoods.map(([name, count]) => `
            <div class="bar-row">
              <div class="label" title="${esc(name)}">${esc(name)}</div>
              <div class="bar-bg">
                <div class="bar-fill" style="width:${Math.max(8, (count / maxFoodCount) * 100)}%">${count}</div>
              </div>
              <div class="v">${count}x</div>
            </div>
          `).join('')}
        </div>
      ` : ''}

      <button class="btn btn-secondary btn-full" style="margin-bottom:16px" data-act="exportCSV">${svg('drop','icn icn-sm')} Tüm Veriyi CSV İndir (Doktor için)</button>
    `}

    <div class="section-title">Günlük Geçmiş</div>
    ${sorted.length === 0 ? '<div class="card empty">Henüz geçmiş yok</div>' :
      sorted.map(d => `<button class="day-btn" data-act="goToDay" data-date="${d.date}">
        <div class="row">
          <div>
            <div class="d">${new Date(d.date).toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long' })}</div>
            <div class="c">${d.count} yemek · ${fmt(d.insulin, 1)} Ü insulin</div>
          </div>
          <div style="text-align:right"><div class="t">${fmt(d.total)}g</div><div class="tl">KH</div></div>
        </div>
      </button>`).join('')
    }
  </div>`;
}

          <div class="set-time-row">

          <div class="set-time-row">
            <div class="lbl-row"><span class="em">🌆</span><span class="name">Akşam</span><span class="rng">16:00 – 20:59</span></div>
            <div class="input-row"><span>1 Ü =</span><input class="in" type="text" inputmode="decimal" value="${state.ratios.dinner}" data-input="ratio_dinner"><span class="un">g KH</span></div>
          </div>
          <div class="set-time-row">
            <div class="lbl-row"><span class="em">🌙</span><span class="name">Gece</span><span class="rng">21:00 – 03:59</span></div>
            <div class="input-row"><span>1 Ü =</span><input class="in" type="text" inputmode="decimal" value="${state.ratios.night}" data-input="ratio_night"><span class="un">g KH</span></div>
          </div>
        </div>
      `}
    </div>

    <div class="card">
      <h2>Düzeltme (Yüksek KŞ)</h2>
      <label class="checkbox-row">
        <input type="checkbox" ${state.useCorrection ? 'checked' : ''} data-input="useCorrection">
        Yüksek kan şekeri için düzeltme dozu hesapla
      </label>
      ${state.useCorrection ? `
        <p class="tiny muted" style="margin:8px 0 12px">Yemek dozuna eklenen ek doz. Sadece KŞ hedefin üstündeyse ekler.</p>
        <div class="set-row" style="margin-bottom:10px">
          <span class="lbl-text">İnsulin duyarlılığı (ISF): 1 Ü =</span>
          <input class="in" type="text" inputmode="decimal" value="${state.isf}" data-input="isf">
          <span>mg/dL</span>
        </div>
        <div class="set-row">
          <span class="lbl-text">Hedef KŞ:</span>
          <input class="in" type="text" inputmode="decimal" value="${state.targetBG}" data-input="targetBG">
          <span>mg/dL</span>
        </div>
      ` : '<p class="tiny muted" style="margin-top:8px">Kapalı: sadece KH dozu hesaplanır.</p>'}
    </div>

    <div class="card">
      <h2>Kalem Yuvarlaması</h2>
      <div class="radio-group" style="margin-bottom:0">
        <label class="radio-opt ${state.roundStep === 0.5 ? 'active' : ''}">
          <input type="radio" name="roundStep" value="0.5" ${state.roundStep === 0.5 ? 'checked' : ''} data-input="roundStep">
          0.5 Ü adım (yarım birim kalem)
        </label>
        <label class="radio-opt ${state.roundStep === 1 ? 'active' : ''}">
          <input type="radio" name="roundStep" value="1" ${state.roundStep === 1 ? 'checked' : ''} data-input="roundStep">
          1 Ü adım (tam birim kalem)
        </label>
        <label class="radio-opt ${state.roundStep === 0 ? 'active' : ''}">
          <input type="radio" name="roundStep" value="0" ${state.roundStep === 0 ? 'checked' : ''} data-input="roundStep">
          Yuvarlama yok (pompa)
        </label>
      </div>
    </div>

    <div class="card">
      <h2>${svg('drop','icn icn-sm')} İnsülin Etki Süresi (DIA)</h2>
      <p class="tiny muted" style="margin-bottom:12px">Hızlı insülinin (NovoRapid, Humalog, Apidra vb.) vücutta aktif kalma süresi. Tipik aralık 3-5 saat. Aktif insülin (IOB) bu süreye göre hesaplanır.</p>
      <div class="set-row">
        <span class="lbl-text">Etki süresi:</span>
        <input class="in" type="text" inputmode="decimal" value="${state.diaMinutes / 60}" data-input="diaHours">
        <span>saat</span>
      </div>
    </div>

    <div class="card">
      <h2>Tema & Egzersiz</h2>
      <label class="checkbox-row">
        <input type="checkbox" ${state.darkMode ? 'checked' : ''} data-input="darkMode">
        🌙 Karanlık mod
      </label>
      <p class="tiny muted" style="margin:8px 0 12px">Akşam/gece kullanımda göz yormaması için.</p>
      <div class="set-row">
        <span class="lbl-text">🏃 Egzersiz dozu azaltma:</span>
        <input class="in" type="text" inputmode="decimal" value="${state.exerciseReduction}" data-input="exerciseReduction">
        <span>%</span>
      </div>
      <p class="tiny muted" style="margin-top:8px">Yemek kartında "Egzersiz var" toggle'ını açtığında dozu bu yüzde kadar azaltır. Tipik: 20-30%.</p>
    </div>

    <div class="card">
      <h2>Anthropic API Anahtarı (opsiyonel)</h2>
      <p class="tiny muted" style="margin-bottom:12px">
        Veritabanında olmayan yemekler için AI tahmin. Anahtar tarayıcıda lokal saklanır.<br>
        <a href="https://console.anthropic.com/settings/keys" target="_blank" style="color:#5b9279">console.anthropic.com</a> üzerinden anahtar al.
      </p>
      <input class="in api-input" type="password" placeholder="sk-ant-..." value="${esc(state.apiKey)}" data-input="apiKey">
      ${state.apiKey ? '<div class="ok">✓ Anahtar kayıtlı, AI tahmin aktif</div>' : ''}
    </div>

    <div class="card-amber">
      <div class="note-info">
        ${svg('alert','icn')}
        <div>
          <div style="font-weight:600;margin-bottom:4px">Önemli</div>
          Tüm doz hesapları senin girdiğin oran ve faktörlere dayanır. Bu uygulama tıbbi tavsiye vermez. Doktorunun verdiği plana göre doz ayarla, kan şekerini ölç, gerekirse düzelt.
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Veri</h2>
      <div class="tiny muted" style="display:flex;flex-direction:column;gap:4px">
        <div>📚 Kişisel kayıt: ${Object.keys(state.library).length}</div>
        <div>⭐ Şablon: ${Object.keys(state.templates).length}</div>
        <div>🗄️ Gömülü DB: ${Object.keys(DB).length}</div>
        <div>📅 Geçmiş gün: ${sortedHistCount}</div>
        <div style="color:#a39885;margin-top:8px">Tüm veri tarayıcında lokal.</div>
      </div>
      <button class="btn btn-secondary btn-full" style="margin-top:12px" data-act="exportData">Yedek İndir (JSON)</button>
      <button class="btn btn-secondary btn-full" style="margin-top:8px" data-act="importData">Yedek Yükle (JSON)</button>
    </div>
  </div>`;
}

function render() {
  const activeFocus = document.activeElement;
  const focusKey = activeFocus && activeFocus.dataset && (activeFocus.dataset.input || activeFocus.dataset.edit);
  const focusKeyAttr = activeFocus && activeFocus.dataset && activeFocus.dataset.key;
  const cursorPos = activeFocus && typeof activeFocus.selectionStart === 'number' ? activeFocus.selectionStart : null;

  let body;
  if (state.view === 'today') body = renderToday();
  else if (state.view === 'library') body = renderLibrary();
  else if (state.view === 'history') body = renderHistory();
  else if (state.view === 'settings') body = renderSettings();

  document.getElementById('root').innerHTML = `
    <div class="hdr">
      <h1>${svg('act','icn icn-lg')} <span style="color:#3a3530">KarbSayar</span></h1>
      <div class="hdr-sub">Tip 1 Diyabet · KH Sayım</div>
    </div>
    ${body}
    <div class="nav">
      <div class="nav-grid">
        ${[
          { id: 'today', icon: 'act', label: 'Bugün' },
          { id: 'library', icon: 'db', label: 'Kütüphane' },
          { id: 'history', icon: 'hist', label: 'Geçmiş' },
          { id: 'settings', icon: 'sett', label: 'Ayarlar' }
        ].map(t => `<button class="nav-btn ${state.view === t.id ? 'active' : ''}" data-act="setView" data-view="${t.id}">
          ${svg(t.icon, 'icn icn-lg')}<span>${t.label}</span>
        </button>`).join('')}
      </div>
    </div>
  `;

  if (focusKey) {
    let el;
    if (focusKeyAttr) el = document.querySelector(`[data-edit="${focusKey}"][data-key="${focusKeyAttr}"]`);
    else el = document.querySelector(`[data-input="${focusKey}"]`);
    if (el) {
      el.focus();
      if (cursorPos !== null) { try { el.setSelectionRange(cursorPos, cursorPos); } catch (e) {} }
    }
  }
  document.body.classList.toggle('dark', state.darkMode);
}

// Inline güncellemeler — render olmadan
function refreshUnitDropdown() {
  const sel = document.querySelector('[data-input="portionUnit"]');
  if (!sel) return;
  ensureValidUnit();
  const units = getUnitsForFood(state.foodInput);
  sel.innerHTML = units.map(([n, g]) =>
    `<option value="${esc(n)}" ${n === state.portionUnit ? 'selected' : ''}>${esc(n)} (${g}g)</option>`
  ).join('');
  refreshGramsDisplay();
}
function refreshGramsDisplay() {
  const span = document.querySelector('[data-display="grams"]');
  if (!span) return;
  const grams = getCurrentGrams();
  span.innerHTML = grams > 0 ? `= <b>${fmt(grams)} gram</b>` : '';
}

// ============================================================================
// EVENT HANDLING
// ============================================================================
document.addEventListener('click', (ev) => {
  const t = ev.target.closest('[data-act]');
  if (!t) return;
  const act = t.dataset.act;

  if (act === 'setView') { state.view = t.dataset.view; state.error = null; render(); }
  else if (act === 'toggleManual') { state.manualMode = !state.manualMode; state.error = null; render(); }
  else if (act === 'lookup') lookupFood();
  else if (act === 'submitManual') submitManual();
  else if (act === 'cancelEstimate') {
    state.estimate = null;
    state.currentBG = '';
    if (state.mealItems.length === 0) state.currentMealType = null;
    render();
  }
  else if (act === 'confirmAdd') confirmAdd();
  else if (act === 'addToMeal') addToMealCart();
  else if (act === 'removeMealItem') removeMealItem(parseInt(t.dataset.idx, 10));
  else if (act === 'cancelMeal') cancelMeal();
  else if (act === 'commitMeal') commitMeal();
  else if (act === 'setMealType') {
    state.currentMealType = t.dataset.type;
    render();
  }
  else if (act === 'setEditMealType') {
    state.editDraft.mealType = t.dataset.type;
    render();
  }
  else if (act === 'toggleExercise') {
    state.exerciseMode = !state.exerciseMode;
    render();
  }
  else if (act === 'saveAsTemplate') saveCurrentAsTemplate();
  else if (act === 'loadTemplate') {
    loadTemplate(t.dataset.key);
    state.view = 'today';
    render();
  }
  else if (act === 'deleteTemplate') deleteTemplate(t.dataset.key);
  else if (act === 'startEditEntry') startEditEntry(t.dataset.id);
  else if (act === 'cancelEditEntry') cancelEditEntry();
  else if (act === 'saveEditEntry') saveEditEntry(t.dataset.id);
  else if (act === 'startPostBG') startPostBGInput(t.dataset.id);
  else if (act === 'cancelPostBG') cancelPostBGInput();
  else if (act === 'savePostBG') savePostBG();
  else if (act === 'setStatPeriod') {
    state.statPeriod = parseInt(t.dataset.days, 10);
    render();
  }
  else if (act === 'exportCSV') exportCSV();
  else if (act === 'setCorrectionBG') {
    state.correctionBG = t.dataset.val;
    render();
  }
  else if (act === 'openCorrection') {
    state.correctionFormOpen = true;
    state.estimate = null;
    state.error = null;
    render();
  }
  else if (act === 'cancelCorrection') {
    state.correctionFormOpen = false;
    state.correctionBG = '';
    state.correctionManual = '';
    state.error = null;
    render();
  }
  else if (act === 'commitCorrection') commitCorrection();
  else if (act === 'deleteEntry') deleteEntry(t.dataset.id);
  else if (act === 'pickSuggestion') {
    state.foodInput = t.dataset.name;
    state.suggestions = [];
    // Yeni yemek için doğal birime geç
    const units = getUnitsForFood(state.foodInput);
    state.portionUnit = units[0][0];
    render();
    const inp = document.querySelector('[data-input="portionQty"]');
    if (inp) inp.focus();
  }
  else if (act === 'editLib') { state.editingFood = t.dataset.key; render(); }
  else if (act === 'cancelEdit') { state.editingFood = null; render(); }
  else if (act === 'saveEdit') {
    const key = t.dataset.key;
    const c = parseFloat(document.querySelector(`[data-edit="c"][data-key="${key}"]`).value) || 0;
    const p = parseFloat(document.querySelector(`[data-edit="p"][data-key="${key}"]`).value) || 0;
    const f = parseFloat(document.querySelector(`[data-edit="f"][data-key="${key}"]`).value) || 0;
    const n = document.querySelector(`[data-edit="n"][data-key="${key}"]`).value;
    updateLibFood(key, { carbsPer100g: c, proteinPer100g: p, fatPer100g: f, notes: n });
  }
  else if (act === 'deleteLib') deleteFromLibrary(t.dataset.key);
  else if (act === 'goToDay') { state.date = t.dataset.date; state.view = 'today'; loadDayLog(); render(); }
  else if (act === 'exportData') {
    const data = {
      library: state.library, templates: state.templates, history: state.history,
      settings: {
        insulinRatio: state.insulinRatio, ratioMode: state.ratioMode, ratios: state.ratios,
        useCorrection: state.useCorrection, isf: state.isf, targetBG: state.targetBG,
        roundStep: state.roundStep, diaMinutes: state.diaMinutes,
        darkMode: state.darkMode, exerciseReduction: state.exerciseReduction
      }
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `karbsayar-yedek-${new Date().toISOString().split('T')[0]}.json`;
    a.click(); URL.revokeObjectURL(url);
  }
  else if (act === 'importData') {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.json,application/json';
    inp.onchange = async (e) => {
      const file = e.target.files[0]; if (!file) return;
      try {
        const txt = await file.text();
        const data = JSON.parse(txt);
        if (data.library) saveLibrary(data.library);
        if (data.templates) saveTemplates(data.templates);
        if (data.history) {
          for (const [d, entries] of Object.entries(data.history)) LS.set(`karbsayar:log:${d}`, entries);
          state.history = data.history;
        }
        if (data.settings) {
          const s = data.settings;
          if (typeof s.insulinRatio === 'number') state.insulinRatio = s.insulinRatio;
          if (s.ratioMode) state.ratioMode = s.ratioMode;
          if (s.ratios) state.ratios = { ...state.ratios, ...s.ratios };
          if (typeof s.useCorrection === 'boolean') state.useCorrection = s.useCorrection;
          if (typeof s.isf === 'number') state.isf = s.isf;
          if (typeof s.targetBG === 'number') state.targetBG = s.targetBG;
          if (typeof s.roundStep === 'number') state.roundStep = s.roundStep;
          if (typeof s.diaMinutes === 'number') state.diaMinutes = s.diaMinutes;
          if (typeof s.darkMode === 'boolean') state.darkMode = s.darkMode;
          if (typeof s.exerciseReduction === 'number') state.exerciseReduction = s.exerciseReduction;
          persistAllSettings();
        }
        loadDayLog();
        alert('Yedek yüklendi.');
        render();
      } catch (err) { alert('Hata: ' + err.message); }
    };
    inp.click();
  }
});

document.addEventListener('input', (ev) => {
  const t = ev.target;
  // Düzenleme formu input'ları
  if (t.dataset && t.dataset.editInput) {
    state.editDraft[t.dataset.editInput] = t.value;
    return;
  }
  if (!t.dataset || !t.dataset.input) return;
  const key = t.dataset.input;

  if (key === 'foodInput') {
    state.foodInput = t.value;
    updateSuggestions();
    // Suggestions update inline
    const wrap = t.parentElement;
    const old = wrap.querySelector('.suggestions');
    if (old) old.remove();
    if (!state.manualMode && state.suggestions.length > 0) {
      const div = document.createElement('div');
      div.className = 'suggestions';
      div.innerHTML = state.suggestions.map(s => `<button class="suggestion" data-act="pickSuggestion" data-name="${esc(s.name)}">
        <span>${esc(s.name)}</span>
        <span class="tag ${s.src === 'lib' ? 'tag-lib' : 'tag-db'}">${s.src === 'lib' ? 'kayıtlı' : 'DB'}</span>
      </button>`).join('');
      wrap.appendChild(div);
    }
    // Birim dropdown'unu güncelle (yiyecek değişti, birimler değişebilir)
    refreshUnitDropdown();
  }
  else if (key === 'portionQty') { state.portionQty = t.value; refreshGramsDisplay(); }
  else if (key === 'manualCarbs') state.manualCarbs = t.value;
  else if (key === 'manualProtein') state.manualProtein = t.value;
  else if (key === 'manualFat') state.manualFat = t.value;
  else if (key === 'librarySearch') { state.librarySearch = t.value; render(); }
  else if (key === 'currentBG') { state.currentBG = t.value; render(); }
  else if (key === 'correctionBG') { state.correctionBG = t.value; render(); }
  else if (key === 'correctionManual') { state.correctionManual = t.value; render(); }
  else if (key === 'currentNotes') state.currentNotes = t.value;
  else if (key === 'correctionNotes') state.correctionNotes = t.value;
  else if (key === 'postBgValue') state.postBgValue = t.value;
  else if (key === 'apiKey') { state.apiKey = t.value; saveSettings({ apiKey: t.value }); }
});

document.addEventListener('change', (ev) => {
  const t = ev.target;
  if (!t.dataset) return;
  const key = t.dataset.input;

  // Sayı ayarları için doğrulayıcı: virgülü noktaya çevir, geçerli pozitif değilse eski değere döndür
  const parseSettingNumber = (raw) => {
    const v = parseFloat(String(raw).replace(',', '.'));
    return (!isNaN(v) && v > 0) ? v : null;
  };

  if (t.type === 'date' && t.dataset.act === 'setDate') { state.date = t.value; loadDayLog(); render(); }
  else if (key === 'portionUnit') { state.portionUnit = t.value; refreshGramsDisplay(); }
  else if (key === 'ratioMode') { state.ratioMode = t.value; saveSettings({ ratioMode: state.ratioMode }); render(); }
  else if (key === 'roundStep') { state.roundStep = parseFloat(t.value); saveSettings({ roundStep: state.roundStep }); render(); }
  else if (key === 'useCorrection') { state.useCorrection = t.checked; saveSettings({ useCorrection: state.useCorrection }); render(); }
  else if (key === 'insulinRatio') {
    const v = parseSettingNumber(t.value);
    if (v !== null) { state.insulinRatio = v; saveSettings({ insulinRatio: v }); }
    t.value = state.insulinRatio;
  }
  else if (key === 'ratio_breakfast') {
    const v = parseSettingNumber(t.value);
    if (v !== null) { state.ratios.breakfast = v; saveSettings({ ratios: state.ratios }); }
    t.value = state.ratios.breakfast;
  }
  else if (key === 'ratio_lunch') {
    const v = parseSettingNumber(t.value);
    if (v !== null) { state.ratios.lunch = v; saveSettings({ ratios: state.ratios }); }
    t.value = state.ratios.lunch;
  }
  else if (key === 'ratio_dinner') {
    const v = parseSettingNumber(t.value);
    if (v !== null) { state.ratios.dinner = v; saveSettings({ ratios: state.ratios }); }
    t.value = state.ratios.dinner;
  }
  else if (key === 'ratio_night') {
    const v = parseSettingNumber(t.value);
    if (v !== null) { state.ratios.night = v; saveSettings({ ratios: state.ratios }); }
    t.value = state.ratios.night;
  }
  else if (key === 'isf') {
    const v = parseSettingNumber(t.value);
    if (v !== null) { state.isf = v; saveSettings({ isf: v }); }
    t.value = state.isf;
  }
  else if (key === 'targetBG') {
    const v = parseSettingNumber(t.value);
    if (v !== null) { state.targetBG = v; saveSettings({ targetBG: v }); }
    t.value = state.targetBG;
  }
  else if (key === 'diaHours') {
    const v = parseSettingNumber(t.value);
    if (v !== null && v >= 1 && v <= 8) {
      state.diaMinutes = v * 60;
      saveSettings({ diaMinutes: state.diaMinutes });
    }
    t.value = state.diaMinutes / 60;
  }
  else if (key === 'darkMode') {
    state.darkMode = t.checked;
    saveSettings({ darkMode: state.darkMode });
    document.body.classList.toggle('dark', state.darkMode);
  }
  else if (key === 'exerciseReduction') {
    const v = parseSettingNumber(t.value);
    if (v !== null && v >= 0 && v <= 80) {
      state.exerciseReduction = v;
      saveSettings({ exerciseReduction: v });
    }
    t.value = state.exerciseReduction;
    render();
  }
});

loadAll();
render();

// PWA service worker kaydı (Android'de install prompt + offline için)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
