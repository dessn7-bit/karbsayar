.glycemic-low{background:linear-gradient(135deg,#f0f9f4,#dcfce7);border-color:#5b9279}
.glycemic-header{display:flex;align-items:center;gap:12px}
.glycemic-icon{font-size:28px;flex-shrink:0}
.glycemic-info{flex:1;min-width:0}
.glycemic-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#7a6f60;font-weight:600}
.glycemic-title{font-size:18px;font-weight:700;line-height:1.2;margin-top:2px}
.glycemic-time{text-align:right;flex-shrink:0}
.glycemic-time-val{font-size:22px;font-weight:700;color:#3a3530;line-height:1;font-variant-numeric:tabular-nums}
.glycemic-time-unit{font-size:11px;color:#7a6f60;font-weight:500;margin-left:1px}
.glycemic-time-lbl{font-size:9px;color:#7a6f60;text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
.glycemic-modifier{display:flex;flex-direction:column;gap:2px;margin-top:8px;padding:6px 8px;background:rgba(255,255,255,.5);border-radius:6px;font-size:11px;color:#5a4f42}
.glycemic-warning{margin-top:8px;padding:8px;background:#fff;border-radius:6px;font-size:12px;color:#3a3530;border-left:3px solid #a03030;line-height:1.4}
.glycemic-note{margin-top:8px;padding:8px;background:#fff;border-radius:6px;font-size:11px;color:#7a6f60;border-left:3px solid #d97706}
body.dark .glycemic-high{background:linear-gradient(135deg,#3d1a1a,#5a2020);border-color:#a03030}
body.dark .glycemic-medium{background:linear-gradient(135deg,#3d3520,#4a4023);border-color:#d97706}
body.dark .glycemic-low{background:linear-gradient(135deg,#1a3d2a,#2a4d3a);border-color:#5b9279}
body.dark .glycemic-time-val{color:#e0d8c8}
body.dark .glycemic-modifier{background:rgba(0,0,0,.3);color:#c8c0b0}
body.dark .glycemic-warning,body.dark .glycemic-note{background:#34302a;color:#e0d8c8}
body.dark .dose-breakdown-panel{background:#34302a;border-color:#403b33}
body.dark .pattern-alarms-card{background:linear-gradient(135deg,#3d1a1a,#5a2020);border-color:#a03030}
body.dark .pattern-alarm{background:#34302a}
body.dark .pattern-alarm-action{background:#3a362f}
body.dark .pattern-alarm-title{color:#e0d8c8}
body.dark .travel-badge{background:linear-gradient(135deg,#1e3a5f,#1e40af) !important;color:#bfdbfe !important}
body.dark .travel-info{background:#34302a;border-color:#403b33}
.hba1c-target-card{background:linear-gradient(135deg,#fff7ed 0%,#fef3c7 100%);border-color:#fbbf24}
.hba1c-progress{position:relative;height:60px;margin:14px 0}
.hba1c-scale{display:flex;height:14px;border-radius:7px;overflow:hidden}
.hba1c-zone-good{flex:0 0 30%;background:#5b9279}
.hba1c-zone-ok{flex:0 0 20%;background:#a8a06e}
.hba1c-zone-warn{flex:0 0 20%;background:#d97706}
.hba1c-zone-bad{flex:0 0 30%;background:#a03030}
.hba1c-marker{position:absolute;top:-4px;transform:translateX(-50%);z-index:2}
.hba1c-marker-bubble{padding:3px 8px;border-radius:10px;color:#fff;font-size:11px;font-weight:700;font-variant-numeric:tabular-nums;box-shadow:0 2px 6px rgba(0,0,0,.2);min-width:32px;text-align:center}
.hba1c-marker-bubble::after{content:'';position:absolute;left:50%;bottom:-4px;transform:translateX(-50%);border:4px solid transparent;border-top-color:inherit;border-top-color:#3a3530}
.hba1c-target-line{position:absolute;top:14px;width:2px;height:14px;background:#000;transform:translateX(-50%);z-index:1}
.hba1c-target-flag{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:600;color:#3a3530;white-space:nowrap;background:#fff;padding:2px 6px;border-radius:6px;border:1px solid #d4c8b0;margin-top:4px}
.hba1c-scale-labels{display:flex;justify-content:space-between;font-size:10px;color:#7a6f60;margin-top:32px;font-variant-numeric:tabular-nums}
body.dark .hba1c-target-card{background:linear-gradient(135deg,#3d3520,#4a4023);border-color:#7a5d10}
body.dark .hba1c-target-flag{background:#34302a;color:#e0d8c8;border-color:#4a4339}
body.dark .quick-bolus-toggle{background:#34302a;border-color:#4a4339;color:#a8a08e}
body.dark .quick-bolus-card{background:linear-gradient(135deg,#34302a,#2d352f);border-color:#5b9279}
body.dark .quick-bolus-result{background:#3a362f;border-color:#4a5b50}
body.dark .qb-dose-num{color:#a8c5b9}
body.dark .snack-card{background:#34302a}
.bolus-override-btn{width:36px;height:36px;background:#fafaf5;border:1px solid #d4c8b0;border-radius:8px;font-size:18px;font-weight:600;color:#5a4f42;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.bolus-override-btn:hover{background:#5b9279;color:#fff;border-color:#5b9279}
.bolus-override-info{flex:1;text-align:center;min-width:0}
.bolus-override-label{font-size:10px;color:#7a6f60;text-transform:uppercase;letter-spacing:.5px}
.bolus-override-value{font-size:14px;font-weight:600;color:#3a3530;margin-top:2px}
.bolus-override-value.active{color:#d97706}
.bolus-override-reset{width:36px;height:36px;background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;font-size:14px;color:#a03030;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
body.dark .bolus-override-row{background:#34302a;border-color:#403b33}
body.dark .bolus-override-btn{background:#3a362f;border-color:#4a4339;color:#ddd5c5}
body.dark .bolus-override-value{color:#e0d8c8}
.bedtime-warning{background:linear-gradient(135deg,#fef3c7,#fde68a);border:2px solid #fbbf24;border-radius:12px;padding:12px 14px;margin-bottom:12px}
.bedtime-warning.high{background:linear-gradient(135deg,#fee2e2,#fca5a5);border-color:#dc2626}
body.dark .bedtime-warning{background:linear-gradient(135deg,#3d3520,#4a4023);border-color:#7a5d10}
body.dark .bedtime-warning.high{background:linear-gradient(135deg,#3d1a1a,#5a2020);border-color:#a03030}
.bg-chart-svg{width:100%;height:auto;display:block;background:#fafaf5;border-radius:6px;margin-top:8px}
.bg-chart-legend{display:flex;flex-wrap:wrap;gap:10px;font-size:10px;color:#7a6f60;margin-top:6px;justify-content:center}
body.dark .bg-chart-svg{background:#34302a}
.pen-card{padding:12px;background:#fafaf5;border:1px solid #ede4d3;border-radius:10px}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:28px;height:28px;background:transparent;border:none;color:#a8a08e;font-size:18px;cursor:pointer;border-radius:50%}
.search-clear:hover{background:#fafaf5}
.search-stats{display:flex;gap:14px;font-size:12px;color:#5a4f42;margin-top:10px;padding:8px 10px;background:#fafaf5;border-radius:6px}
.search-results{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.search-result{padding:8px 10px;background:#fff;border:1px solid #ede4d3;border-radius:8px;cursor:pointer;transition:all .15s}
.search-result:hover{border-color:#5b9279;background:#fafaf5}
.sr-date{font-size:10px;color:#a8a08e;text-transform:uppercase;letter-spacing:.5px}
.sr-food{font-size:13px;font-weight:600;color:#3a3530;margin-top:2px}
.sr-meta{font-size:11px;color:#7a6f60;margin-top:2px}
body.dark .search-result{background:#34302a;border-color:#403b33}
body.dark .search-result:hover{background:#3a362f}
body.dark .sr-food{color:#e0d8c8}
body.dark .search-stats{background:#34302a;color:#a8a08e}
.pen-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.pen-title{font-size:13px;font-weight:600;color:#3a3530}
.btn-small{padding:5px 10px !important;font-size:11px !important}
.pen-progress-wrap{display:flex;flex-direction:column;gap:6px}
.pen-progress{height:14px;background:#ede4d3;border-radius:7px;overflow:hidden}
.pen-progress-bar{height:100%;background:linear-gradient(90deg,#5b9279,#8bb59c);transition:width .3s}
.pen-progress-bar.low{background:linear-gradient(90deg,#d97706,#fbbf24)}
.pen-progress-bar.critical{background:linear-gradient(90deg,#a03030,#dc6b6b)}
.pen-stats{display:flex;flex-direction:column;gap:2px;font-size:13px}
.pen-warn{margin-top:4px;padding:6px 10px;border-radius:6px;font-size:12px;font-weight:500}
.pen-warn-low{background:#fef3c7;color:#92400e;border:1px solid #fbbf24}
.pen-warn-critical{background:#fee2e2;color:#a03030;border:1px solid #fca5a5}
body.dark .pen-card{background:#34302a;border-color:#403b33}
body.dark .pen-title{color:#e0d8c8}
body.dark .pen-progress{background:#3a362f}
.meal-photo-row{margin-bottom:12px}
.btn-photo-attach{width:100%;padding:10px;background:#fafaf5;border:1px dashed #d4c8b0;border-radius:8px;font-size:13px;color:#7a6f60;cursor:pointer;text-align:center;transition:all .15s}
.btn-photo-attach:hover{background:#f5efe6;border-color:#5b9279;color:#3a5040}
.meal-photo-preview{position:relative;display:inline-block;border-radius:10px;overflow:hidden;border:2px solid #5b9279}
.meal-photo-preview img{display:block;max-width:240px;max-height:240px;object-fit:cover}
.meal-photo-remove{position:absolute;top:4px;right:4px;width:28px;height:28px;background:rgba(220,38,38,.9);color:#fff;border:none;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:bold}
.entry-meal-photo{margin-top:8px}
.entry-meal-photo img{max-width:160px;max-height:120px;border-radius:8px;cursor:pointer;border:1px solid #ede4d3;display:block}
.entry-meal-photo img:hover{opacity:.85}
.photo-gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.photo-gallery-item{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:pointer;border:1px solid #ede4d3}
.photo-gallery-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s}
.photo-gallery-item:hover img{transform:scale(1.05)}
.photo-gallery-overlay{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(transparent,rgba(0,0,0,.7));color:#fff;padding:8px 6px 4px;display:flex;justify-content:space-between;align-items:flex-end;font-size:10px;font-weight:600}
.photo-gallery-date{opacity:.9}
.photo-gallery-carbs{background:rgba(91,146,121,.9);padding:2px 6px;border-radius:10px;font-variant-numeric:tabular-nums}
@media (min-width: 480px) {
  .photo-gallery{grid-template-columns:repeat(4,1fr)}
}
body.dark .btn-photo-attach{background:#34302a;border-color:#4a4339;color:#a8a08e}
body.dark .btn-photo-attach:hover{background:#3a362f;border-color:#5b9279}
body.dark .entry-meal-photo img{border-color:#3a362f}
.dose-chart-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;min-width:0}
.dose-chart-bar-wrap{flex:1;width:100%;display:flex;flex-direction:column-reverse;align-items:center;gap:1px}
.dose-chart-bar{width:80%;border-radius:2px 2px 0 0;min-height:1px}
.dose-bar-bolus{background:#a89bb5}
.dose-bar-basal{background:#5b9279}
.dose-chart-val{font-size:9px;color:#7a6f60;font-weight:500;margin-top:2px;font-variant-numeric:tabular-nums}
.dose-chart-lbl{font-size:9px;color:#a8a08e;text-transform:capitalize;margin-top:1px}
.meal-reminder-badge{background:#dbeafe !important;border-color:#60a5fa !important;color:#1e40af !important}
body.dark .dose-chart{background:#34302a}
body.dark .dose-chart-val{color:#a8a08e}
body.dark .meal-reminder-badge{background:#1e3a5f !important;border-color:#3b82f6 !important;color:#93c5fd !important}
.prebolus-card{background:#fef3c7;border:1px solid #fbbf24;border-radius:10px;padding:10px 12px;margin-top:10px}
.prebolus-row{display:flex;align-items:center;gap:10px}
.prebolus-icon{font-size:24px;flex-shrink:0}
.prebolus-text{flex:1;min-width:0}
.prebolus-main{font-size:13px;color:#3a3530;line-height:1.4}
.prebolus-sub{font-size:11px;color:#7a6f60;margin-top:2px;line-height:1.3}
.prebolus-timer-btn{flex-shrink:0;width:42px;height:42px;background:#5b9279;border:none;color:#fff;font-size:18px;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .15s}
.prebolus-timer-btn:hover,.prebolus-timer-btn:active{background:#4a7d65}
.prebolus-active{background:linear-gradient(135deg,#fef3c7,#fde68a);border:2px solid #fbbf24;border-radius:14px;padding:14px 16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(217,119,6,.15)}
.prebolus-active.prebolus-done{background:linear-gradient(135deg,#ecfdf5,#a7f3d0);border-color:#10b981;text-align:center}
.prebolus-progress{height:6px;background:rgba(146,64,14,.15);border-radius:3px;overflow:hidden}
.prebolus-progress-bar{height:100%;background:linear-gradient(90deg,#fbbf24,#d97706);transition:width 1s linear}
body.dark .prebolus-card{background:#3d3520;border-color:#7a5d10;color:#e8d098}
body.dark .prebolus-card .prebolus-main{color:#e8d098}
body.dark .prebolus-card .prebolus-sub{color:#c8a868}
body.dark .prebolus-active{background:linear-gradient(135deg,#3d3520,#4a4023);border-color:#7a5d10}
body.dark .prebolus-active.prebolus-done{background:linear-gradient(135deg,#1a3528,#2a4838);border-color:#10b981}
.exercise-hint{display:flex;align-items:center;gap:10px;background:#f5faf6;border:1px solid #a8c5b9;border-radius:10px;padding:9px 12px;margin-top:8px;margin-bottom:12px}
.exercise-hint-icon{color:#5b9279;flex-shrink:0;display:flex;align-items:center;justify-content:center;width:28px;height:28px;background:#fff;border-radius:50%}
.exercise-hint-text{flex:1;min-width:0}
.exercise-hint-main{font-size:12px;color:#3a3530;line-height:1.4}
.exercise-hint-sub{font-size:10px;color:#7a6f60;margin-top:2px}
body.dark .exercise-hint{background:#2d352f;border-color:#4a5b50}
body.dark .exercise-hint-icon{background:#3a4338}
body.dark .exercise-hint-main{color:#e0d8c8}
body.dark .exercise-hint-sub{color:#a8a08e}
.iob-row{display:flex;align-items:center;gap:12px}
.iob-icon{flex-shrink:0;opacity:.85;display:flex}
.iob-text{flex:1;min-width:0}
.iob-main{font-size:14px;font-weight:500;display:flex;align-items:baseline;gap:6px}
.iob-main .v{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
.iob-sub{font-size:11px;opacity:.85;margin-top:2px}

/* Öğün sepeti */
.meal-panel{background:linear-gradient(135deg,#fef3c7,#fde68a);border:2px solid #fbbf24;border-radius:16px;padding:16px}
.meal-panel h3{font-size:14px;font-weight:700;color:#92400e;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.meal-items{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.meal-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border-radius:8px}
.meal-item-info{flex:1;min-width:0}
.meal-item-name{font-weight:500;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.meal-item-meta{color:#8a7d6a;font-size:11px;margin-top:2px}
.meal-item-kh{font-size:13px;font-weight:600;color:#5b9279;font-variant-numeric:tabular-nums;flex-shrink:0}
.meal-totals{display:grid;grid-template-columns:1fr 1fr;gap:8px;background:#fff;border-radius:8px;padding:12px;margin-bottom:12px}
.meal-totals .item{text-align:center}
.meal-totals .item .l{color:#8a7d6a;font-size:11px;font-weight:500}
.meal-totals .item .v{font-weight:700;font-size:22px;color:#92400e;font-variant-numeric:tabular-nums;margin-top:2px}
.meal-totals .item.dose .v{color:#5b9279;font-size:24px}
.meal-totals .item .breakdown{font-size:10px;color:#a39885;margin-top:2px}
.meal-bg-row{background:#fff;border-radius:8px;padding:10px;margin-bottom:12px}
.meal-bg-row label{font-size:11px;color:#8a7d6a;display:block;margin-bottom:6px;font-weight:500}
.meal-bg-input{display:flex;gap:8px;align-items:center}
.meal-bg-input .in{flex:1;padding:8px 10px}
.add-more-link{display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;color:#5b9279;padding:10px;margin-top:8px;background:#ecf0ed;border:1px dashed #a8c5b9;border-radius:8px;font-weight:500;cursor:pointer;width:100%}
.add-more-link:hover{background:#dceae0}

/* Düzeltme / Ara iğne */
.corr-trigger{display:flex;align-items:center;justify-content:center;gap:8px;background:#fff;border:2px dashed #b8b0c4;border-radius:12px;padding:14px;width:100%;font-size:14px;font-weight:500;color:#5d4d7d;margin-top:4px;cursor:pointer}
.corr-trigger:hover,.corr-trigger:active{background:#f5f1f7;border-style:solid}
.corr-card{background:linear-gradient(135deg,#f5f1f7,#ebe5f0);border:2px solid #b8b0c4;border-radius:16px;padding:16px}
.corr-card h3{font-size:14px;font-weight:700;color:#5d4d7d;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.corr-input-block{margin-bottom:10px;background:#fff;border-radius:8px;padding:12px}
.corr-input-block label{font-size:12px;color:#3a3530;display:block;margin-bottom:6px;font-weight:500}
.corr-input-row{display:flex;gap:8px;align-items:center}
.corr-input-row .in{flex:1;padding:10px 12px;font-size:16px;font-weight:600;text-align:center}
.corr-or{text-align:center;font-size:11px;color:#a39885;margin:4px 0;font-weight:500;letter-spacing:.05em}
.corr-preview{background:#fff;border-radius:8px;padding:14px;margin-bottom:12px;text-align:center;border:1px solid #ede4d3}
.corr-preview .v{font-size:32px;font-weight:700;color:#5d4d7d;font-variant-numeric:tabular-nums;line-height:1}
.corr-preview .arrow{display:inline-block;margin:0 6px;color:#a39885}
.corr-preview .vr{font-size:36px;font-weight:700;color:#5d4d7d;font-variant-numeric:tabular-nums}
.corr-preview .l{font-size:11px;color:#8a7d6a;margin-top:6px}
.corr-preview .breakdown{font-size:11px;color:#3a3530;margin-top:8px;padding-top:8px;border-top:1px solid #f5efe6}
.corr-preview.empty{color:#a39885;padding:20px;font-size:13px}

/* Öğün tipi seçici */
.meal-type-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.meal-type-pill{padding:8px 4px;border:1px solid #ede4d3;background:#fff;border-radius:8px;font-size:11px;font-weight:500;color:#3a3530;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;transition:all .15s}
.meal-type-pill .em{font-size:18px;line-height:1}
.meal-type-pill.active{background:#5b9279;border-color:#5b9279;color:#fff;box-shadow:0 2px 6px rgba(91,146,121,.22)}
.meal-type-pill:not(.active):hover,.meal-type-pill:not(.active):active{background:#faf5ed;border-color:#d6cebd}
.meal-type-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;background:#ecf0ed;color:#5b9279;padding:2px 6px;border-radius:4px;font-weight:500;margin-right:4px}

/* TDD pills */
.tdd-row{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.25)}
.tdd-pill{flex:1;background:rgba(255,255,255,.18);padding:6px 10px;border-radius:6px;font-size:11px;text-align:center}
.tdd-pill b{font-weight:700}
.tdd-pill.tdd-total{background:rgba(255,255,255,.28);font-weight:600}

/* Quick actions (bazal + hipo) */
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.quick-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:11px 8px;border:1.5px solid;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;background:#fff}
.quick-btn-basal{border-color:#5d4d7d;color:#5d4d7d}
.quick-btn-basal:hover,.quick-btn-basal:active{background:#5d4d7d;color:#fff}
.quick-btn-hypo{border-color:#dc6b6b;color:#a03030}
.quick-btn-hypo:hover,.quick-btn-hypo:active{background:#dc6b6b;color:#fff}
.basal-done{display:flex;align-items:center;justify-content:center;gap:6px;padding:11px 8px;background:#ecfdf5;border:1px solid #6ee7b7;border-radius:10px;font-size:12px;font-weight:500;color:#047857}
.tag-toggle{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#fff;border:1px solid #ede4d3;border-radius:8px;cursor:pointer;font-size:13px;color:#5a4f42}
.tag-toggle input{width:16px;height:16px;accent-color:#5b9279}
.tag-toggle:hover{background:#fafaf5}
body.dark .tag-toggle{background:#3a342d;border-color:#4a4339;color:#d4c5a8}
.quick-actions-row2{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px}
.quick-btn-mini{display:flex;align-items:center;justify-content:center;gap:5px;padding:9px 6px;background:#fff;border:1px solid #ede4d3;border-radius:10px;font-size:12px;font-weight:500;color:#5a4f42;cursor:pointer;transition:all .15s}
.quick-btn-mini:hover,.quick-btn-mini:active{background:#f5efe2;border-color:#d4c8b0}
.quick-btn-mini.has-tags{background:#fef3c7;border-color:#fbbf24;color:#92400e}
.quick-btn-mini .icn-sm{width:14px;height:14px}

/* Bazal & hipo log girişleri */
.basal-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;background:#ebe5f0;color:#5d4d7d;padding:2px 6px;border-radius:4px;font-weight:500;margin-right:4px}
.hypo-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;background:#ffe5e5;color:#a03030;padding:2px 6px;border-radius:4px;font-weight:500;margin-right:4px}
.exercise-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;background:#e0f2e7;color:#2d6b3f;padding:2px 6px;border-radius:4px;font-weight:500;margin-right:4px}
.sleep-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;background:#e3e8f0;color:#4a5878;padding:2px 6px;border-radius:4px;font-weight:500;margin-right:4px}
.entry-basal{border-left:3px solid #5d4d7d}
.entry-hypo{border-left:3px solid #dc6b6b;background:#fff5f5}
.entry-exercise{border-left:3px solid #5b9279;background:#f5faf6}
.entry-sleep{border-left:3px solid #7c8aa3;background:#f5f7fa}

/* Hipo formu */
.hypo-card{background:linear-gradient(135deg,#fff5f5,#ffeded);border:2px solid #f5a8a8;border-radius:16px;padding:16px}
.hypo-card h3{font-size:14px;font-weight:700;color:#a03030;display:flex;align-items:center;gap:8px;margin-bottom:12px}

/* Sick mode toggle */
.sick-toggle{display:flex;align-items:center;justify-content:space-between;background:#fff7ed;border:1px solid #fdba74;border-radius:8px;padding:10px 12px;margin-bottom:12px;cursor:pointer;transition:all .15s}
.sick-toggle.active{background:linear-gradient(135deg,#ea580c,#c2410c);border-color:#9a3412;color:#fff;box-shadow:0 2px 6px rgba(194,65,12,.2)}
.sick-toggle .l{font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px}
.sick-toggle .l .em{font-size:16px}
.sick-toggle .switch{width:40px;height:22px;background:#cbd5e1;border-radius:12px;position:relative;flex-shrink:0;transition:background .15s}
.sick-toggle .switch::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.sick-toggle.active .switch{background:rgba(255,255,255,.35)}
.sick-toggle.active .switch::after{left:20px}

/* Heatmap */
.heatmap-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;margin-top:8px}
.heatmap-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:4px;font-size:10px;font-variant-numeric:tabular-nums;line-height:1;padding:2px;color:#fff;font-weight:600}
.heatmap-cell.empty{background:#ede4d3;color:#a39885;font-weight:400}
.heatmap-cell .h{font-size:8px;opacity:.85;margin-top:1px}
.heatmap-legend{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:10px;color:#8a7d6a}
.heatmap-legend-bar{flex:1;height:8px;background:linear-gradient(90deg,#86efac,#fbbf24,#dc6b6b);border-radius:4px;margin:0 8px}

/* Trend kartı */
.trend-card{background:#ecf0ed;border:1px solid #a8c5b9;border-radius:12px;padding:14px;margin-bottom:12px}
.trend-card .t{font-size:11px;color:#5b9279;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.trend-card .v{font-size:24px;font-weight:700;color:#3d6850;font-variant-numeric:tabular-nums;margin-bottom:8px}
.trend-card .sug{font-size:13px;color:#3d6850;line-height:1.4;margin-top:8px;padding-top:8px;border-top:1px solid #a8c5b9}
.trend-card .sug b{color:#1e3a30}

/* HbA1c kartı */
.hba1c-card{background:linear-gradient(135deg,#fff7ed,#fef3c7);border:1px solid #fbbf24;border-radius:12px;padding:14px;margin-bottom:12px}
.hba1c-card .t{font-size:11px;color:#92400e;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.hba1c-card .v{font-size:32px;font-weight:700;color:#78350f;font-variant-numeric:tabular-nums;line-height:1}
.hba1c-card .u{font-size:14px;color:#92400e;font-weight:500;margin-left:4px}
.hba1c-card .s{font-size:11px;color:#92400e;margin-top:6px;line-height:1.4}

/* CGM Sensör badge */
.sensor-badge{display:flex;align-items:center;gap:8px;background:#ecf0ed;border:1px solid #a8c5b9;color:#3d6850;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:8px;line-height:1.3}
.sensor-badge .icn{flex-shrink:0;color:#5b9279}
.sensor-badge.sensor-warning{background:#fff7ed;border-color:#fdba74;color:#9a3412}
.sensor-badge.sensor-warning .icn{color:#ea580c}
.sensor-badge.sensor-expired{background:#fff5f5;border-color:#f5a8a8;color:#a03030}
.sensor-badge.sensor-expired .icn{color:#dc6b6b}

/* Şablonlar / Sık Yenenler */
.templates-row{display:flex;gap:6px;overflow-x:auto;padding:8px 0;margin-bottom:8px;-webkit-overflow-scrolling:touch}
.templates-row::-webkit-scrollbar{display:none}
.template-pill{flex-shrink:0;display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,#cdd9d3,#b8b0c4);border:1px solid #a8a0b8;color:#3d3450;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;border-top-right-radius:0;border-bottom-right-radius:0}
.template-pill.template-match{background:linear-gradient(135deg,#a8c5b9,#5b9279);border-color:#5b9279;color:#fff;box-shadow:0 1px 4px rgba(91,146,121,.3)}
.template-pill-meta{opacity:.7;font-size:10px;font-variant-numeric:tabular-nums}
.template-pill-wrap{flex-shrink:0;display:inline-flex;position:relative}
.template-pill-del{width:24px;background:#cdd9d3;border:1px solid #a8a0b8;border-left:none;border-radius:0 999px 999px 0;color:#7a5d70;cursor:pointer;font-size:14px;line-height:1;padding:0 8px}
.template-pill-del:hover{background:#fca5a5;color:#fff}
.template-pill:hover,.template-pill:active{background:linear-gradient(135deg,#b8b0c4,#a8a0b8);color:#fff}
.template-pill .em{font-size:14px;line-height:1}
.template-section-title{font-size:11px;color:#5d4d7d;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;padding:0 4px}
.template-list-item{display:flex;align-items:center;gap:10px;padding:12px;background:#f5f1f7;border:1px solid #dccee5;border-radius:10px;margin-bottom:6px}
.template-list-item .info{flex:1;min-width:0}
.template-list-item .nm{font-weight:500;font-size:14px;color:#2d3b3d}
.template-list-item .mt{color:#8a7d6a;font-size:11px;margin-top:2px}
.template-list-item .mt .v{font-weight:600;color:#5d4d7d}
.template-save-btn{display:flex;align-items:center;justify-content:center;gap:6px;background:#fff;border:1px dashed #b8b0c4;color:#5d4d7d;padding:10px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;width:100%;margin-bottom:10px}
.template-save-btn:hover{background:#f5f1f7;border-style:solid}

/* Notlar */
.notes-row{margin-bottom:12px}
.notes-row label{font-size:11px;color:#8a7d6a;display:block;margin-bottom:4px;font-weight:500}
.notes-row .in{padding:8px 10px;font-size:13px;background:#fffbeb;border-color:#fde68a}
.notes-row .in:focus{background:#fff;border-color:#fbbf24}
.entry-note{font-size:11px;color:#92400e;background:#fffbeb;padding:3px 8px;border-radius:4px;margin-top:4px;display:inline-block;border:1px solid #fde68a}

/* Egzersiz */
.exercise-toggle{display:flex;align-items:center;justify-content:space-between;background:#ecfdf5;border:1px solid #6ee7b7;border-radius:8px;padding:10px 12px;margin-bottom:12px;cursor:pointer;transition:all .15s}
.exercise-toggle.active{background:linear-gradient(135deg,#10b981,#059669);border-color:#047857;color:#fff;box-shadow:0 2px 6px rgba(5,150,105,.2)}
.exercise-toggle .l{font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px}
.exercise-toggle .l .em{font-size:16px}
.exercise-toggle .switch{width:40px;height:22px;background:#d6cebd;border-radius:12px;position:relative;transition:background .15s;flex-shrink:0}
.exercise-toggle .switch::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.exercise-toggle.active .switch{background:rgba(255,255,255,.35)}
.exercise-toggle.active .switch::after{left:20px}

/* Yağ/Protein uyarısı */
.fp-warning{background:#fff7ed;border:1px solid #fdba74;border-radius:8px;padding:10px 12px;margin-bottom:12px;display:flex;gap:8px;font-size:12px;color:#9a3412;line-height:1.4}
.fp-warning .icn{flex-shrink:0;color:#ea580c;margin-top:1px;width:16px;height:16px}
.fp-warning b{color:#7c2d12}

/* Yemek sonrası KŞ */
.pbg-line{display:flex;align-items:center;gap:6px;font-size:11px;color:#3d6850;background:#dceae0;padding:3px 8px;border-radius:4px;margin-top:4px;display:inline-block;border:1px solid #a8c5b9}
.pbg-line.delta-up{background:#fef3c7;color:#92400e;border-color:#fde68a}
.pbg-line.delta-down{background:#dcfce7;color:#166534;border-color:#86efac}
.pbg-link{font-size:11px;color:#5d4d7d;background:#f5f1f7;border:1px dashed #b8b0c4;padding:3px 8px;border-radius:4px;margin-top:4px;display:inline-block;cursor:pointer;font-weight:500}
.pbg-link:hover{background:#ebe5f0;border-style:solid}
.pbg-input-row{display:flex;gap:6px;align-items:center;margin-top:6px;background:#f5f1f7;padding:8px;border-radius:6px;border:1px solid #b8b0c4}
.pbg-input-row .in{flex:1;padding:6px 8px;font-size:13px;background:#fff}
.pbg-input-row button{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600}

/* Düzenleme formu (log girdileri için) */
.edit-entry-form{background:#ecf0ed;border:1px solid #a8c5b9;border-radius:8px;padding:10px;margin-top:6px}
.edit-entry-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:12px}
.edit-entry-row label{flex:0 0 80px;color:#3a3530;font-weight:500}
.edit-entry-row .in{flex:1;padding:6px 8px;font-size:13px}
.edit-entry-row .meal-type-row{margin-bottom:0;flex:1}
.edit-entry-row .meal-type-pill{padding:4px 2px;font-size:10px}
.edit-entry-row .meal-type-pill .em{font-size:14px}

/* Hızlı düzeltme presetleri */
.qc-presets-label{font-size:11px;color:#8a7d6a;margin-top:8px;margin-bottom:4px}
.qc-presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.qc-preset{padding:6px 12px;background:#fff;border:1px solid #b8b0c4;color:#5d4d7d;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer}
.qc-preset:hover,.qc-preset.active{background:#5d4d7d;color:#fff}

/* İstatistikler */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:linear-gradient(135deg,#fff,#faf5ed);border:1px solid #ede4d3;border-radius:12px;padding:12px;text-align:center}
.stat-card .lbl{font-size:11px;color:#8a7d6a;font-weight:500;margin-bottom:4px}
.stat-card .v{font-size:22px;font-weight:700;color:#3d6850;font-variant-numeric:tabular-nums;line-height:1}
.stat-card .u{font-size:14px;color:#8a7d6a;font-weight:500}
.stat-card .s{font-size:10px;color:#a39885;margin-top:4px}
.stat-period{display:flex;gap:4px;margin-bottom:12px}
.stat-period button{flex:1;padding:8px 4px;background:#f5efe6;border:1px solid #ede4d3;border-radius:6px;font-size:12px;font-weight:500;color:#3a3530;cursor:pointer}
.stat-period button.active{background:#5b9279;border-color:#5b9279;color:#fff}
.bar-row{display:grid;grid-template-columns:90px 1fr 60px;align-items:center;gap:8px;font-size:12px;margin-bottom:6px}
.bar-row .label{color:#3a3530;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-row .bar-bg{background:#f5efe6;border-radius:4px;height:18px;position:relative;overflow:hidden}
.bar-row .bar-fill{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,#5b9279,#4a7d65);border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;color:#fff;font-size:10px;font-weight:600;min-width:18px}
.bar-row .v{text-align:right;font-weight:600;color:#2d3b3d;font-variant-numeric:tabular-nums}
.mt-summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.mt-summary{background:#faf5ed;border:1px solid #ede4d3;border-radius:8px;padding:8px 4px;text-align:center}
.mt-summary .em{font-size:18px;line-height:1;margin-bottom:4px}
.mt-summary .nm{font-size:10px;color:#8a7d6a;font-weight:500}
.mt-summary .v{font-size:14px;font-weight:700;color:#3d6850;font-variant-numeric:tabular-nums;margin-top:2px}
.mt-summary .s{font-size:9px;color:#a39885;margin-top:1px}
.section-title{font-size:13px;font-weight:600;color:#2d3b3d;margin:12px 0 8px}

/* Karanlık mod — Warm Charcoal Mat */
body.dark{background:#2d2a25;color:#ddd5c5}
body.dark .hdr{background:#332f2a;border-bottom-color:#3a362f;color:#e8dfcd}
body.dark .hdr h1>span,body.dark .hdr h1{color:#e8dfcd}
body.dark .hdr-sub,body.dark .muted{color:#9a9082}

/* Kartlar - mat, zeminden hafif yüksek */

body.dark .card-active{border-color:#7a9a8a;box-shadow:0 0 0 1px rgba(122,154,138,.15)}

/* Hero kart - mat sage→lavender, daha az parlak */

/* Doz kartı - mat sage */

/* IOB kartı - mat mauve */

/* Düzeltme/correction kartı */

/* Geçmiş gün düğmeleri */

body.dark .radio-opt.active{background:#3a4540;border-color:#7a9a8a;color:#a8c5b9}

/* Arama çubuğu */
body.dark .search-bar{background:#34302a;border-color:#403b33}
body.dark .search-bar input{color:#e8dfcd}
body.dark .qty-grams{color:#9a9082}
body.dark .qty-grams b{color:#a8c5b9}

body.dark .suggestion{color:#ddd5c5;border-bottom-color:#3a362f}

body.dark .recent-foods{background:#34302a;border-color:#403b33}
body.dark .recent-foods-title{color:#a8a08e}

body.dark .recent-chip-carbs{color:#a8a08e}

body.dark .macro-blue .v{color:#e8dfcd}

body.dark .macro-slate .v{color:#ddd5c5}

body.dark .template-list-item .nm{color:#e8dfcd}
body.dark .template-list-item .mt{color:#9a9082}
body.dark .template-list-item .mt .v{color:#a8c5b9}
body.dark .template-save-btn{background:#34302a;color:#a89bb5;border-color:#5a4d6a}
body.dark .template-pill{background:linear-gradient(135deg,#3a4540,#3a3540);border-color:#5a4d6a;color:#cdc4d3}
body.dark .template-pill.template-match{background:linear-gradient(135deg,#3a5040,#5b9279);color:#fff}

/* Edit form */

.quick-bg-card{background:#fff;border:1px solid #ede4d3;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(58,53,48,.04)}
.qbg-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.qbg-title{font-size:13px;font-weight:600;color:#5b9279;display:flex;align-items:center;gap:6px}
.qbg-latest{display:flex;align-items:baseline;gap:6px}
.qbg-latest-v{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;padding:2px 8px;border-radius:6px}
.qbg-latest-meta{font-size:10px;color:#8a7d6a}
.qbg-input-row{display:grid;grid-template-columns:auto auto 1fr auto auto;gap:6px;margin-bottom:8px;align-items:center}
.qbg-input{font-size:24px !important;font-weight:700;text-align:center;font-variant-numeric:tabular-nums;padding:10px !important}
.qbg-input.bg-low{background:#fff5f5;border-color:#dc6b6b;color:#a03030}
.qbg-input.bg-target{background:#f0f9f4;border-color:#5b9279;color:#3d6850}
.qbg-input.bg-high{background:#fff7ed;border-color:#fbbf24;color:#92400e}
.qbg-input.bg-very-high{background:#fff5f5;border-color:#dc2626;color:#991b1b}
.qbg-adj{padding:10px 8px;background:#f5efe6;border:1px solid #ede4d3;border-radius:8px;font-size:12px;font-weight:600;color:#3a3530;cursor:pointer;font-variant-numeric:tabular-nums;min-width:42px}
.qbg-adj:hover,.qbg-adj:active{background:#a8c5b9;color:#fff;border-color:#a8c5b9}
.qbg-presets{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:8px}
.qbg-preset{padding:8px 4px;background:#fff;border:1.5px solid;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-variant-numeric:tabular-nums}
.qbg-preset.bg-low{border-color:#f5a8a8;color:#dc6b6b}
.qbg-preset.bg-target{border-color:#a8c5b9;color:#5b9279}
.qbg-preset.bg-high{border-color:#fbbf24;color:#a16207}
.qbg-preset.bg-very-high{border-color:#dc2626;color:#991b1b}
.qbg-preset.active{background:#3a3530;color:#fdfaf3;border-color:#3a3530}
.qbg-actions{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;margin-bottom:8px}
.qbg-action{padding:11px 8px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid;background:#fff;display:flex;align-items:center;justify-content:center;gap:6px}
.qbg-action-meal{border-color:#a8c5b9;color:#3d6850}
.qbg-action-meal:hover,.qbg-action-meal:active{background:#5b9279;color:#fff;border-color:#5b9279}
.qbg-action-corr{border-color:#b8b0c4;color:#5d4d7d}
.qbg-action-corr:hover,.qbg-action-corr:active{background:#5d4d7d;color:#fff;border-color:#5d4d7d}
.qbg-action-hypo{border-color:#f5a8a8;color:#a03030}
.qbg-action-hypo:hover,.qbg-action-hypo:active{background:#dc6b6b;color:#fff;border-color:#dc6b6b}
.qbg-action-hypo-active{border-color:#dc6b6b;background:#dc6b6b;color:#fff;animation:hypopulse 1.2s ease-in-out infinite}
@keyframes hypopulse{0%,100%{box-shadow:0 0 0 0 rgba(220,107,107,.5)}50%{box-shadow:0 0 0 6px rgba(220,107,107,0)}}
.qbg-action-log{border-color:#d6cebd;color:#3a3530}
.qbg-action-log:hover,.qbg-action-log:active{background:#3a3530;color:#fff;border-color:#3a3530}
.qbg-timeline{display:flex;gap:4px;overflow-x:auto;padding-top:10px;margin-top:8px;border-top:1px solid #ede4d3;-webkit-overflow-scrolling:touch}
.qbg-timeline::-webkit-scrollbar{display:none}
.qbg-timeline-item{flex-shrink:0;padding:6px 8px;border-radius:6px;text-align:center;min-width:48px}
.qbg-timeline-item .qbg-tv{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
.qbg-timeline-item .qbg-tt{font-size:9px;opacity:.85;margin-top:2px}
.qbg-timeline-item.bg-low{background:#fff5f5;color:#a03030}
.qbg-timeline-item.bg-target{background:#f0f9f4;color:#3d6850}

.qbg-timeline-item.bg-very-high{background:#fee2e2;color:#991b1b}

</style>

// Generic units for foods without specific definitions
const GENERIC_UNITS = [
  ['gram', 1],
  ['yemek kaşığı', 15],
  ['tatlı kaşığı', 10],
  ['çay kaşığı', 5],
  ['su bardağı', 200],
  ['çay bardağı', 100],
  ['avuç', 30]
];

// Türkçe karakter normalizasyonu (arama için)
function normTR(s) {
  return String(s || '')
    .replace(/İ/g, 'I').replace(/I/g, 'i')  // Önce büyük TR I → i
    .toLowerCase()
    .replace(/ı/g, 'i')
    .replace(/ş/g, 's')
    .replace(/ğ/g, 'g')
    .replace(/ü/g, 'u')
    .replace(/ö/g, 'o')
    .replace(/ç/g, 'c')
    .replace(/[^\w\s]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

// Skor: 100=tam eşleşme, 80=ad tam, 60=içerir, vs.
function matchScore(query, key, name) {
  const nq = normTR(query);
  const nk = normTR(key);
  const nn = normTR(name);
  if (!nq) return 0;
  if (nk === nq || nn === nq) return 100;
  
  // Kelimelere ayır
  const qWords = nq.split(' ').filter(w => w.length >= 2);
  const kWords = nk.split(' ');
  const nWords = nn.split(' ');
  
  let score = 0;
  for (const w of qWords) {
    // Kelime tam eşleşme (boundary)
    if (kWords.includes(w) || nWords.includes(w)) score += 50;
    // Kelime başlangıcı
    else if (kWords.some(kw => kw.startsWith(w)) || nWords.some(nw => nw.startsWith(w))) score += 30;
    // İçerir
    else if (nk.includes(w) || nn.includes(w)) score += 10;
  }
  
  // İlk kelime tam eşleşme bonusu
  if (qWords[0] && (kWords[0] === qWords[0] || nWords[0] === qWords[0])) score += 20;
  
  // Kısalık bonusu
  if (score > 0) score += Math.max(0, 15 - nn.length / 4);
  
  return score;
}

const searchDB = (q) => {
  const nq = normTR(q);
  if (!nq) return null;
  if (DB[nq]) return DB[nq];
  // Tam normalize eşleşme
  for (const [k, v] of Object.entries(DB)) {
    if (normTR(k) === nq || normTR(v.n) === nq) return v;
  }
  // En iyi skoru bul
  let best = null, bestScore = 0;
  for (const [k, v] of Object.entries(DB)) {
    const s = matchScore(q, k, v.n);
    if (s > bestScore) { bestScore = s; best = v; }
  }
  return bestScore >= 20 ? best : null;
};

function ensureGram(units) {
  if (units.some(u => u[0] === 'gram')) return units;
  return [...units, ['gram', 1]];
}

function getUnitsForFood(name) {
  const q = normTR(name);
  if (!q) return GENERIC_UNITS;
  const lib = state.library[q];
  if (lib && Array.isArray(lib.units) && lib.units.length) return ensureGram(lib.units);
  if (DB[q] && DB[q].u) return ensureGram(DB[q].u);
  // Fuzzy fallback
  let bestU = null, bestScore = 0;
  for (const [k, v] of Object.entries(DB)) {
    if (!v.u) continue;
    const s = matchScore(name, k, v.n);
    if (s > bestScore) { bestScore = s; bestU = v.u; }
  }
  return bestU && bestScore >= 30 ? ensureGram(bestU) : GENERIC_UNITS;
}

// Recent foods — son kullanılan yemekler (history + todayLog'tan)
function getRecentFoods(limit = 6) {
  const seen = new Map();
  const todayKey = state.date;
  const allDays = [todayKey, ...Object.keys(state.history).sort().reverse()];
  for (const d of allDays) {
    const entries = (d === todayKey) ? state.todayLog : (state.history[d] || []);
    for (let i = entries.length - 1; i >= 0; i--) {
      const e = entries[i];
      if (e.type !== 'meal' && e.type !== undefined && e.type !== 'food') continue;
      if (!e.food || !(e.carbs > 0)) continue;
      const k = normTR(e.food);
      if (!k || seen.has(k)) continue;
      seen.set(k, { name: e.food, carbsPer100g: e.carbsPer100g || 0 });
      if (seen.size >= limit) return [...seen.values()];
    }
  }
  return [...seen.values()];
}

// === SESLİ GİRİŞ (Web Speech API) ===
let _speechRecognizer = null;

function startVoiceInput() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    state.error = 'Bu tarayıcı sesli giriş desteklemiyor (Chrome/Edge öner).';
    render(); return;
  }
  if (state.voiceListening && _speechRecognizer) {
    try { _speechRecognizer.stop(); } catch (e) {}
    return;
  }
  
  const rec = new SR();
  rec.lang = 'tr-TR';
  rec.continuous = false;
  rec.interimResults = true;
  rec.maxAlternatives = 1;
  
  rec.onstart = () => {
    state.voiceListening = true;
    state.error = null;
    render();
  };
  
  rec.onresult = (ev) => {
    let transcript = '';
    for (let i = ev.resultIndex; i < ev.results.length; i++) {
      transcript += ev.results[i][0].transcript;
    }
    transcript = transcript.trim();
    if (!transcript) return;
    
    // "100 gram pilav" / "1 dilim ekmek" / "iki yumurta" parse
    const parsed = parseVoiceInput(transcript);
    if (parsed.qty) state.portionQty = String(parsed.qty);
    if (parsed.unit) state.portionUnit = parsed.unit;
    if (parsed.food) {
      state.foodInput = parsed.food;
      updateSuggestions();
    }
    render();
  };
  
  rec.onerror = (ev) => {
    state.voiceListening = false;
    if (ev.error === 'no-speech') state.error = 'Ses algılanmadı, tekrar dene';
    else if (ev.error === 'not-allowed') state.error = 'Mikrofon izni reddedildi';
    else state.error = 'Sesli giriş hatası: ' + ev.error;
    _speechRecognizer = null;
    render();
  };
  
  rec.onend = () => {
    state.voiceListening = false;
    _speechRecognizer = null;
    render();
  };
  
  _speechRecognizer = rec;
  try {
    rec.start();
  } catch (e) {
    state.voiceListening = false;
    state.error = 'Sesli giriş başlatılamadı';
    render();
  }
}

// Türkçe sayı kelime → rakam
const TR_NUMBERS = {
  'bir':1,'iki':2,'üç':3,'uc':3,'dört':4,'dort':4,'beş':5,'bes':5,
  'altı':6,'alti':6,'yedi':7,'sekiz':8,'dokuz':9,'on':10,'yirmi':20,
  'otuz':30,'kırk':40,'kirk':40,'elli':50,'yüz':100,'yuz':100,'çeyrek':0.25,'ceyrek':0.25,
  'yarım':0.5,'yarim':0.5,'buçuk':0.5,'bucuk':0.5
};

const VOICE_UNITS = {
  'gram':'gram','gr':'gram',
  'mililitre':'ml','ml':'ml',
  'adet':'adet','tane':'adet',
  'dilim':'dilim','dilimi':'dilim',
  'porsiyon':'porsiyon',
  'bardak':'su bardağı','bardağı':'su bardağı',
  'çay bardağı':'çay bardağı','cay bardagi':'çay bardağı',
  'kase':'kase','kasesi':'kase',
  'kaşık':'yemek kaşığı','kasik':'yemek kaşığı','yemek kaşığı':'yemek kaşığı','tatlı kaşığı':'tatlı kaşığı',
  'şişe':'şişe','sise':'şişe',
  'kutu':'kutu',
  'fincan':'fincan','fincanı':'fincan'
};

function parseVoiceInput(transcript) {
  const norm = transcript.toLowerCase().trim();
  const tokens = norm.split(/\s+/);
  let qty = null, unit = null, foodTokens = [];
  
  for (let i = 0; i < tokens.length; i++) {
    const tok = tokens[i];
    // Sayı?
    if (qty === null) {
      const n = parseFloat(tok.replace(',', '.'));
      if (!isNaN(n)) { qty = n; continue; }
      if (TR_NUMBERS[tok] !== undefined) { qty = TR_NUMBERS[tok]; continue; }
    }
    // Birim?
    if (unit === null) {
      // Çay bardağı / yemek kaşığı (iki kelimeli)
      if (i + 1 < tokens.length) {
        const two = tok + ' ' + tokens[i+1];
        if (VOICE_UNITS[two]) { unit = VOICE_UNITS[two]; i++; continue; }
      }
      if (VOICE_UNITS[tok]) { unit = VOICE_UNITS[tok]; continue; }
    }
    // Yemek adı kalanı
    foodTokens.push(tok);
  }
  
  return {
    qty: qty,
    unit: unit,
    food: foodTokens.length ? foodTokens.join(' ') : null
  };
}

// Hızlı ekleme: yemeği bul, default miktarla direkt öğüne ekle

  const firstUnit = units[0];
  const unitName = firstUnit[0];
  const unitG = firstUnit[1];
  const qty = (unitName === 'gram' || unitName === 'ml') ? 100 : 1;
  const portion = qty * unitG;
  
  state.mealItems.push({
    food: foodData.n,

    qty,
    unit: unitName,

    carbs: (foodData.c * portion) / 100,
    protein: ((foodData.p || 0) * portion) / 100,

// İNSULİN HESABI
// ============================================================================
function ratioKeyForHour(h) {
  if (h >= 4 && h < 11) return 'breakfast';
  if (h >= 11 && h < 16) return 'lunch';
  if (h >= 16 && h < 21) return 'dinner';
  return 'night';
}
function ratioLabelForHour(h) {
  if (state.ratioMode === 'fixed') return 'sabit oran';
  return ({ breakfast: 'kahvaltı', lunch: 'öğle', dinner: 'akşam', night: 'gece' })[ratioKeyForHour(h)];
}
function getRatioForHour(h) {
  if (state.ratioMode === 'fixed') return state.insulinRatio;
  return state.ratios[ratioKeyForHour(h)] || state.insulinRatio;
}
function roundDose(d) {
  const step = Number(state.roundStep);
  if (!step) return Math.round(d * 10) / 10;
  return Math.round(d / step) * step;
}
function calcInsulin(carbs, hour, bg, iob) {
  iob = iob || 0;
  const ratio = getRatioForHour(hour);
  const carbDose = ratio > 0 ? carbs / ratio : 0;
  let rawCorrection = 0;
  let iobReduction = 0;
  let correction = 0;
  if (bg && state.useCorrection && state.isf > 0) {
    rawCorrection = Math.max(0, (bg - state.targetBG) / state.isf);
    iobReduction = Math.min(iob, rawCorrection);
    correction = rawCorrection - iobReduction;
  }
  const totalRaw = carbDose + correction;
  return {
    ratio, carbDose, rawCorrection, correction, iob, iobReduction, totalRaw,
    totalRounded: roundDose(totalRaw),
    label: ratioLabelForHour(hour)
  };
}

// IOB (Aktif İnsülin) hesabı — hızlı insülin (rapid acting) için eğri model
// Profil yaklaşıklığı: t/DIA=0.25→%70 aktif, 0.50→%35, 0.75→%10, 1.0→%0
function iobFraction(elapsedMin, diaMin) {
  if (elapsedMin <= 0) return 1;
  if (elapsedMin >= diaMin) return 0;
  const x = elapsedMin / diaMin;
  if (x <= 0.25) return 1 - (x / 0.25) * 0.30;
  if (x <= 0.50) return 0.70 - ((x - 0.25) / 0.25) * 0.35;
  if (x <= 0.75) return 0.35 - ((x - 0.50) / 0.25) * 0.25;
  return 0.10 - ((x - 0.75) / 0.25) * 0.10;
}

function getEntryDateTime(entry, dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const [h, mi] = String(entry.time || '00:00').split(':').map(Number);
  return new Date(y, m - 1, d, h || 0, mi || 0);
}

function calcIOB(now) {
  now = now || new Date();
  let total = 0;
  const contributions = [];
  const todayStr = now.toISOString().split('T')[0];
  const yesterdayStr = new Date(now.getTime() - 86400000).toISOString().split('T')[0];

  for (const dateStr of [yesterdayStr, todayStr]) {
    const entries = (dateStr === todayStr && state.date === todayStr)
      ? state.todayLog
      : (state.history[dateStr] || []);
    for (const entry of entries) {
      if (typeof entry.insulin !== 'number' || entry.insulin <= 0) continue;
      // Bazal uzun etkili (Lantus/Tresiba 24sa, sabit), bolus IOB modeline girmez
      if (entry.type === 'basal') continue;
      const entryTime = getEntryDateTime(entry, dateStr);
      const elapsedMin = (now - entryTime) / 60000;
      if (elapsedMin < 0 || elapsedMin >= state.diaMinutes) continue;
      const fraction = iobFraction(elapsedMin, state.diaMinutes);
      const contribution = entry.insulin * fraction;
      total += contribution;
      contributions.push({ food: entry.food, insulin: entry.insulin, active: contribution, elapsedMin });
    }
  }
  contributions.sort((a, b) => a.elapsedMin - b.elapsedMin);
  return { total, contributions };
}

function fmtTimeSince(min) {
  if (min < 1) return 'az önce';
  if (min < 60) return `${Math.round(min)}dk`;
  const h = Math.floor(min / 60);
  const m = Math.round(min % 60);
  return m > 0 ? `${h}sa ${m}dk` : `${h}sa`;
}

// Çakışmasız entry ID üretimi — aynı milisaniyede çok sayıda entry kayıt riski varsa random suffix
function genId() {

// Güvenli sayı parse — virgül/nokta tolere eder, string olmasa da çalışır
function safeFloat(v) {
  if (v === null || v === undefined || v === '') return NaN;
  if (typeof v === 'number') return isNaN(v) ? NaN : v;
  return parseFloat(String(v).replace(',', '.').trim());
}

function safeFloatOr(v, fallback) {
  const n = safeFloat(v);
  return isNaN(n) ? fallback : n;
}

// ============================================================================
function getCurrentUnit() {
  const units = getUnitsForFood(state.foodInput);
  return units.find(u => u[0] === state.portionUnit) || units[0];
}

function getCurrentGrams() {
  const u = getCurrentUnit();
  const qty = safeFloat(state.portionQty) || 0;
  return qty * u[1];
}

function ensureValidUnit() {
  const units = getUnitsForFood(state.foodInput);
  if (!units.some(u => u[0] === state.portionUnit)) {
    state.portionUnit = units[0][0];
  }
}

function updateSuggestions() {
  const q = state.foodInput.trim();
  if (q.length < 2) { state.suggestions = []; return; }
  
  // Skorlu sıralama
  const fromLib = Object.entries(state.library)
    .map(([k, v]) => ({ key: k, name: v.name, src: 'lib', carbs: v.carbsPer100g || 0, protein: v.proteinPer100g || 0, fat: v.fatPer100g || 0, score: matchScore(q, k, v.name) }))
    .filter(x => x.score > 0);
  const fromDB = Object.entries(DB)
    .filter(([k]) => !state.library[k])
    .map(([k, v]) => ({ key: k, name: v.n, src: 'db', carbs: v.c || 0, protein: v.p || 0, fat: v.f || 0, score: matchScore(q, k, v.n) }))
    .filter(x => x.score > 0);
  
  const all = [...fromLib, ...fromDB];
  // Lib her zaman bonus +15 (kullanıcı kütüphanesi öncelikli)
  for (const x of all) if (x.src === 'lib') x.score += 15;
  
  all.sort((a, b) => b.score - a.score);
  state.suggestions = all.slice(0, 8);
}

function buildEstimate(food, portion, c, p, f, source, conf, notes) {
  state.estimate = {
    food, portion,
    carbsPer100g: c, carbs: (c * portion) / 100,
    proteinPer100g: p, protein: (p * portion) / 100,
    fatPer100g: f, fat: (f * portion) / 100,
    source, confidence: conf, notes: notes || '',
    qty: safeFloat(state.portionQty) || 0,
    unit: state.portionUnit,
    unitG: getCurrentUnit()[1]
  };
  state.currentBG = '';
  // Öğün tipi henüz seçilmemişse, saate göre otomatik öner
  if (!state.currentMealType) {
    state.currentMealType = getDefaultMealType(new Date().getHours());
  }
}

function lookupFood() {
  const food = state.foodInput.trim();
  const portion = getCurrentGrams();
  if (!food) { state.error = 'Yemek adı gerekli'; render(); return; }
  if (!portion || portion <= 0) { state.error = 'Geçerli miktar gerekli'; render(); return; }
  state.error = null;

  const libKey = normTR(food);
  if (state.library[libKey]) {
    const lib = state.library[libKey];
    buildEstimate(food, portion, lib.carbsPer100g, lib.proteinPer100g, lib.fatPer100g, 'kütüphane', 'kayıtlı', lib.notes || '');
    render(); return;
  }
  const db = searchDB(food);
  if (db) {
    buildEstimate(db.n, portion, db.c, db.p, db.f, 'veritabanı', 'yüksek', db.o);
    render(); return;
  }
  if (state.apiKey) { estimateAI(food, portion); return; }
  state.error = 'Bu yemek bulunamadı. Manuel gir veya Ayarlar\'dan API anahtarı ekle.';
  render();
}

Fotoğraftaki yemeği tanı. Türk mutfağı dahil tüm yemekleri tanı. Tabaktaki tahmini porsiyon büyüklüğüne ve içeriğine göre değerlendir.

function getMealTotals() {
  return state.mealItems.reduce((acc, item) => ({
    carbs: acc.carbs + (item.carbs || 0),
    protein: acc.protein + (item.protein || 0),
    fat: acc.fat + (item.fat || 0),

  }), { carbs: 0, protein: 0, fat: 0, portion: 0 });
}

// === PRE-BOLUS ZAMANLAMASI ===
// Yemek sınıfı + KŞ + IOB'a göre önerilen pre-bolus süresi
// Pozitif sayı = bolustan X dk sonra yemeye başla
// Negatif sayı = X dk yedikten SONRA bolus vur (extended/yağlı)
function calcPrebolusTiming(mealItems, bg, iob) {
  if (!mealItems || mealItems.length === 0) return null;
  
  // Toplam KH/protein/yağ
  const total = mealItems.reduce((acc, m) => ({
    c: acc.c + (m.carbs || 0),
    p: acc.p + (m.protein || 0),
    f: acc.f + (m.fat || 0)
  }), { c: 0, p: 0, f: 0 });
  
  if (total.c < 5) return null;
  
  // Yemek sınıfını classifyMeal ile belirle (toplam değerleri kullan)
  const mealClass = classifyMeal({ carbs: total.c, protein: total.p, fat: total.f });
  
  // Default pre-bolus süreleri (dakika, pozitif = bolus → bekle → ye)
  let recommendedMin = 15;
  let reason = '';
  let strategy = 'standard';
  
  if (mealClass === 'fast_carb') {
    recommendedMin = 20;
    reason = 'Hızlı KH yemekte 15-20dk pre-bolus peak\'i düşürür';
    strategy = 'pre';
  } else if (mealClass === 'high_fat') {
    recommendedMin = 0;
    reason = 'Yağlı yemek emilimi yavaş — yemek başında vurabilir veya split-bolus dene';
    strategy = 'split';
  } else if (mealClass === 'high_protein') {
    recommendedMin = 5;
    reason = 'Proteinli yemek yavaş emilir, 5dk yeterli';
    strategy = 'standard';
  } else if (mealClass === 'mixed_carb' || mealClass === 'mixed') {
    recommendedMin = 12;
    reason = 'Karışık öğün için 10-15dk öneriliyor';
    strategy = 'standard';
  }
  
  // KŞ ayarlamaları
  if (bg && !isNaN(bg)) {
    if (bg < 80) {
      recommendedMin = 0;
      reason = '⚠ KŞ düşük (<80) — pre-bolus YAPMA, önce KH al, KŞ yükselince bolus';
      strategy = 'wait';
    } else if (bg > 200) {
      // Yüksek KŞ → daha uzun pre-bolus
      recommendedMin = Math.max(recommendedMin, 20);
      reason = `KŞ yüksek (${bg}) — pre-bolus süresini artır, insulin ön çalışsın`;
    } else if (bg > 150) {
      recommendedMin = Math.max(recommendedMin, 15);
    }
  }
  
  // IOB varsa pre-bolus daha az gerek (insulin zaten devrede)
  if (iob > 1) {
    recommendedMin = Math.max(0, recommendedMin - 5);
  }
  
  return {
    recommendedMin,
    mealClass,
    reason,
    strategy,
    totals: total
  };
}

// === YEMEK FOTOĞRAFI THUMBNAIL ===
// 200x200 JPEG thumbnail oluştur (~15-30KB), entry'e mealPhoto olarak ekle
async function makeMealThumbnail(file) {
  return new Promise((resolve, reject) => {
    if (!file || !file.type.startsWith('image/')) {
      reject(new Error('Geçerli bir fotoğraf değil'));
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const maxSize = 240;
        const ratio = Math.min(maxSize / img.width, maxSize / img.height, 1);
        const w = Math.round(img.width * ratio);
        const h = Math.round(img.height * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        // JPEG quality 0.7 — ~15-30KB
        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
        resolve(dataUrl);
      };
      img.onerror = () => reject(new Error('Görsel yüklenemedi'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('Dosya okunamadı'));
    reader.readAsDataURL(file);
  });
}

function calcCorrectionPreview() {
  const bg = safeFloat(state.correctionBG) || null;
  const manual = safeFloat(state.correctionManual) || null;
  if (!bg && !manual) return null;

  const now = new Date();
  const hour = now.getHours();
  const iob = calcIOB(now).total;

  if (manual && !bg) {
    return { type: 'manual', raw: manual, rounded: roundDose(manual), iob };
  }
  // BG verildi
  const dose = calcInsulin(0, hour, bg, iob);
  if (manual) {
    // Hem BG hem manuel — manuel kullan, ama BG bilgisini göster
    return { type: 'manual_override', raw: manual, rounded: roundDose(manual),
             bg, target: state.targetBG, isf: state.isf, calculated: dose.totalRaw, iob };
  }
  return {
    type: 'calculated',
    bg, target: state.targetBG, isf: state.isf,
    rawCorrection: dose.rawCorrection,
    iobReduction: dose.iobReduction,
    iob,
    raw: dose.totalRaw,
    rounded: dose.totalRounded
  };
}

function commitCorrection() {
  const preview = calcCorrectionPreview();
  if (!preview) {
    state.error = 'KŞ veya manuel doz girmelisin';
    render();
    return;
  }
  if (preview.rounded <= 0) {
    const bg = safeFloat(state.correctionBG) || null;
    const iob = preview.iob || 0;
    let msg;
    if (bg && bg < state.targetBG) msg = `KŞ hedef altında (${bg} < ${state.targetBG}). Düzeltme gerekmiyor.`;
    else if (iob > 0) msg = `Aktif insülin yeterli (${fmt(iob,1)} Ü). Ek düzeltme gerekmiyor.`;
    else msg = 'Hesaplanan doz 0. Kayıt yapılmadı.';
    alert(msg);
    return;
  }

  const now = new Date();
  const hour = now.getHours();
  const bg = safeFloat(state.correctionBG) || null;

  let label;
  if (preview.type === 'manual') label = 'Manuel doz';
  else label = `Ara iğne · KŞ ${bg}`;

const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
const fmt = (n, d = 0) => Number(n || 0).toFixed(d);
const fmtQty = (n) => { const v = Number(n); return v % 1 === 0 ? String(v) : v.toFixed(1); };

  }
  return `${fmt(e.portion)}g`;
}

function startEditEntry(id) {
  const entry = state.todayLog.find(e => e.id === id);
  if (!entry) return;
  state.editingEntry = id;
  state.editDraft = {
    time: entry.time || '',
    mealType: entry.mealType || null,
    notes: entry.notes || '',
    bg: entry.bg ? String(entry.bg) : '',
    insulin: typeof entry.insulin === 'number' ? String(entry.insulin) : ''
  };
  render();
}

function cancelEditEntry() {
  state.editingEntry = null;
  state.editDraft = {};
  render();
}

function saveEditEntry(id) {
  const idx = state.todayLog.findIndex(e => e.id === id);
  if (idx === -1) return;
  const draft = state.editDraft;
  const updated = { ...state.todayLog[idx] };
  if (draft.time && /^\d{1,2}:\d{2}$/.test(draft.time)) {
    updated.time = draft.time;
    const m = draft.time.match(/^(\d{1,2}):/);
    if (m) updated.hour = parseInt(m[1], 10);
  }
  if (draft.mealType !== undefined) updated.mealType = draft.mealType;
  updated.notes = draft.notes || '';
  const bg = parseFloat(String(draft.bg).replace(',', '.'));
  updated.bg = !isNaN(bg) && bg > 0 ? bg : null;
  const ins = parseFloat(String(draft.insulin).replace(',', '.'));
  if (!isNaN(ins) && ins >= 0) updated.insulin = ins;
  const newLog = [...state.todayLog];
  newLog[idx] = updated;
  saveLog(newLog);
  state.editingEntry = null;
  state.editDraft = {};
  render();
}

function entriesNeedingPostBG(now) {
  now = now || new Date();
  return state.todayLog.filter(e => {
    if (e.type === 'correction') return false;
    if (e.postMealBG && typeof e.postMealBG.value === 'number') return false;
    if (!e.carbs || e.carbs < 10) return false;
    const t = getEntryDateTime(e, state.date);
    const elapsedMin = (now - t) / 60000;
    return elapsedMin >= 90 && elapsedMin <= 240;
  });
}

function startPostBGInput(entryId) {
  state.postBgInputId = entryId;
  state.postBgValue = '';
  render();
}

function cancelPostBGInput() {
  state.postBgInputId = null;
  state.postBgValue = '';
  render();
}

function savePostBG() {
  if (!state.postBgInputId) return;
  const v = parseFloat(String(state.postBgValue).replace(',', '.'));
  if (isNaN(v) || v <= 0) { alert('Geçerli bir KŞ değeri gir'); return; }
  const idx = state.todayLog.findIndex(e => e.id === state.postBgInputId);
  if (idx === -1) return;
  const newLog = [...state.todayLog];
  newLog[idx] = {
    ...newLog[idx],
    postMealBG: {
      value: v,
      time: new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }),
      loggedAt: new Date().toISOString()
    }
  };
  saveLog(newLog);
  state.postBgInputId = null;
  state.postBgValue = '';
  render();
}

// İSTATİSTİKLER (öğrenme için temel)
// ============================================================================
function getAllEntriesInPeriod(days) {
  const now = new Date();
  const cutoff = new Date(now.getTime() - days * 86400000);
  cutoff.setHours(0, 0, 0, 0);
  const cutoffStr = cutoff.toISOString().split('T')[0];
  const dates = new Set(Object.keys(state.history));
  if (state.todayLog.length > 0) dates.add(state.date);
  const arr = [];
  for (const d of dates) {
    if (d < cutoffStr) continue;
    const entries = (d === state.date) ? state.todayLog : (state.history[d] || []);
    entries.forEach(e => arr.push({ ...e, _date: d }));
  }
  return arr;
}

function calcStats(days) {
  const entries = getAllEntriesInPeriod(days);
  if (entries.length === 0) return { empty: true, days };

  const dates = new Set(entries.map(e => e._date));
  const dayCount = dates.size || 1;

  const mealEntries = entries.filter(e => e.type !== 'correction' && e.type !== 'basal' && e.type !== 'hypo' && e.type !== 'bg');
  const correctionEntries = entries.filter(e => e.type === 'correction');
  const basalEntries = entries.filter(e => e.type === 'basal');
  const hypoEntries = entries.filter(e => e.type === 'hypo');

  const totalC = mealEntries.reduce((s, e) => s + (e.carbs || 0), 0);
  const totalI = entries.reduce((s, e) => s + (typeof e.insulin === 'number' ? e.insulin : 0), 0);
  const totalP = mealEntries.reduce((s, e) => s + (e.protein || 0), 0);
  const totalF = mealEntries.reduce((s, e) => s + (e.fat || 0), 0);

  // En çok yenenler
  const foodCounts = {};
  mealEntries.forEach(e => {
    if (e.type === 'meal' && Array.isArray(e.items) && e.items.length > 1) {
      e.items.forEach(i => { foodCounts[i.food] = (foodCounts[i.food] || 0) + 1; });
    } else if (e.food) {
      foodCounts[e.food] = (foodCounts[e.food] || 0) + 1;
    }
  });
  const topFoods = Object.entries(foodCounts).sort((a, b) => b[1] - a[1]).slice(0, 8);

  // Öğün tipine göre
  const byMealType = {};
  MEAL_TYPE_KEYS.forEach(k => byMealType[k] = { c: 0, i: 0, n: 0, deltaSum: 0, deltaN: 0 });
  mealEntries.forEach(e => {
    const mt = e.mealType || getDefaultMealType(getEntryHour(e));
    if (byMealType[mt]) {
      byMealType[mt].c += e.carbs || 0;
      byMealType[mt].i += typeof e.insulin === 'number' ? e.insulin : 0;
      byMealType[mt].n += 1;
      if (e.bg && e.postMealBG && typeof e.postMealBG.value === 'number') {
        byMealType[mt].deltaSum += (e.postMealBG.value - e.bg);
        byMealType[mt].deltaN += 1;
      }
    }
  });

  // Yemek sonrası KŞ analiz
  const withPostBG = mealEntries.filter(e => e.postMealBG && typeof e.postMealBG.value === 'number');
  const withPrePost = withPostBG.filter(e => e.bg);
  const avgPostMealBG = withPostBG.length ? withPostBG.reduce((s, e) => s + e.postMealBG.value, 0) / withPostBG.length : null;
  const avgDelta = withPrePost.length ? withPrePost.reduce((s, e) => s + (e.postMealBG.value - e.bg), 0) / withPrePost.length : null;

  return {
    days, dayCount, totalEntries: entries.length,
    mealCount: mealEntries.length, correctionCount: correctionEntries.length,
    basalCount: basalEntries.length, hypoCount: hypoEntries.length,
    totalC, totalI, totalP, totalF,
    avgC: totalC / dayCount, avgI: totalI / dayCount,
    topFoods, byMealType,
    postBGCount: withPostBG.length, avgPostMealBG, avgDelta,
    withPrePostCount: withPrePost.length
  };
}

function exportCSV() {
  const rows = [['Tarih', 'Saat', 'Tip', 'Marka', 'Öğün Türü', 'Yemek', 'Porsiyon (g)', 'KH (g)', 'Protein (g)', 'Yağ (g)', 'KŞ Önce', 'İnsulin (Ü)', 'KŞ Sonrası', 'KŞ Sonrası Saat', 'Hipo Tedavi (g)', 'Egzersiz', 'Hasta', 'Notlar']];
  const allDays = new Set([...Object.keys(state.history), state.date]);
  Array.from(allDays).sort().forEach(date => {
    const entries = (date === state.date) ? state.todayLog : (state.history[date] || []);
    entries.forEach(e => {
      const typeLabel = e.type === 'correction' ? 'Düzeltme'
        : e.type === 'basal' ? 'Bazal'
        : e.type === 'hypo' ? 'Hipo'
        : e.type === 'bg' ? 'KŞ Ölçüm'
        : e.type === 'exercise' ? 'Egzersiz'
        : e.type === 'sleep' ? 'Uyku'
        : e.type === 'meal' ? 'Öğün' : 'Yemek';
      rows.push([
        date,
        e.time || '',
        typeLabel,
        e.brand || '',
        e.mealType ? mealTypeLabel(e.mealType).name : '',
        e.food || '',
        fmt(e.portion || 0, 0),
        fmt(e.carbs || 0, 1),
        fmt(e.protein || 0, 1),
        fmt(e.fat || 0, 1),
        e.bg || '',
        typeof e.insulin === 'number' ? fmt(e.insulin, 2) : '',
        e.postMealBG && typeof e.postMealBG.value === 'number' ? e.postMealBG.value : '',
        e.postMealBG && e.postMealBG.time ? e.postMealBG.time : '',
        e.type === 'hypo' ? fmt(e.treatGrams || 0, 0) : '',
        e.exerciseAdjusted ? 'Evet' : '',
        e.sickAdjusted ? 'Evet' : '',
        ((e.notes || '') + (e.reason ? ' [' + e.reason + ']' : '')).replace(/"/g, '""').replace(/[\r\n]+/g, ' ')
      ]);
    });
  });
  const csv = rows.map(r => r.map(c => `"${String(c)}"`).join(',')).join('\r\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `karbsayar-${new Date().toISOString().split('T')[0]}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function fpBurden(fat, protein) { return (fat || 0) + (protein || 0) * 0.5; }
function showFPWarning(fat, protein) { return (fat || 0) >= 20 || fpBurden(fat, protein) >= 30; }
function fpWarningHtml(fat, protein) {
  const burden = fpBurden(fat, protein);
  const high = (fat || 0) >= 30 || burden >= 45;
  return `<div class="fp-warning">
    ${svg('alert','icn icn-sm')}
    <div>
      <b>${high ? 'Çok yüksek' : 'Yüksek'} yağ/protein:</b> ${fmt(fat, 1)}g yağ + ${fmt(protein, 1)}g protein.
      Glikoz piki ${high ? '2-4' : '1-3'} saat gecikebilir. <b>Split bolus</b> düşün: ~%50 şimdi, ~%50 ${high ? '2sa' : '1.5sa'} sonra.
    </div>
  </div>`;
}

// ============================================================================
// EGZERSİZ MODU - dose hesabını ayarla
// ============================================================================
function applyExerciseAdjustment(dose) {
  if (!state.exerciseMode || state.exerciseReduction <= 0) return dose;
  const factor = (100 - state.exerciseReduction) / 100;
  const adjustedRaw = dose.totalRaw * factor;
  return {
    ...dose,
    preExerciseRaw: dose.totalRaw,
    totalRaw: adjustedRaw,
    totalRounded: roundDose(adjustedRaw),
    exerciseAdjusted: true,
    exerciseReduction: state.exerciseReduction
  };
}

// ============================================================================
// HASTA MODU - bolus dozunu artır
// ============================================================================
function applySickModeAdjustment(dose) {
  if (!state.sickMode || state.sickModeMultiplier <= 0) return dose;
  const factor = 1 + state.sickModeMultiplier / 100;
  const adjustedRaw = dose.totalRaw * factor;
  return {
    ...dose,
    preSickRaw: dose.totalRaw,
    totalRaw: adjustedRaw,
    totalRounded: roundDose(adjustedRaw),
    sickAdjusted: true,
    sickIncrease: state.sickModeMultiplier
  };
}

// Tüm doz ayarlamalarını sırayla uygula
function applyManualOverride(dose) {
  if (!state.bolusOverridePct || state.bolusOverridePct === 0) return dose;
  const factor = 1 + (state.bolusOverridePct / 100);
  const adjustedRaw = dose.totalRaw * factor;
  return {
    ...dose,
    totalRaw: adjustedRaw,
    totalRounded: roundDose(adjustedRaw),
    overrideApplied: true,
    overridePct: state.bolusOverridePct
  };
}

function applyAllAdjustments(dose) {
  let d = applyExerciseAdjustment(dose);
  d = applySickModeAdjustment(d);
  d = applyManualOverride(d);
  return d;
}

function getSensorStatus() {

  if (isNaN(start.getTime())) return null;
  const now = new Date();

  const remainingDays = state.sensorDays - elapsedDays;
  return {
    elapsedDays,
    remainingDays,
    totalDays: state.sensorDays,
    expired: remainingDays < 0,
    expiringSoon: remainingDays >= 0 && remainingDays <= 2,
    device: state.cgmDevice
  };

// ============================================================================
// BAZAL HATIRLATMA
// ============================================================================
function shouldRemindBasal() {
  if (!state.basalTime || hasBasalToday(state.todayLog)) return false;
  const m = state.basalTime.match(/^(\d{1,2}):(\d{2})$/);
  if (!m) return false;
  const targetH = parseInt(m[1], 10);
  const targetM = parseInt(m[2], 10);
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();
  const targetMin = targetH * 60 + targetM;
  return nowMin >= targetMin;
}

// Yemek vakti hatırlatma kontrolü — son 90dk içinde geçildiyse ve bu öğün için kayıt yoksa
// === İNSULİN PEN TAKİBİ ===
// Pen başlangıç tarihinden bugüne kadar kullanılan toplam Ü hesaplanır.
// Geriye kalan Ü ve tahmini bitiş tarihi.
function getPenStatus(type) {
  const startDate = type === 'bolus' ? state.bolusPenStartDate : state.basalPenStartDate;
  const startUnits = type === 'bolus' ? state.bolusPenStartUnits : state.basalPenStartUnits;
  if (!startDate || !startUnits) return null;
  
  const start = new Date(startDate + 'T00:00:00');
  if (isNaN(start.getTime())) return null;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const elapsedDays = Math.max(0, Math.floor((today - start) / 86400000));
  
  // startDate'den bugüne kadar kullanılan toplam Ü
  let usedUnits = 0;
  const all = getAllDayEntries();
  for (const [date, entries] of Object.entries(all)) {
    if (date < startDate) continue;
    for (const e of entries) {
      const ins = typeof e.insulin === 'number' ? e.insulin : 0;
      if (ins <= 0) continue;
      if (type === 'bolus' && e.type !== 'basal') usedUnits += ins;
      if (type === 'basal' && e.type === 'basal') usedUnits += ins;
    }
  }
  
  const remainingUnits = Math.max(0, startUnits - usedUnits);
  const dailyAvg = elapsedDays > 0 ? usedUnits / elapsedDays : 0;
  const daysRemaining = dailyAvg > 0 ? Math.floor(remainingUnits / dailyAvg) : null;
  
  let estEndDate = null;
  if (daysRemaining !== null) {
    const d = new Date(today);
    d.setDate(d.getDate() + daysRemaining);
    estEndDate = d.toISOString().split('T')[0];
  }
  
  const isLow = remainingUnits <= state.penLowThreshold;
  const isCritical = remainingUnits <= 20;
  const isEmpty = remainingUnits <= 0;
  
  return {
    type,
    startDate,
    startUnits,
    elapsedDays,
    usedUnits: Math.round(usedUnits * 10) / 10,
    remainingUnits: Math.round(remainingUnits * 10) / 10,
    dailyAvg: Math.round(dailyAvg * 10) / 10,
    daysRemaining,
    estEndDate,
    isLow, isCritical, isEmpty,
    pctRemaining: Math.round((remainingUnits / startUnits) * 100)
  };
}

function startNewPen(type) {
  const today = new Date().toISOString().split('T')[0];
  if (type === 'bolus') {
    state.bolusPenStartDate = today;
    saveSettings({ bolusPenStartDate: today });
  } else {
    state.basalPenStartDate = today;
    saveSettings({ basalPenStartDate: today });
  }
  render();
}

// === GECE KORUMA / SLEEP MODE ===
// Yatma saatinde KŞ + IOB + son egzersiz değerlendir
// Hipo riski varsa kullanıcıyı uyar
function getBedtimeWarnings() {
  if (!state.sleepModeOn) return null;
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();
  
  // Yatma penceresi: bedtimeStart - bedtimeEnd
  const startMatch = (state.bedtimeStart || '22:00').match(/^(\d{1,2}):(\d{2})$/);
  const endMatch = (state.bedtimeEnd || '01:00').match(/^(\d{1,2}):(\d{2})$/);
  if (!startMatch || !endMatch) return null;
  const startMin = parseInt(startMatch[1]) * 60 + parseInt(startMatch[2]);
  let endMin = parseInt(endMatch[1]) * 60 + parseInt(endMatch[2]);
  if (endMin <= startMin) endMin += 24 * 60; // Gece yarısını geçen pencere
  const adjNow = nowMin < startMin ? nowMin + 24 * 60 : nowMin;
  
  if (adjNow < startMin || adjNow > endMin) return null;
  
  // Güncel KŞ
  const recentBGs = getRecentBGs ? getRecentBGs(3) : [];
  const lastBG = recentBGs.length > 0 ? recentBGs[0] : null;
  const iob = calcIOB().total;
  
  // Bugünkü son egzersiz
  let lastExercise = null;
  for (let i = state.todayLog.length - 1; i >= 0; i--) {
    if (state.todayLog[i].type === 'exercise') { lastExercise = state.todayLog[i]; break; }
  }
  
  const warnings = [];
  let riskLevel = 'normal';
  
  if (lastBG && lastBG.value < 100) {
    warnings.push(`KŞ ${lastBG.value} mg/dL düşük — yatmadan önce 15g KH al`);
    riskLevel = 'high';
  } else if (lastBG && lastBG.value < 130 && iob > 0.5) {
    warnings.push(`KŞ ${lastBG.value}, ${fmt(iob, 1)}Ü aktif insulin var — gece hipo riski yüksek`);
    riskLevel = 'high';
  } else if (lastBG && lastBG.value < 140 && lastExercise) {
    const exTime = lastExercise.time || '00:00';
    warnings.push(`Bugün egzersiz yaptın (${exTime}). KŞ ${lastBG.value} — gece hipo riski 6-12 saat sürebilir`);
    riskLevel = 'medium';
  } else if (iob > 1.5) {
    warnings.push(`${fmt(iob, 1)}Ü aktif insulin var — yatmadan önce KŞ kontrol et`);
    riskLevel = 'medium';
  }
  
  // Bazal vurulmadıysa hatırlat
  if (!hasBasalToday(state.todayLog)) {
    warnings.push(`⚠ Bugün bazal (${state.basalDose}Ü ${state.basalBrand}) vurulmadı`);
    riskLevel = 'high';
  }
  
  // BG ölçülmemişse uyar (lastBG.dt is a Date object)
  const lastBgAge = lastBG && lastBG.dt ? (Date.now() - lastBG.dt.getTime()) : Infinity;
  if (!lastBG || lastBgAge > 3 * 3600 * 1000) {
    warnings.push('Son 3 saatte KŞ ölçümü yok — yatmadan önce kontrol et');
  }
  
  if (warnings.length === 0) return null;
  return { warnings, riskLevel, lastBG, iob };
}

function getMealReminders() {
  if (!state.mealRemindersOn) return [];
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();
  
  const checks = [
    { key: 'kahvalti', label: 'Kahvaltı', emoji: '🌅', time: state.breakfastReminder },
    { key: 'ogle',     label: 'Öğle',     emoji: '🌞', time: state.lunchReminder },
    { key: 'aksam',    label: 'Akşam',    emoji: '🌆', time: state.dinnerReminder }
  ];
  
  const result = [];
  for (const c of checks) {
    if (!c.time) continue;
    const m = c.time.match(/^(\d{1,2}):(\d{2})$/);
    if (!m) continue;
    const targetMin = parseInt(m[1]) * 60 + parseInt(m[2]);
    const elapsed = nowMin - targetMin;
    
    // Sadece son 90dk içinde geçen hedef
    if (elapsed < 0 || elapsed > 90) continue;
    
    // Bu öğün tipi için bugün kayıt var mı?
    const hasMeal = state.todayLog.some(e => 
      (e.type === 'meal' || e.type === undefined || e.type === 'food') && 
      e.mealType === c.key && (e.carbs || 0) > 0
    );
    if (hasMeal) continue;
    
    result.push({ ...c, elapsed });
  }
  return result;
}

// ============================================================================
// HIZLI KŞ - kısayol kartı
// ============================================================================
function getRecentBGs(limit) {
  limit = limit || 6;
  const now = new Date();
  const yesterdayStr = new Date(now.getTime() - 86400000).toISOString().split('T')[0];
  const candidates = [];

  const sources = [
    { date: state.date, entries: state.todayLog },
    { date: yesterdayStr, entries: state.history[yesterdayStr] || [] }
  ];

  sources.forEach(({ date, entries }) => {
    entries.forEach(e => {
      if (e.bg && e.bg > 0) {
        const t = getEntryDateTime(e, date);
        candidates.push({
          value: e.bg, time: e.time, date, dt: t,
          kind: e.type === 'hypo' ? 'hypo' : (e.type === 'bg' ? 'standalone' : 'pre-meal')
        });
      }
      if (e.postMealBG && typeof e.postMealBG.value === 'number' && e.postMealBG.time) {
        const dt = new Date(date + 'T' + e.postMealBG.time + ':00');
        if (!isNaN(dt.getTime())) {
          candidates.push({ value: e.postMealBG.value, time: e.postMealBG.time, date, dt, kind: 'post-meal' });
        }
      }
    });
  });

  candidates.sort((a, b) => b.dt - a.dt);
  return candidates.slice(0, limit);
}

function getBGTrend() {
  const recent = getRecentBGs(2);
  if (recent.length < 2) return null;
  const [latest, previous] = recent;
  const elapsedMin = (latest.dt - previous.dt) / 60000;
  if (elapsedMin > 240) return null;
  const delta = latest.value - previous.value;
  let direction;
  if (Math.abs(delta) < 10) direction = 'flat';
  else if (delta >= 30) direction = 'up-fast';
  else if (delta > 0) direction = 'up';
  else if (delta <= -30) direction = 'down-fast';
  else direction = 'down';
  return { delta, direction, elapsedMin, latest };
}
